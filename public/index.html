<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark" x-data x-init="$store.app.init()">
<head>
  <meta charset="UTF-8">
  <title>RM1 Tecnologia</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Anti-FOUC: aplica o tema salvo ANTES do primeiro paint -->
  <script>
    (function () {
      var t = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  <link rel="stylesheet" href="/css/style.css">

  <!-- Utilitários globais -->
  <script src="/js/utils/toast.js"></script>
  <script src="/js/utils/token.js"></script>

  <!-- Componentes de página -->
  <script src="/js/pages/dashboard-page.js"></script>
  <script src="/js/pages/tickets-page.js"></script>
  <script src="/js/pages/ticket-view-page.js"></script>
  <script src="/js/pages/users-page.js"></script>
  <script src="/js/pages/hotels-page.js"></script>
  <script src="/js/pages/manage-categories-page.js"></script>
  <script src="/js/pages/activity-report-page.js"></script>
  <script src="/js/pages/teams-page.js"></script>
  <script src="/js/pages/mural-page.js"></script>
  <script src="/js/pages/qualitor-page.js"></script>

  <!-- Shell e bootstrap -->
  <script src="/js/shell.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/login.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1/locale/pt-br.js"></script>
  <script>
    dayjs.locale('pt-br')
  </script>
</head>

<body class="bg-gray-900">

  <!-- LOGIN -->
  <div id="login-view" x-show="$store.app.currentView === 'login'" class="login-container">
    <form id="login-form">
      <div class="container">
        <img class="login-logo" src="/assets/images/logo-banner.png" alt="Logo">
        <input type="text" id="email" placeholder="Email" class="input-class">
        <input type="password" id="password" placeholder="Senha" class="input-class">
        <button id="login-btn" class="input-class">Entrar</button>
        <p id="login-error" class="error"></p>
      </div>
    </form>
  </div>

  <!-- DASHBOARD view -->
  <div x-show="$store.app.currentView === 'dashboard'" x-data="dashboard()"
    class="dashboard-container flex flex-1 h-screen">

    <!-- SIDEBAR -->
    <div class="relative dashboard-sidebar flex flex-2.2 flex-col justify-between 
            bg-gray-800/40 backdrop-blur-2xl backdrop-saturate-150
            border border-white/10 rounded-2xl shadow-xl p-4 m-2 overflow-hidden">

      <!-- Menus na metade de cima -->
      <div class="flex flex-col">

        <div id="logo-container" class=" mb-8">
          <img id="logo" src="/assets/images/logo-branco.png" alt="Logo" class="ml-2">
        </div>

        <ul>
          <template x-for="item in $store.app.menus" :key="item.page">
            <li>
              <a href="#" class="menu-item text-sm" :class="{ 'bg-gray-700': $store.app.currentPage === item.page }"
                @click.prevent="goTo(item.page)" x-text="item.label">
              </a>
            </li>
          </template>
        </ul>

        <!-- NOTIFICATION BELL -->
        <div class="mt-4 border-t border-white/10 pt-3">
          <button
            @click="toggleNotifPanel()"
            class="w-full flex items-center justify-between px-3 py-2.5 rounded-xl
                   hover:bg-white/[0.06] transition text-left group">
            <span class="flex items-center gap-2.5 text-sm text-gray-300 group-hover:text-white transition">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
              </svg>
              Notificações
            </span>
            <span
              x-show="notifUnread > 0"
              class="text-[10px] bg-red-500 text-white font-bold px-1.5 py-0.5 rounded-full min-w-5 text-center leading-tight"
              x-text="notifUnread > 9 ? '9+' : notifUnread">
            </span>
          </button>

          <!-- TODO BUTTON (admin/agent only) -->
          <template x-if="['admin','agent'].includes($store.app.role)">
            <button
              @click="toggleTodoPanel()"
              class="mt-1 w-full flex items-center justify-between px-3 py-2.5 rounded-xl
                     hover:bg-white/[0.06] transition text-left group">
              <span class="flex items-center gap-2.5 text-sm text-gray-300 group-hover:text-white transition">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
                </svg>
                TODOs
              </span>
              <span x-show="todoPendingCount > 0"
                class="text-[10px] bg-blue-500 text-white font-bold px-1.5 py-0.5 rounded-full min-w-5 text-center leading-tight"
                x-text="todoPendingCount > 9 ? '9+' : todoPendingCount">
              </span>
            </button>
          </template>

          <!-- THEME TOGGLE -->
          <button
            @click="$store.app.toggleTheme()"
            class="mt-1 w-full flex items-center justify-between px-3 py-2.5 rounded-xl
                   hover:bg-white/[0.06] transition text-left group">
            <span class="flex items-center gap-2.5 text-sm text-gray-300 group-hover:text-white transition">
              <!-- Sun icon (shown in dark mode → click to go light) -->
              <svg x-show="$store.app.theme === 'dark'"
                class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 7a5 5 0 100 10A5 5 0 0012 7z"/>
              </svg>
              <!-- Moon icon (shown in light mode → click to go dark) -->
              <svg x-show="$store.app.theme === 'light'"
                class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
              </svg>
              <span x-text="$store.app.theme === 'dark' ? 'Modo Claro' : 'Modo Escuro'"></span>
            </span>
            <!-- Visual toggle pill -->
            <div class="relative w-9 h-5 rounded-full transition-colors duration-300"
              :class="$store.app.theme === 'light' ? 'bg-blue-500' : 'bg-gray-600'">
              <div class="absolute top-0.5 w-4 h-4 rounded-full bg-white shadow transition-all duration-300"
                :class="$store.app.theme === 'light' ? 'left-4' : 'left-0.5'">
              </div>
            </div>
          </button>
        </div>

      </div>

      <!-- Botão logout na metade de baixo -->


      <!-- PARTE DE BAIXO -->

      <div class="flex flex-col gap-3">

        <!-- USER CARD -->

        <div
          @click="openProfileModal()"

          class="
            flex
            items-center
            gap-3
            p-1
            rounded-2xl
            bg-white/[0.03]
            border border-white/10
            hover:bg-white/[0.06]
            cursor-pointer
            transition">

          <!-- AVATAR -->

    
          <div
            class="
              w-12 h-12
              shrink-0
              rounded-full
              overflow-hidden
              bg-gradient-to-br
              from-blue-500
              to-cyan-600
              flex
              items-center
              justify-center
              text-white
              font-semibold"
          >

            <template x-if="$store.app.avatarUrl">
              <img :src="$store.app.avatarUrl" class="w-full h-full object-cover">
            </template>

            <template x-if="!$store.app.avatarUrl">
              <span
                x-text="
                  ($store.app.userName || 'U')
                    .split(' ')
                    .filter(p => p.length)
                    .map(p => p[0])
                    .slice(0, 2)
                    .join('')
                    .toUpperCase()
                ">
              </span>
            </template>

          </div>

          <!-- INFO -->

          <div class="flex-1 min-w-0">

            <div
              class="
                text-sm
                font-medium
                truncate">

              <span x-text="$store.app.userName || 'Usuário'"></span>

            </div>

            <div
              class="
                text-xs
                text-gray-400">

              Editar perfil

            </div>

          </div>

          <!-- SETA -->

          <div
            class="
              text-gray-500
              text-sm">

            →

          </div>

        </div>

        <!-- LOGOUT -->

        <button
          @click="logout()"

          class="
            logout-btn
            w-full
            py-2
            px-3
            bg-red-600
            rounded
            hover:bg-red-500">

          Logout

        </button>

      </div>


      


    </div>

    <div class="flex flex-17 bg-gray-900 min-h-0 overflow-hidden">
      <!-- MAIN CONTENT -->
      <div id="page-container" class="flex flex-1 flex-col bg-gray-900 min-h-0">

      </div>

    </div>

    <!-- PROFILE MODAL -->
  <div
    x-show="showProfileModal"
    x-transition
    class="fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm">

    <div
      @click.away="showProfileModal = false"
      class="w-full max-w-2xl mx-4

            bg-gray-900/90
            backdrop-blur-xl
            border border-white/10
            rounded-2xl
            shadow-2xl">

      <!-- HEADER -->
      <div class="flex items-center justify-between px-6 py-4 border-b border-white/10">

        <h2 class="text-lg font-semibold text-white">
          Meu Perfil
        </h2>

        <button
          @click="showProfileModal = false"
          class="text-gray-400 hover:text-white">
          ✕
        </button>

      </div>

      <!-- BODY -->
      <div class="p-6 space-y-6">

        <!-- FOTO -->
        <div class="flex flex-col items-center">

          <div
            class="w-28 h-28 rounded-full overflow-hidden
                  border-2 border-blue-500 shadow-lg">

            <img
              :src="$store.app.avatarUrl || '/assets/default-user.png'"
              class="w-full h-full object-cover">
          </div>

          <label
            class="mt-3 px-4 py-2 rounded-lg input-class
                  bg-blue-600 hover:bg-blue-700
                  text-sm font-medium
                  cursor-pointer">

            Alterar Foto

            <input
              type="file"
              accept="image/*"
              class="hidden"
              @change="uploadProfilePhoto($event)">
          </label>

        </div>

        <!-- NOME -->
        <div>

          <label class="block text-xs mb-1 text-gray-400">
            Nome
          </label>

          <input
            type="text"
            x-model="profile.name"
            class="w-full p-3 rounded-lg input-class
                  bg-gray-800 border border-white/10
                  text-white">
        </div>

        <!-- EMAIL -->
        <div>

          <label class="block text-xs mb-1 text-gray-400">
            E-mail
          </label>

          <input
            type="email"
            x-model="profile.email"
            class="w-full p-3 rounded-lg input-class
                  bg-gray-800 border border-white/10
                  text-white">
        </div>

        <!-- TROCAR SENHA -->
        <div class="grid grid-cols-2 gap-4">

          <div>
            <label class="block text-xs mb-1 text-gray-400">
              Nova Senha
            </label>

            <input
              type="password"
              x-model="profile.password"
              class="w-full p-3 rounded-lg input-class
                    bg-gray-800 border border-white/10
                    text-white">
          </div>

          <div>
            <label class="block text-xs mb-1 text-gray-400">
              Confirmar Senha
            </label>

            <input
              type="password"
              x-model="profile.confirmPassword"
              class="w-full p-3 rounded-lg input-class
                    bg-gray-800 border border-white/10
                    text-white">
          </div>

        </div>

      </div>

      <!-- FOOTER -->
      <div class="flex justify-end gap-3 px-6 py-4 border-t border-white/10">

        <button
          @click="showProfileModal = false"
          class="px-5 py-2 rounded-lg input-class
                bg-gray-700 hover:bg-gray-600">

          Cancelar

        </button>

        <button
          @click="saveProfile()"
          class="px-5 py-2 rounded-lg input-class
                bg-blue-600 hover:bg-blue-700">

          Salvar

        </button>

      </div>

    </div>
  </div>

  <!-- NOTIFICATION PANEL -->
  <div
    x-show="showNotifPanel"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 translate-y-2"
    x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100 translate-y-0"
    x-transition:leave-end="opacity-0 translate-y-2"
    @click.away="showNotifPanel = false"
    class="fixed bottom-20 left-2 w-80 z-[200]
           bg-gray-900/95 backdrop-blur-xl
           border border-white/10 rounded-2xl shadow-2xl
           flex flex-col overflow-hidden"
    style="max-height: 480px;">

    <!-- Panel header -->
    <div class="flex items-center justify-between px-4 py-3 border-b border-white/10 shrink-0">
      <div class="flex items-center gap-2">
        <span class="text-sm font-semibold text-gray-100 notif-panel-title">Notificações</span>
        <span
          x-show="notifUnread > 0"
          class="text-[10px] bg-red-500 text-white font-bold px-1.5 py-0.5 rounded-full"
          x-text="notifUnread"></span>
      </div>
      <div class="flex items-center gap-2">
        <button
          x-show="notifUnread > 0"
          @click="markAllRead()"
          class="text-[11px] text-blue-400 hover:text-blue-300 transition">
          Marcar todas como lidas
        </button>
        <button @click="showNotifPanel = false" class="text-gray-500 hover:text-gray-100 transition ml-1">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Notification list -->
    <div class="flex-1 overflow-y-auto">

      <!-- Loading -->
      <div x-show="notifLoading" class="flex justify-center py-8">
        <div class="w-5 h-5 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
      </div>

      <!-- Empty -->
      <div
        x-show="!notifLoading && notifications.length === 0"
        class="flex flex-col items-center justify-center py-10 text-gray-500">
        <svg class="w-8 h-8 mb-2 opacity-40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
        </svg>
        <span class="text-xs">Nenhuma notificação</span>
      </div>

      <!-- Items -->
      <template x-for="notif in notifications" :key="notif.id">
        <div
          class="flex items-start gap-3 px-4 py-3 border-b border-white/5 hover:bg-white/[0.04] transition cursor-pointer group"
          :class="notif.read ? 'opacity-60' : ''"
          @click="goToTicketFromNotif(notif)">

          <!-- Icon -->
          <div class="text-gray-400 shrink-0 mt-0.5 flex items-center" x-html="notifIcon(notif.type)"></div>

          <!-- Content -->
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2">
              <span class="text-xs font-medium text-gray-100 notif-item-title truncate" x-text="notif.title"></span>
              <span x-show="!notif.read" class="w-1.5 h-1.5 rounded-full bg-blue-400 shrink-0"></span>
            </div>
            <p x-show="notif.body" class="text-[11px] text-gray-400 mt-0.5 line-clamp-2" x-text="notif.body"></p>
            <span class="text-[10px] text-gray-600 mt-1 block" x-text="notifTime(notif.created_at)"></span>
          </div>

          <!-- Delete -->
          <button
            @click.stop="deleteNotif(notif)"
            class="shrink-0 text-gray-600 hover:text-red-400 transition opacity-0 group-hover:opacity-100 mt-0.5">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
      </template>
    </div>
  </div>

  <!-- TODO PANEL -->
  <div
    x-show="showTodoPanel"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 translate-y-2"
    x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100 translate-y-0"
    x-transition:leave-end="opacity-0 translate-y-2"
    @click.away="showTodoPanel = false"
    class="fixed bottom-20 left-2 w-96 z-[200]
           bg-gray-900/95 backdrop-blur-xl
           border border-white/10 rounded-2xl shadow-2xl
           flex flex-col overflow-hidden"
    style="max-height: 520px;">

    <!-- Header -->
    <div class="flex items-center justify-between px-4 py-3 border-b border-white/10 shrink-0">
      <div class="flex items-center gap-2">
        <span class="text-sm font-semibold text-gray-100">TODOs</span>
        <span x-show="todoPendingCount > 0"
          class="text-[10px] bg-blue-500 text-white font-bold px-1.5 py-0.5 rounded-full"
          x-text="todoPendingCount"></span>
      </div>
      <button @click="showTodoPanel = false" class="text-gray-500 hover:text-gray-100 transition">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Create TODO form -->
    <div class="px-4 py-3 border-b border-white/5 shrink-0 relative">
      <textarea
        x-model="todoInput"
        @input="onTodoInput($event)"
        @keydown.enter.prevent="submitTodo()"
        rows="2"
        placeholder="@nome O que precisa ser feito... (Enter para enviar)"
        class="w-full text-xs rounded-xl bg-gray-800/60 border border-white/10 px-3 py-2
               focus:outline-none focus:ring-1 focus:ring-blue-500 resize-none placeholder-gray-600">
      </textarea>

      <!-- Mention autocomplete -->
      <div x-show="todoMentionOpen && todoMentionResults.length > 0"
        class="absolute left-4 right-4 mt-1 bg-gray-800 border border-white/10 rounded-xl shadow-xl z-10 overflow-hidden">
        <template x-for="u in todoMentionResults" :key="u.id">
          <div @click="insertTodoMention(u)"
            class="flex items-center gap-2 px-3 py-2 hover:bg-white/10 cursor-pointer">
            <span class="text-xs font-medium text-gray-200" x-text="u.name"></span>
            <span class="text-[10px] text-gray-500" x-text="u.email"></span>
          </div>
        </template>
      </div>

      <div class="flex items-center justify-between mt-1.5">
        <span class="text-[10px] text-gray-600">Use @usuario para atribuir ou escreva sem menção para criar para você</span>
        <button @click="submitTodo()" :disabled="todoSubmitting || !todoInput.trim()"
          class="text-[11px] px-3 py-1 rounded-lg bg-blue-600 hover:bg-blue-700 text-white
                 disabled:opacity-50 disabled:cursor-not-allowed transition">
          Criar
        </button>
      </div>
    </div>

    <!-- TODO list -->
    <div class="flex-1 overflow-y-auto custom-scroll">

      <!-- Tabs: Para mim / Enviados / Concluídos -->
      <div class="flex border-b border-white/5 shrink-0">
        <button @click="todoTab = 'mine'"
          class="flex-1 py-2 text-[11px] font-medium transition"
          :class="todoTab === 'mine' ? 'text-blue-400 border-b-2 border-blue-400' : 'text-gray-500 hover:text-gray-300'">
          Para mim
          <span x-show="pendingMine > 0" class="ml-1 text-[10px] bg-blue-500/30 text-blue-300 px-1 rounded"
            x-text="pendingMine"></span>
        </button>
        <button @click="todoTab = 'sent'"
          class="flex-1 py-2 text-[11px] font-medium transition"
          :class="todoTab === 'sent' ? 'text-blue-400 border-b-2 border-blue-400' : 'text-gray-500 hover:text-gray-300'">
          Enviados
        </button>
        <button @click="todoTab = 'done'"
          class="flex-1 py-2 text-[11px] font-medium transition"
          :class="todoTab === 'done' ? 'text-emerald-400 border-b-2 border-emerald-400' : 'text-gray-500 hover:text-gray-300'">
          Concluídos
        </button>
      </div>

      <template x-if="todoLoading">
        <div class="flex justify-center py-8">
          <div class="w-4 h-4 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
        </div>
      </template>

      <template x-if="!todoLoading">
        <div>
          <template x-for="todo in filteredTodos" :key="todo.id">
            <div class="flex items-start gap-3 px-4 py-3 border-b border-white/5 hover:bg-white/[0.03] transition group">

              <!-- Checkbox — mine tab -->
              <template x-if="todoTab === 'mine'">
                <button @click="checkTodo(todo)" :disabled="todo.done"
                  class="shrink-0 mt-0.5 w-4 h-4 rounded border transition flex items-center justify-center"
                  :class="todo.done
                    ? 'border-emerald-500 bg-emerald-500/20'
                    : 'border-white/30 hover:border-blue-400 bg-transparent'">
                  <svg x-show="todo.done" class="w-2.5 h-2.5 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                  </svg>
                </button>
              </template>

              <!-- Checkbox — sent tab (self-assigned = can check; others = read-only) -->
              <template x-if="todoTab === 'sent'">
                <template x-if="String(todo.assignee.id) === String($store.app.userId)">
                  <button @click="checkTodo(todo)" :disabled="todo.done"
                    class="shrink-0 mt-0.5 w-4 h-4 rounded border transition flex items-center justify-center"
                    :class="todo.done
                      ? 'border-emerald-500 bg-emerald-500/20'
                      : 'border-white/30 hover:border-blue-400 bg-transparent'">
                    <svg x-show="todo.done" class="w-2.5 h-2.5 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                    </svg>
                  </button>
                </template>
                <template x-if="String(todo.assignee.id) !== String($store.app.userId)">
                  <div class="shrink-0 mt-0.5 w-4 h-4 rounded border border-white/20 flex items-center justify-center"></div>
                </template>
              </template>

              <!-- Done tab: checkmark icon only -->
              <template x-if="todoTab === 'done'">
                <div class="shrink-0 mt-0.5 w-4 h-4 rounded border border-emerald-500 bg-emerald-500/20 flex items-center justify-center">
                  <svg class="w-2.5 h-2.5 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                  </svg>
                </div>
              </template>

              <!-- Body -->
              <div class="flex-1 min-w-0">
                <p class="text-xs leading-relaxed"
                  :class="todoTab === 'done' ? 'line-through text-gray-500' : 'text-gray-200'"
                  x-text="todo.body"></p>

                <!-- Pending tabs metadata -->
                <template x-if="todoTab !== 'done'">
                  <div class="flex items-center gap-2 mt-1">
                    <span class="text-[10px] text-gray-600"
                      x-text="todoTab === 'mine' ? 'De: ' + todo.creator.name : 'Para: ' + todo.assignee.name"></span>
                    <span class="text-[10px] text-gray-700">·</span>
                    <span class="text-[10px] text-gray-600" x-text="todoTime(todo.created_at)"></span>
                  </div>
                </template>

                <!-- Done tab metadata -->
                <template x-if="todoTab === 'done'">
                  <div class="mt-1 space-y-0.5">
                    <div class="flex items-center gap-2 flex-wrap">
                      <span class="text-[10px] text-gray-600">De: <span class="text-gray-500" x-text="todo.creator.name"></span></span>
                      <span class="text-[10px] text-gray-700">·</span>
                      <span class="text-[10px] text-gray-600">Para: <span class="text-gray-500" x-text="todo.assignee.name"></span></span>
                    </div>
                    <div class="flex items-center gap-2 flex-wrap">
                      <span class="text-[10px] text-gray-600">Criado: <span x-text="todoTime(todo.created_at)"></span></span>
                      <template x-if="todo.done_at">
                        <span class="text-[10px] text-gray-700">·</span>
                      </template>
                      <template x-if="todo.done_at">
                        <span class="text-[10px] text-emerald-600/80">Concluído: <span x-text="todoTime(todo.done_at)"></span></span>
                      </template>
                    </div>
                  </div>
                </template>
              </div>

            </div>
          </template>

          <div x-show="filteredTodos.length === 0"
            class="flex flex-col items-center justify-center py-10 text-gray-600">
            <svg class="w-7 h-7 mb-2 opacity-30" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
            </svg>
            <span class="text-xs" x-text="todoTab === 'done' ? 'Nenhum TODO concluído' : 'Nenhum TODO'"></span>
          </div>
        </div>
      </template>

    </div>
  </div>

  </div><!-- /dashboard-container -->

  <!-- TOAST -->
  <div id="toast-container" class="fixed top-4 right-4 z-[9999] space-y-2"></div>

  <!-- SESSION EXPIRY MODAL — inline style garante display:none independente do Tailwind -->
  <div id="session-modal" style="display:none" class="fixed inset-0 z-[10000] items-center justify-center bg-black/70 backdrop-blur-sm">
    <div class="w-full max-w-sm mx-4 bg-gray-900/95 backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl p-6">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-10 h-10 rounded-full bg-amber-500/15 border border-amber-500/30 flex items-center justify-center shrink-0">
          <svg class="w-5 h-5 text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <div>
          <h3 class="text-sm font-semibold text-white">Sessão prestes a expirar</h3>
          <p class="text-xs text-gray-400 mt-0.5">Sua sessão está prestes a expirar. Deseja permanecer conectado?</p>
        </div>
      </div>
      <div class="flex gap-3 mt-2">
        <button
          onclick="sessionWatcher.renew()"
          class="flex-1 px-4 py-2.5 rounded-xl text-sm font-semibold bg-blue-600 hover:bg-blue-700 text-white transition">
          Permanecer conectado
        </button>
        <button
          onclick="sessionWatcher.logout()"
          class="px-4 py-2.5 rounded-xl text-sm bg-gray-700/60 hover:bg-gray-700 text-gray-300 transition">
          Encerrar sessão
        </button>
      </div>
    </div>
  </div>

</body>

</html>
