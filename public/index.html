                    <button @click="actionMode=null; actionNota=''" :disabled="actionLoading" class="px-4 py-2 rounded-xl text-sm text-gray-400 hover:text-white bg-white/5 border border-white/10 hover:bg-white/10 transition-all disabled:opacity-50">Cancelar</button>
                  </div>
                </div>
              </div>

              <!-- Transferir equipe (sempre visível) -->
              <div class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl p-4">
                <div class="flex items-center justify-between mb-3">
                  <p class="text-[10px] uppercase tracking-widest text-gray-400 font-semibold">Transferir equipe</p>
                  <button x-show="!transferMode" @click="transferMode=true; transferEquipe=''" class="text-[11px] px-3 py-1 rounded-lg bg-violet-600/20 hover:bg-violet-600/30 text-violet-300 border border-violet-500/30 transition-all">Transferir</button>
                </div>
                <p x-show="!transferMode" class="text-xs text-gray-500">Equipe atual: <span class="text-gray-300" x-text="ticket.equipe || '—'"></span></p>
                <div x-show="transferMode" class="space-y-3">
                  <select x-show="equipeDestinoOptions.length > 0" x-model="transferEquipe" class="w-full px-3 py-2.5 rounded-xl text-sm text-gray-200 bg-gray-800/60 border border-white/10 focus:outline-none focus:ring-2 focus:ring-violet-500/50 transition-colors">
                    <option value="">Selecione a equipe destino...</option>
                    <template x-for="opt in equipeDestinoOptions" :key="opt.value">
                      <option :value="opt.value" x-text="opt.label"></option>
                    </template>
                  </select>
                  <input x-show="equipeDestinoOptions.length === 0" type="text" x-model="transferEquipe" placeholder="Nome da equipe destino..." class="w-full px-3 py-2.5 rounded-xl text-sm text-gray-200 bg-gray-800/60 border border-white/10 placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-violet-500/50 transition-colors" />
                  <div class="flex gap-2">
                    <button @click="transferirChamado()" :disabled="transferLoading || !transferEquipe.trim()" class="flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold bg-violet-600 hover:bg-violet-700 text-white transition-all disabled:opacity-50">
                      <div x-show="transferLoading" class="w-3.5 h-3.5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                      <span x-text="transferLoading ? 'Transferindo...' : 'Confirmar'"></span>
                    </button>
                    <button @click="transferMode=false; transferEquipe=''" :disabled="transferLoading" class="px-4 py-2 rounded-xl text-sm text-gray-400 hover:text-white bg-white/5 border border-white/10 hover:bg-white/10 transition-all disabled:opacity-50">Cancelar</button>
                  </div>
                </div>
              </div>

              <!-- Responsável interno (sempre visível) -->
              <div class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl p-4">
                <div class="flex items-center justify-between mb-3">
                  <p class="text-[10px] uppercase tracking-widest text-gray-400 font-semibold">Responsável interno</p>
                  <button x-show="!assignInternMode" @click="assignInternMode=true; assignInternAgentId=''; loadAgentList()" class="text-[11px] px-3 py-1 rounded-lg bg-indigo-600/20 hover:bg-indigo-600/30 text-indigo-300 border border-indigo-500/30 transition-all">Atribuir</button>
                </div>
                <p x-show="!assignInternMode" class="text-xs text-gray-500">Atual: <span class="text-gray-300" x-text="ticket.responsavel_interno_nome || 'Não atribuído'"></span></p>
                <div x-show="assignInternMode" class="space-y-3">
                  <div x-show="agentList.length === 0" class="flex items-center justify-center py-4">
                    <div class="w-5 h-5 border-2 border-indigo-400 border-t-transparent rounded-full animate-spin"></div>
                  </div>
                  <select x-show="agentList.length > 0" x-model="assignInternAgentId" class="w-full px-3 py-2.5 rounded-xl text-sm text-gray-200 bg-gray-800/60 border border-white/10 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-colors">
                    <option value="">Selecione o agente...</option>
                    <template x-for="ag in agentList" :key="ag.id">
                      <option :value="ag.id" x-text="ag.name"></option>
                    </template>
                  </select>
                  <div class="flex gap-2">
                    <button @click="transferirResponsavelInterno()" :disabled="assignInternLoading || !assignInternAgentId" class="flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold bg-indigo-600 hover:bg-indigo-700 text-white transition-all disabled:opacity-50">
                      <div x-show="assignInternLoading" class="w-3.5 h-3.5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                      <span x-text="assignInternLoading ? 'Atribuindo...' : 'Confirmar'"></span>
                    </button>
                    <button @click="assignInternMode=false; assignInternAgentId=''" :disabled="assignInternLoading" class="px-4 py-2 rounded-xl text-sm text-gray-400 hover:text-white bg-white/5 border border-white/10 hover:bg-white/10 transition-all disabled:opacity-50">Cancelar</button>
                  </div>
                </div>
              </div>

              <!-- Agendar visita (sempre visível) -->
              <div class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl p-4">
                <div class="flex items-center justify-between mb-3">
                  <p class="text-[10px] uppercase tracking-widest text-gray-400 font-semibold">Visita agendada</p>
                  <button x-show="!visitMode" @click="visitMode=true; visitDate=''; visitTime=''" class="text-[11px] px-3 py-1 rounded-lg bg-cyan-600/20 hover:bg-cyan-600/30 text-cyan-300 border border-cyan-500/30 transition-all">Agendar</button>
                </div>
                <p x-show="!visitMode" class="text-xs text-gray-500" x-text="ticket.scheduled_visit_at ? formatDate(ticket.scheduled_visit_at) : 'Nenhuma visita agendada'"></p>
                <div x-show="visitMode" class="space-y-3">
                  <div class="flex gap-2">
                    <input type="date" x-model="visitDate" class="flex-1 px-3 py-2.5 rounded-xl text-sm text-gray-200 bg-gray-800/60 border border-white/10 focus:outline-none focus:ring-2 focus:ring-cyan-500/50 transition-colors" />
                    <input type="time" x-model="visitTime" class="w-28 px-3 py-2.5 rounded-xl text-sm text-gray-200 bg-gray-800/60 border border-white/10 focus:outline-none focus:ring-2 focus:ring-cyan-500/50 transition-colors" />
                  </div>
                  <div class="flex gap-2">
                    <button @click="agendarVisita()" :disabled="visitLoading || !visitDate" class="flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold bg-cyan-600 hover:bg-cyan-700 text-white transition-all disabled:opacity-50">
                      <div x-show="visitLoading" class="w-3.5 h-3.5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                      <span x-text="visitLoading ? 'Agendando...' : 'Confirmar'"></span>
                    </button>
                    <button @click="visitMode=false" :disabled="visitLoading" class="px-4 py-2 rounded-xl text-sm text-gray-400 hover:text-white bg-white/5 border border-white/10 hover:bg-white/10 transition-all disabled:opacity-50">Cancelar</button>
                  </div>
                </div>
              </div>

              <!-- Descrição -->
              <div class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl p-4">
                <div class="flex items-center gap-2 mb-3">
                  <span class="text-sm">📝</span>
                  <h2 class="text-sm font-semibold text-gray-200">Descrição</h2>
                </div>
                <template x-if="ticket.descricao">
                  <p class="text-sm text-gray-300 whitespace-pre-line leading-relaxed" x-text="cleanText(ticket.descricao)"></p>
                </template>
                <template x-if="!ticket.descricao">
                  <p class="text-sm text-gray-600 italic">Sem descrição.</p>
                </template>
              </div>

              <!-- Último acompanhamento (filtra eventos de sistema) -->
              <template x-if="ticket.ultimo_acompanhamento && !cleanText(ticket.ultimo_acompanhamento).startsWith('>>')">
                <div class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl p-4">
                  <div class="flex items-center gap-2 mb-3">
                    <span class="text-sm">💬</span>
                    <h2 class="text-sm font-semibold text-gray-200">Último acompanhamento</h2>
                  </div>
                  <p class="text-sm text-gray-300 whitespace-pre-line leading-relaxed" x-text="cleanText(ticket.ultimo_acompanhamento)"></p>
                </div>
              </template>

              <!-- Classificação -->
              <div class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl p-4">
                <p class="text-[10px] uppercase tracking-widest text-gray-400 mb-3 font-semibold">Classificação</p>
                <div class="space-y-2">
                  <div class="flex items-center justify-between gap-2">
                    <span class="text-[10px] text-gray-500 shrink-0">Tipo</span>
                    <span class="text-[11px] text-gray-200 text-right truncate" x-text="ticket.tipo || '—'"></span>
                  </div>
                  <div class="flex items-center justify-between gap-2">
                    <span class="text-[10px] text-gray-500 shrink-0">Categoria</span>
                    <span class="text-[11px] text-gray-200 text-right truncate" x-text="ticket.categoria || '—'"></span>
                  </div>
                  <div class="flex items-center justify-between gap-2">
                    <span class="text-[10px] text-gray-500 shrink-0">Abertura</span>
                    <span class="text-[11px] text-gray-400" x-text="formatDate(ticket.dtabertura)"></span>
                  </div>
                  <template x-if="ticket.dtencerramento">
                    <div class="flex items-center justify-between gap-2">
                      <span class="text-[10px] text-gray-500 shrink-0">Encerramento</span>
                      <span class="text-[11px] text-emerald-400" x-text="formatDate(ticket.dtencerramento)"></span>
                    </div>
                  </template>
                  <template x-if="ticket.scheduled_visit_at">
                    <div class="flex items-center justify-between gap-2">
                      <span class="text-[10px] text-gray-500 shrink-0">Visita agendada</span>
                      <span class="text-[11px] text-blue-400" x-text="formatDate(ticket.scheduled_visit_at)"></span>
                    </div>
                  </template>
                </div>
              </div>

              <!-- Atribuição -->
              <div class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl p-4">
                <p class="text-[10px] uppercase tracking-widest text-gray-400 mb-3 font-semibold">Atribuição</p>
                <div class="space-y-3">
                  <div class="flex items-center gap-2.5">
                    <div class="w-8 h-8 rounded-lg bg-white/5 border border-white/10 flex items-center justify-center shrink-0 text-gray-400">
                      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    </div>
                    <div class="min-w-0">
                      <p class="text-[10px] text-gray-500">Equipe</p>
                      <p class="text-xs font-medium text-gray-200 truncate" x-text="ticket.equipe || '—'"></p>
                    </div>
                  </div>
                  <div class="flex items-center gap-2.5">
                    <div class="w-8 h-8 rounded-lg bg-white/5 border border-white/10 flex items-center justify-center text-base shrink-0">🧑‍💻</div>
                    <div class="min-w-0">
                      <p class="text-[10px] text-gray-500">Responsável</p>
                      <p class="text-xs font-medium text-gray-200 truncate" x-text="ticket.responsavel || '—'"></p>
                    </div>
                  </div>
                  <template x-if="ticket.responsavel_interno_nome">
                    <div class="flex items-center gap-2.5">
                      <div class="w-8 h-8 rounded-lg bg-violet-500/10 border border-violet-500/20 flex items-center justify-center text-base shrink-0">🏠</div>
                      <div class="min-w-0">
                        <p class="text-[10px] text-gray-500">Responsável interno</p>
                        <p class="text-xs font-medium text-violet-300 truncate" x-text="ticket.responsavel_interno_nome"></p>
                      </div>
                    </div>
                  </template>
                </div>
              </div>

              <!-- Solicitante -->
              <div class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl p-4">
                <p class="text-[10px] uppercase tracking-widest text-gray-400 mb-3 font-semibold">Solicitante</p>
                <div class="space-y-2">
                  <div class="flex items-center justify-between gap-2">
                    <span class="text-[10px] text-gray-500 shrink-0">Contato</span>
                    <span class="text-[11px] text-gray-200 text-right truncate" x-text="ticket.contato || '—'"></span>
                  </div>
                  <div class="flex items-center justify-between gap-2">
                    <span class="text-[10px] text-gray-500 shrink-0">Cliente</span>
                    <span class="text-[11px] text-gray-200 text-right truncate" x-text="ticket.cliente || '—'"></span>
                  </div>
                  <div class="flex items-center justify-between gap-2">
                    <span class="text-[10px] text-gray-500 shrink-0">Localidade</span>
                    <span class="text-[11px] text-gray-200 text-right truncate" x-text="ticket.localidade || '—'"></span>
                  </div>
                </div>
              </div>

            </div>
          </div>

          <!-- TAB: HISTÓRICO -->
          <div x-show="tab==='historico'" class="flex-1 flex flex-col min-h-0 overflow-hidden">

            <!-- Novo acompanhamento (somente quando não leitura) -->
            <template x-if="!readOnly">
              <div class="shrink-0 p-5 border-b border-white/5">
                <div class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl p-4">
                  <div class="flex items-center gap-2 mb-3">
                    <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"/></svg>
                    <h2 class="text-sm font-semibold text-gray-200">Novo acompanhamento</h2>
                  </div>
                  <textarea x-model="novoAcomp.descricao"
                    :disabled="ticket.situacao !== 'Em atendimento'"
                    :placeholder="ticket.situacao === 'Em atendimento' ? 'Descreva o acompanhamento...' : 'Inicie o atendimento antes de comentar'"
                    rows="3" class="w-full px-3 py-2.5 rounded-xl text-sm text-gray-200 bg-gray-800/60 border border-white/10 resize-none placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-colors disabled:opacity-40 disabled:cursor-not-allowed"></textarea>
                  <div class="flex items-center justify-between mt-3 flex-wrap gap-3">
                    <div class="flex items-center gap-4">
                      <label class="flex items-center gap-1.5 cursor-pointer select-none">
                        <button type="button" @click="novoAcomp.solicitante = novoAcomp.solicitante === 'S' ? 'N' : 'S'" class="w-8 h-5 rounded-full transition-colors relative shrink-0" :class="novoAcomp.solicitante === 'S' ? 'bg-blue-600' : 'bg-gray-700'">
                          <span class="absolute top-0.5 w-4 h-4 rounded-full bg-white shadow transition-transform" :class="novoAcomp.solicitante === 'S' ? 'translate-x-3.5' : 'translate-x-0.5'"></span>
                        </button>
                        <span class="text-[11px] text-gray-400">Notif. solicitante</span>
                      </label>
                      <label class="flex items-center gap-1.5 cursor-pointer select-none">
                        <button type="button" @click="novoAcomp.privado = novoAcomp.privado === 'S' ? 'N' : 'S'" class="w-8 h-5 rounded-full transition-colors relative shrink-0" :class="novoAcomp.privado === 'S' ? 'bg-amber-500' : 'bg-gray-700'">
                          <span class="absolute top-0.5 w-4 h-4 rounded-full bg-white shadow transition-transform" :class="novoAcomp.privado === 'S' ? 'translate-x-3.5' : 'translate-x-0.5'"></span>
                        </button>
                        <span class="text-[11px] text-gray-400">Privado</span>
                      </label>
                    </div>
                    <button @click="enviarAcompanhamento()" :disabled="ticket.situacao !== 'Em atendimento' || novoAcomp.loading || !novoAcomp.descricao.trim()" class="flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold bg-blue-600 hover:bg-blue-700 text-white transition-all disabled:opacity-50">
                      <div x-show="novoAcomp.loading" class="w-3.5 h-3.5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                      <span x-text="novoAcomp.loading ? 'Enviando...' : 'Enviar'"></span>
                    </button>
                  </div>
                </div>
              </div>
            </template>

            <!-- Lista de histórico -->
            <div class="flex-1 overflow-y-auto custom-scroll px-5 py-4 space-y-3">
              <template x-if="parsedHistory.length === 0">
                <div class="flex flex-col items-center justify-center py-12 text-gray-600 gap-2">
                  <svg class="w-8 h-8 opacity-30" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                  <p class="text-sm">Sem histórico</p>
                </div>
              </template>
              <template x-for="entry in parsedHistory" :key="entry.id">
                <div>
                  <!-- Evento de sistema -->
                  <template x-if="entry.kind === 'event'">
                    <div class="flex items-center gap-3">
                      <div class="w-8 h-8 rounded-full flex items-center justify-center shrink-0" :class="eventStyle(entry.eventType).dot">
                        <template x-if="entry.eventType === 'status-active'"><svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></template>
                        <template x-if="entry.eventType === 'status-waiting'"><svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg></template>
                        <template x-if="entry.eventType === 'status-closing'"><svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg></template>
                        <template x-if="entry.eventType === 'status-closed'"><svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg></template>
                        <template x-if="entry.eventType === 'transfer'"><svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><path d="M6.99 11L3 15l3.99 4v-3H14v-2H6.99v-3zM21 9l-3.99-4v3H10v2h7.01v3L21 9z"/></svg></template>
                        <template x-if="entry.eventType === 'assign'"><svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></template>
                        <template x-if="entry.eventType === 'attachment'"><svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg></template>
                        <template x-if="entry.eventType === 'time'"><svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg></template>
                        <template x-if="entry.eventType === 'reopen'"><svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg></template>
                        <template x-if="entry.eventType === 'register' || entry.eventType === 'info'"><svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><path d="M11 17h2v-6h-2v6zm1-15C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zM11 9h2V7h-2v2z"/></svg></template>
                      </div>
                      <div class="flex-1 min-w-0">
                        <div class="flex items-center justify-between gap-2 flex-wrap">
                          <span class="text-xs font-medium" :class="eventStyle(entry.eventType).label" x-text="entry.systemLabel"></span>
                          <span class="text-[10px] text-gray-600 shrink-0" x-text="formatDate(entry.data)"></span>
                        </div>
                        <template x-if="entry.humanText">
                          <p class="text-[11px] text-gray-500 mt-0.5 leading-relaxed" x-text="entry.humanText"></p>
                        </template>
                        <template x-if="entry.interno_user_nome || entry.usuario">
                          <p class="text-[10px] text-gray-600 mt-0.5" x-text="entry.interno_user_nome || entry.usuario"></p>
                        </template>
                      </div>
                    </div>
                  </template>
                  <!-- Comentário -->
                  <template x-if="entry.kind === 'comment'">
                    <div class="flex items-start gap-3">
                      <div class="w-8 h-8 rounded-full bg-blue-500/20 border border-blue-500/30 flex items-center justify-center shrink-0 text-xs font-bold text-blue-300 uppercase" x-text="(entry.interno_user_nome || entry.usuario || '?')[0].toUpperCase()"></div>
                      <div class="flex-1 min-w-0">
                        <div class="flex items-center justify-between gap-2 mb-1.5 flex-wrap">
                          <div class="flex items-center gap-2 flex-wrap">
                            <span class="text-xs font-semibold text-gray-200" x-text="entry.interno_user_nome || entry.usuario || '—'"></span>
                            <template x-if="entry.subsituacao">
                              <span class="text-[10px] px-1.5 py-0.5 rounded bg-white/5 border border-white/10 text-gray-400" x-text="entry.subsituacao"></span>
                            </template>
                            <template x-if="entry.is_solucao">
                              <span class="text-[10px] px-1.5 py-0.5 rounded bg-emerald-500/10 border border-emerald-500/20 text-emerald-400">Solução</span>
                            </template>
                            <template x-if="entry.is_privado">
                              <span class="text-[10px] px-1.5 py-0.5 rounded bg-amber-500/10 border border-amber-500/20 text-amber-400">Privado</span>
                            </template>
                          </div>
                          <span class="text-[10px] text-gray-600 shrink-0 whitespace-nowrap" x-text="formatDate(entry.data)"></span>
                        </div>
                        <div class="bg-gray-900/50 border border-white/[0.06] rounded-xl px-4 py-3">
                          <p class="text-sm text-gray-300 whitespace-pre-line leading-relaxed" x-text="entry.humanText"></p>
                        </div>
                      </div>
                    </div>
                  </template>
                </div>
              </template>
            </div>

          </div>

          <!-- TAB: ANEXOS -->
          <div x-show="tab==='anexos'" class="flex-1 flex flex-col min-h-0 overflow-hidden">
            <div class="shrink-0 p-5 border-b border-white/5">
              <label class="flex items-center justify-center gap-2 w-full py-3 rounded-xl border border-dashed border-white/30 hover:border-blue-500/50 hover:bg-blue-500/5 text-sm text-gray-400 hover:text-blue-300 cursor-pointer transition-all">
                <template x-if="!uploadLoading">
                  <span class="flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
                    Clique para anexar arquivo
                  </span>
                </template>
                <template x-if="uploadLoading">
                  <span class="flex items-center gap-2">
                    <div class="w-4 h-4 border-2 border-blue-400 border-t-transparent rounded-full animate-spin"></div>
                    Enviando...
                  </span>
                </template>
                <input type="file" class="hidden" :disabled="uploadLoading" @change="uploadAttachment($event)" />
              </label>
            </div>
            <div class="flex-1 overflow-y-auto custom-scroll px-5 py-4">
              <template x-if="loadingAttachments">
                <div class="flex items-center justify-center py-12">
                  <div class="w-6 h-6 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                </div>
              </template>
              <template x-if="!loadingAttachments && attachments.length === 0">
                <div class="flex flex-col items-center justify-center py-12 text-gray-600 gap-2">
                  <svg class="w-8 h-8 opacity-30" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
                  <p class="text-sm">Nenhum anexo</p>
                </div>
              </template>
              <template x-if="!loadingAttachments && attachments.length > 0">
                <div class="space-y-2">
                  <template x-for="att in attachments" :key="att.nrsequencia">
                    <div class="flex items-center justify-between gap-3 px-4 py-3 rounded-xl bg-gray-900/40 border border-white/[0.06] hover:border-white/10 transition-colors">
                      <div class="flex items-center gap-3 min-w-0">
                        <svg class="w-4 h-4 text-gray-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
                        <div class="min-w-0">
                          <p class="text-sm text-gray-200 truncate" x-text="att.filename || att.nmanexo || 'Arquivo'"></p>
                          <p class="text-[10px] text-gray-600" x-text="att.dhanexo ? formatDate(att.dhanexo) : ''"></p>
                        </div>
                      </div>
                      <button @click="downloadAttachment(att.nrsequencia, att.nmanexo, att.cdclassificacao, att.filename || att.nmanexo || 'arquivo')" class="shrink-0 flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[11px] text-blue-300 bg-blue-500/10 hover:bg-blue-500/20 border border-blue-500/20 transition-all">
                        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                        Baixar
                      </button>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </div>

        </div>
      </div>
    </template>
  </div>
</body>

</html>
