<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark" x-data x-init="$store.app.init()">
<head>
  <meta charset="UTF-8">
  <title>RM1 Tecnologia</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Anti-FOUC: aplica o tema salvo ANTES do primeiro paint -->
  <script>
    (function () {
      var t = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  <link rel="stylesheet" href="/css/style.css">

  <!-- Utilitários globais -->
  <script src="/js/utils/toast.js"></script>
  <script src="/js/utils/token.js"></script>

  <!-- Componentes de página -->
  <script src="/js/pages/dashboard-page.js"></script>
  <script src="/js/pages/tickets-page.js"></script>
  <script src="/js/pages/ticket-view-page.js"></script>
  <script src="/js/pages/users-page.js"></script>
  <script src="/js/pages/hotels-page.js"></script>
  <script src="/js/pages/manage-categories-page.js"></script>
  <script src="/js/pages/activity-report-page.js"></script>
  <script src="/js/pages/teams-page.js"></script>
  <script src="/js/pages/mural-page.js"></script>
  <script src="/js/pages/qualitor-page.js"></script>
  <script src="/js/pages/helpdesk-ticket-modal.js"></script>
  <script src="/js/pages/qualitor-ticket-modal.js"></script>
  <script src="/js/pages/admin-health-page.js"></script>

  <!-- Shell e bootstrap -->
  <script src="/js/shell.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/login.js"></script>

  <script src="/vendor/alpine.min.js" defer></script>
  <script src="/vendor/tailwind-browser.js"></script>
  <script src="/vendor/chart.umd.min.js"></script>
  <script src="/vendor/dayjs.min.js"></script>
  <script src="/vendor/dayjs-pt-br.js"></script>
  <script>
    dayjs.locale('pt-br')
  </script>
</head>

<body class="bg-gray-900">

  <!-- LOGIN -->
  <div id="login-view" x-show="$store.app.currentView === 'login'" class="login-container">
    <form id="login-form">
      <div class="container">
        <img class="login-logo" src="/assets/images/logo-banner.png" alt="Logo">
        <input type="text" id="email" placeholder="Email" class="input-class">
        <input type="password" id="password" placeholder="Senha" class="input-class">
        <button id="login-btn" class="input-class">Entrar</button>
        <p id="login-error" class="error"></p>
      </div>
    </form>
  </div>

  <!-- DASHBOARD view -->
  <div x-show="$store.app.currentView === 'dashboard'" x-data="dashboard()"
    class="dashboard-container flex flex-1 h-screen">

    <!-- SIDEBAR -->
    <div class="relative dashboard-sidebar flex flex-2.2 flex-col justify-between
            bg-gray-800/90 backdrop-blur-xl
            border border-white/10 rounded-2xl shadow-xl p-4 m-2 overflow-hidden">

      <!-- Menus na metade de cima -->
      <div class="flex flex-col">

        <div id="logo-container" class=" mb-8">
          <img id="logo" src="/assets/images/logo-branco.png" alt="Logo" class="ml-2">
        </div>

        <ul>
          <template x-for="item in $store.app.menus" :key="item.page">
            <li>
              <a href="#" class="menu-item text-sm" :class="{ 'bg-gray-700': $store.app.currentPage === item.page }"
                @click.prevent="goTo(item.page)" x-text="item.label">
              </a>
            </li>
          </template>
        </ul>

        <!-- NOTIFICATION BELL -->
        <div class="mt-4 border-t border-white/10 pt-3">
          <button
            @click="toggleNotifPanel()"
            class="w-full flex items-center justify-between px-3 py-2.5 rounded-xl
                   hover:bg-white/[0.06] transition text-left group">
            <span class="flex items-center gap-2.5 text-sm text-gray-300 group-hover:text-white transition">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
              </svg>
              Notificações
            </span>
            <span
              x-show="notifUnread > 0"
              class="text-[10px] bg-red-500 text-white font-bold px-1.5 py-0.5 rounded-full min-w-5 text-center leading-tight"
              x-text="notifUnread > 9 ? '9+' : notifUnread">
            </span>
          </button>

          <!-- TODO BUTTON (admin/agent only) -->
          <template x-if="['admin','agent'].includes($store.app.role)">
            <button
              @click="toggleTodoPanel()"
              class="mt-1 w-full flex items-center justify-between px-3 py-2.5 rounded-xl
                     hover:bg-white/[0.06] transition text-left group">
              <span class="flex items-center gap-2.5 text-sm text-gray-300 group-hover:text-white transition">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
                </svg>
                TODOs
              </span>
              <span x-show="todoPendingCount > 0"
                class="text-[10px] bg-blue-500 text-white font-bold px-1.5 py-0.5 rounded-full min-w-5 text-center leading-tight"
                x-text="todoPendingCount > 9 ? '9+' : todoPendingCount">
              </span>
            </button>
          </template>

          <!-- STATUS DO SISTEMA (admin only) -->
          <template x-if="$store.app.role === 'admin'">
            <button
              @click="$store.app.navigate('admin-health')"
              class="mt-1 w-full flex items-center justify-between px-3 py-2.5 rounded-xl
                     hover:bg-white/[0.06] transition text-left group"
              :class="$store.app.currentPage === 'admin-health' ? 'bg-white/[0.06] text-white' : ''">
              <span class="flex items-center gap-2.5 text-sm text-gray-300 group-hover:text-white transition">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 17a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                </svg>
                Status do Sistema
              </span>
            </button>
          </template>

          <!-- THEME TOGGLE -->
          <button
            @click="$store.app.toggleTheme()"
            class="mt-1 w-full flex items-center justify-between px-3 py-2.5 rounded-xl
                   hover:bg-white/[0.06] transition text-left group">
            <span class="flex items-center gap-2.5 text-sm text-gray-300 group-hover:text-white transition">
              <!-- Sun icon (shown in dark mode → click to go light) -->
              <svg x-show="$store.app.theme === 'dark'"
                class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 7a5 5 0 100 10A5 5 0 0012 7z"/>
              </svg>
              <!-- Moon icon (shown in light mode → click to go dark) -->
              <svg x-show="$store.app.theme === 'light'"
                class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
              </svg>
              <span x-text="$store.app.theme === 'dark' ? 'Modo Claro' : 'Modo Escuro'"></span>
            </span>
            <!-- Visual toggle pill -->
            <div class="relative w-9 h-5 rounded-full transition-colors duration-300"
              :class="$store.app.theme === 'light' ? 'bg-blue-500' : 'bg-gray-600'">
              <div class="absolute top-0.5 w-4 h-4 rounded-full bg-white shadow transition-all duration-300"
                :class="$store.app.theme === 'light' ? 'left-4' : 'left-0.5'">
              </div>
            </div>
          </button>
        </div>

      </div>

      <!-- Botão logout na metade de baixo -->


      <!-- PARTE DE BAIXO -->

      <div class="flex flex-col gap-3">

        <!-- USER CARD -->

        <div
          @click="openProfileModal()"

          class="
            flex
            items-center
            gap-3
            p-1
            rounded-2xl
            bg-white/[0.03]
            border border-white/10
            hover:bg-white/[0.06]
            cursor-pointer
            transition">

          <!-- AVATAR -->

    
          <div
            class="
              w-12 h-12
              shrink-0
              rounded-full
              overflow-hidden
              bg-gradient-to-br
              from-blue-500
              to-cyan-600
              flex
              items-center
              justify-center
              text-white
              font-semibold"
          >

            <template x-if="$store.app.avatarUrl">
              <img :src="$store.app.avatarUrl" class="w-full h-full object-cover">
            </template>

            <template x-if="!$store.app.avatarUrl">
              <span
                x-text="
                  ($store.app.userName || 'U')
                    .split(' ')
                    .filter(p => p.length)
                    .map(p => p[0])
                    .slice(0, 2)
                    .join('')
                    .toUpperCase()
                ">
              </span>
            </template>

          </div>

          <!-- INFO -->

          <div class="flex-1 min-w-0">

            <div
              class="
                text-sm
                font-medium
                truncate">

              <span x-text="$store.app.userName || 'Usuário'"></span>

            </div>

            <div
              class="
                text-xs
                text-gray-400">

              Editar perfil

            </div>

          </div>

          <!-- SETA -->

          <div
            class="
              text-gray-500
              text-sm">

            →

          </div>

        </div>

        <!-- LOGOUT -->

        <button
          @click="logout()"

          class="
            logout-btn
            w-full
            py-2
            px-3
            bg-red-600
            rounded
            hover:bg-red-500">

          Logout

        </button>

      </div>


      


    </div>

    <div class="flex flex-17 bg-gray-900 min-h-0 overflow-hidden">
      <!-- MAIN CONTENT -->
      <div id="page-container" class="flex flex-1 flex-col bg-gray-900 min-h-0">

      </div>

    </div>

    <!-- PROFILE MODAL -->
  <div
    x-show="showProfileModal"
    x-transition
    class="fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm">

    <div
      @click.away="showProfileModal = false"
      class="w-full max-w-2xl mx-4

            bg-gray-900/90
            backdrop-blur-xl
            border border-white/10
            rounded-2xl
            shadow-2xl">

      <!-- HEADER -->
      <div class="flex items-center justify-between px-6 py-4 border-b border-white/10">

        <h2 class="text-lg font-semibold text-white">
          Meu Perfil
        </h2>

        <button
          @click="showProfileModal = false"
          class="text-gray-400 hover:text-white">
          ✕
        </button>

      </div>

      <!-- BODY -->
      <div class="p-6 space-y-6">

        <!-- FOTO -->
        <div class="flex flex-col items-center">

          <div
            class="w-28 h-28 rounded-full overflow-hidden
                  border-2 border-blue-500 shadow-lg">

            <img
              :src="$store.app.avatarUrl || '/assets/default-user.png'"
              class="w-full h-full object-cover">
          </div>

          <label
            class="mt-3 px-4 py-2 rounded-lg input-class
                  bg-blue-600 hover:bg-blue-700
                  text-sm font-medium
                  cursor-pointer">

            Alterar Foto

            <input
              type="file"
              accept="image/*"
              class="hidden"
              @change="uploadProfilePhoto($event)">
          </label>

        </div>

        <!-- NOME -->
        <div>

          <label class="block text-xs mb-1 text-gray-400">
            Nome
          </label>

          <input
            type="text"
            x-model="profile.name"
            class="w-full p-3 rounded-lg input-class
                  bg-gray-800 border border-white/10
                  text-white">
        </div>

        <!-- EMAIL -->
        <div>

          <label class="block text-xs mb-1 text-gray-400">
            E-mail
          </label>

          <input
            type="email"
            x-model="profile.email"
            class="w-full p-3 rounded-lg input-class
                  bg-gray-800 border border-white/10
                  text-white">
        </div>

        <!-- TROCAR SENHA -->
        <div class="grid grid-cols-2 gap-4">

          <div>
            <label class="block text-xs mb-1 text-gray-400">
              Nova Senha
            </label>

            <input
              type="password"
              x-model="profile.password"
              class="w-full p-3 rounded-lg input-class
                    bg-gray-800 border border-white/10
                    text-white">
          </div>

          <div>
            <label class="block text-xs mb-1 text-gray-400">
              Confirmar Senha
            </label>

            <input
              type="password"
              x-model="profile.confirmPassword"
              class="w-full p-3 rounded-lg input-class
                    bg-gray-800 border border-white/10
                    text-white">
          </div>

        </div>

      </div>

      <!-- FOOTER -->
      <div class="flex justify-end gap-3 px-6 py-4 border-t border-white/10">

        <button
          @click="showProfileModal = false"
          class="px-5 py-2 rounded-lg input-class
                bg-gray-700 hover:bg-gray-600">

          Cancelar

        </button>

        <button
          @click="saveProfile()"
          class="px-5 py-2 rounded-lg input-class
                bg-blue-600 hover:bg-blue-700">

          Salvar

        </button>

      </div>

    </div>
  </div>

  <!-- NOTIFICATION PANEL -->
  <div
    x-show="showNotifPanel"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 translate-y-2"
    x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100 translate-y-0"
    x-transition:leave-end="opacity-0 translate-y-2"
    @click.away="showNotifPanel = false"
    class="fixed bottom-20 left-2 w-80 z-[200]
           bg-gray-900/95 backdrop-blur-xl
           border border-white/10 rounded-2xl shadow-2xl
           flex flex-col overflow-hidden"
    style="max-height: 480px;">

    <!-- Panel header -->
    <div class="flex items-center justify-between px-4 py-3 border-b border-white/10 shrink-0">
      <div class="flex items-center gap-2">
        <span class="text-sm font-semibold text-gray-100 notif-panel-title">Notificações</span>
        <span
          x-show="notifUnread > 0"
          class="text-[10px] bg-red-500 text-white font-bold px-1.5 py-0.5 rounded-full"
          x-text="notifUnread"></span>
      </div>
      <div class="flex items-center gap-2">
        <button
          x-show="notifUnread > 0"
          @click="markAllRead()"
          class="text-[11px] text-blue-400 hover:text-blue-300 transition">
          Marcar todas como lidas
        </button>
        <button @click="showNotifPanel = false" class="text-gray-500 hover:text-gray-100 transition ml-1">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Notification list -->
    <div class="flex-1 overflow-y-auto">

      <!-- Loading -->
      <div x-show="notifLoading" class="flex justify-center py-8">
        <div class="w-5 h-5 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
      </div>

      <!-- Empty -->
      <div
        x-show="!notifLoading && notifications.length === 0"
        class="flex flex-col items-center justify-center py-10 text-gray-500">
        <svg class="w-8 h-8 mb-2 opacity-40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
        </svg>
        <span class="text-xs">Nenhuma notificação</span>
      </div>

      <!-- Items -->
      <template x-for="notif in notifications" :key="notif.id">
        <div
          class="flex items-start gap-3 px-4 py-3 border-b border-white/5 hover:bg-white/[0.04] transition cursor-pointer group"
          :class="notif.read ? 'opacity-60' : ''"
          @click="goToTicketFromNotif(notif)">

          <!-- Icon -->
          <div class="text-gray-400 shrink-0 mt-0.5 flex items-center" x-html="notifIcon(notif.type)"></div>

          <!-- Content -->
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2">
              <span class="text-xs font-medium text-gray-100 notif-item-title truncate" x-text="notif.title"></span>
              <span x-show="!notif.read" class="w-1.5 h-1.5 rounded-full bg-blue-400 shrink-0"></span>
            </div>
            <p x-show="notif.body" class="text-[11px] text-gray-400 mt-0.5 line-clamp-2" x-text="notif.body"></p>
            <span class="text-[10px] text-gray-600 mt-1 block" x-text="notifTime(notif.created_at)"></span>
          </div>

          <!-- Delete -->
          <button
            @click.stop="deleteNotif(notif)"
            class="shrink-0 text-gray-600 hover:text-red-400 transition opacity-0 group-hover:opacity-100 mt-0.5">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
      </template>
    </div>
  </div>

  <!-- TODO PANEL -->
  <div
    x-show="showTodoPanel"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 translate-y-2"
    x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100 translate-y-0"
    x-transition:leave-end="opacity-0 translate-y-2"
    @click.away="showTodoPanel = false"
    class="fixed bottom-20 left-2 w-96 z-[200]
           bg-gray-900/95 backdrop-blur-xl
           border border-white/10 rounded-2xl shadow-2xl
           flex flex-col overflow-hidden"
    style="max-height: 520px;">

    <!-- Header -->
    <div class="flex items-center justify-between px-4 py-3 border-b border-white/10 shrink-0">
      <div class="flex items-center gap-2">
        <span class="text-sm font-semibold text-gray-100">TODOs</span>
        <span x-show="todoPendingCount > 0"
          class="text-[10px] bg-blue-500 text-white font-bold px-1.5 py-0.5 rounded-full"
          x-text="todoPendingCount"></span>
      </div>
      <button @click="showTodoPanel = false" class="text-gray-500 hover:text-gray-100 transition">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Create TODO form -->
    <div class="px-4 py-3 border-b border-white/5 shrink-0 relative">
      <textarea
        x-model="todoInput"
        @input="onTodoInput($event)"
        @keydown.enter.prevent="submitTodo()"
        rows="2"
        placeholder="@nome O que precisa ser feito... (Enter para enviar)"
        class="w-full text-xs rounded-xl bg-gray-800/60 border border-white/10 px-3 py-2
               focus:outline-none focus:ring-1 focus:ring-blue-500 resize-none placeholder-gray-600">
      </textarea>

      <!-- Mention autocomplete -->
      <div x-show="todoMentionOpen && todoMentionResults.length > 0"
        class="absolute left-4 right-4 mt-1 bg-gray-800 border border-white/10 rounded-xl shadow-xl z-10 overflow-hidden">
        <template x-for="u in todoMentionResults" :key="u.id">
          <div @click="insertTodoMention(u)"
            class="flex items-center gap-2 px-3 py-2 hover:bg-white/10 cursor-pointer">
            <span class="text-xs font-medium text-gray-200" x-text="u.name"></span>
            <span class="text-[10px] text-gray-500" x-text="u.email"></span>
          </div>
        </template>
      </div>

      <div class="flex items-center justify-between mt-1.5">
        <span class="text-[10px] text-gray-600">Use @usuario para atribuir ou escreva sem menção para criar para você</span>
        <button @click="submitTodo()" :disabled="todoSubmitting || !todoInput.trim()"
          class="text-[11px] px-3 py-1 rounded-lg bg-blue-600 hover:bg-blue-700 text-white
                 disabled:opacity-50 disabled:cursor-not-allowed transition">
          Criar
        </button>
      </div>
    </div>

    <!-- TODO list -->
    <div class="flex-1 overflow-y-auto custom-scroll">

      <!-- Tabs: Para mim / Enviados / Concluídos -->
      <div class="flex border-b border-white/5 shrink-0">
        <button @click="todoTab = 'mine'"
          class="flex-1 py-2 text-[11px] font-medium transition"
          :class="todoTab === 'mine' ? 'text-blue-400 border-b-2 border-blue-400' : 'text-gray-500 hover:text-gray-300'">
          Para mim
          <span x-show="pendingMine > 0" class="ml-1 text-[10px] bg-blue-500/30 text-blue-300 px-1 rounded"
            x-text="pendingMine"></span>
        </button>
        <button @click="todoTab = 'sent'"
          class="flex-1 py-2 text-[11px] font-medium transition"
          :class="todoTab === 'sent' ? 'text-blue-400 border-b-2 border-blue-400' : 'text-gray-500 hover:text-gray-300'">
          Enviados
        </button>
        <button @click="todoTab = 'done'"
          class="flex-1 py-2 text-[11px] font-medium transition"
          :class="todoTab === 'done' ? 'text-emerald-400 border-b-2 border-emerald-400' : 'text-gray-500 hover:text-gray-300'">
          Concluídos
        </button>
      </div>

      <template x-if="todoLoading">
        <div class="flex justify-center py-8">
          <div class="w-4 h-4 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
        </div>
      </template>

      <template x-if="!todoLoading">
        <div>
          <template x-for="todo in filteredTodos" :key="todo.id">
            <div class="flex items-start gap-3 px-4 py-3 border-b border-white/5 hover:bg-white/[0.03] transition group">

              <!-- Checkbox — mine tab -->
              <template x-if="todoTab === 'mine'">
                <button @click="checkTodo(todo)" :disabled="todo.done"
                  class="shrink-0 mt-0.5 w-4 h-4 rounded border transition flex items-center justify-center"
                  :class="todo.done
                    ? 'border-emerald-500 bg-emerald-500/20'
                    : 'border-white/30 hover:border-blue-400 bg-transparent'">
                  <svg x-show="todo.done" class="w-2.5 h-2.5 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                  </svg>
                </button>
              </template>

              <!-- Checkbox — sent tab (self-assigned = can check; others = read-only) -->
              <template x-if="todoTab === 'sent'">
                <template x-if="String(todo.assignee.id) === String($store.app.userId)">
                  <button @click="checkTodo(todo)" :disabled="todo.done"
                    class="shrink-0 mt-0.5 w-4 h-4 rounded border transition flex items-center justify-center"
                    :class="todo.done
                      ? 'border-emerald-500 bg-emerald-500/20'
                      : 'border-white/30 hover:border-blue-400 bg-transparent'">
                    <svg x-show="todo.done" class="w-2.5 h-2.5 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                    </svg>
                  </button>
                </template>
                <template x-if="String(todo.assignee.id) !== String($store.app.userId)">
                  <div class="shrink-0 mt-0.5 w-4 h-4 rounded border border-white/20 flex items-center justify-center"></div>
                </template>
              </template>

              <!-- Done tab: checkmark icon only -->
              <template x-if="todoTab === 'done'">
                <div class="shrink-0 mt-0.5 w-4 h-4 rounded border border-emerald-500 bg-emerald-500/20 flex items-center justify-center">
                  <svg class="w-2.5 h-2.5 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                  </svg>
                </div>
              </template>

              <!-- Body -->
              <div class="flex-1 min-w-0">
                <p class="text-xs leading-relaxed"
                  :class="todoTab === 'done' ? 'line-through text-gray-500' : 'text-gray-200'"
                  x-text="todo.body"></p>

                <!-- Pending tabs metadata -->
                <template x-if="todoTab !== 'done'">
                  <div class="flex items-center gap-2 mt-1">
                    <span class="text-[10px] text-gray-600"
                      x-text="todoTab === 'mine' ? 'De: ' + todo.creator.name : 'Para: ' + todo.assignee.name"></span>
                    <span class="text-[10px] text-gray-700">·</span>
                    <span class="text-[10px] text-gray-600" x-text="todoTime(todo.created_at)"></span>
                  </div>
                </template>

                <!-- Done tab metadata -->
                <template x-if="todoTab === 'done'">
                  <div class="mt-1 space-y-0.5">
                    <div class="flex items-center gap-2 flex-wrap">
                      <span class="text-[10px] text-gray-600">De: <span class="text-gray-500" x-text="todo.creator.name"></span></span>
                      <span class="text-[10px] text-gray-700">·</span>
                      <span class="text-[10px] text-gray-600">Para: <span class="text-gray-500" x-text="todo.assignee.name"></span></span>
                    </div>
                    <div class="flex items-center gap-2 flex-wrap">
                      <span class="text-[10px] text-gray-600">Criado: <span x-text="todoTime(todo.created_at)"></span></span>
                      <template x-if="todo.done_at">
                        <span class="text-[10px] text-gray-700">·</span>
                      </template>
                      <template x-if="todo.done_at">
                        <span class="text-[10px] text-emerald-600/80">Concluído: <span x-text="todoTime(todo.done_at)"></span></span>
                      </template>
                    </div>
                  </div>
                </template>
              </div>

            </div>
          </template>

          <div x-show="filteredTodos.length === 0"
            class="flex flex-col items-center justify-center py-10 text-gray-600">
            <svg class="w-7 h-7 mb-2 opacity-30" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
            </svg>
            <span class="text-xs" x-text="todoTab === 'done' ? 'Nenhum TODO concluído' : 'Nenhum TODO'"></span>
          </div>
        </div>
      </template>

    </div>
  </div>

  </div><!-- /dashboard-container -->

  <!-- TOAST -->
  <div id="toast-container" class="fixed top-4 right-4 z-[9999] space-y-2"></div>

  <!-- SESSION EXPIRY MODAL — inline style garante display:none independente do Tailwind -->
  <div id="session-modal" style="display:none" class="fixed inset-0 z-[10000] items-center justify-center bg-black/70 backdrop-blur-sm">
    <div class="w-full max-w-sm mx-4 bg-gray-900/95 backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl p-6">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-10 h-10 rounded-full bg-amber-500/15 border border-amber-500/30 flex items-center justify-center shrink-0">
          <svg class="w-5 h-5 text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <div>
          <h3 class="text-sm font-semibold text-white">Sessão prestes a expirar</h3>
          <p class="text-xs text-gray-400 mt-0.5">Sua sessão está prestes a expirar. Deseja permanecer conectado?</p>
        </div>
      </div>
      <div class="flex gap-3 mt-2">
        <button
          onclick="sessionWatcher.renew()"
          class="flex-1 px-4 py-2.5 rounded-xl text-sm font-semibold bg-blue-600 hover:bg-blue-700 text-white transition">
          Permanecer conectado
        </button>
        <button
          onclick="sessionWatcher.logout()"
          class="px-4 py-2.5 rounded-xl text-sm bg-gray-700/60 hover:bg-gray-700 text-gray-300 transition">
          Encerrar sessão
        </button>
      </div>
    </div>
  </div>

  <!-- ── MODAL GLOBAL: HELPDESK TICKET ── -->
  <div x-data="helpdeskTicketModal()" x-show="open"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    @keydown.escape.window="open && close()"
    class="fixed inset-0 z-[60] flex items-center justify-center bg-black/60 backdrop-blur-sm px-3 py-4"
    style="display:none">
    <div @click.outside="close()" class="relative w-full max-w-3xl flex flex-col bg-gray-900/95 backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl overflow-hidden" style="height:min(92vh,820px)">

      <template x-if="loading">
        <div class="flex-1 flex flex-col items-center justify-center gap-3 text-gray-500">
          <div class="w-8 h-8 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
          <p class="text-sm">Carregando chamado...</p>
        </div>
      </template>

      <template x-if="!loading && ticket">
        <div class="flex flex-col flex-1 min-h-0">

          <!-- HEADER -->
          <div class="shrink-0 px-5 pt-4 pb-3 border-b border-white/10 bg-blue-950/30">
            <div class="flex items-start justify-between gap-3">
              <div class="flex-1 min-w-0">
                <p class="text-[10px] text-blue-400 font-semibold uppercase tracking-wider mb-1">Helpdesk · #<span x-text="ticket.id"></span></p>
                <h2 class="text-base font-bold text-gray-100 leading-snug break-words" x-text="ticket.title"></h2>
                <div class="flex flex-wrap items-center gap-1.5 mt-2">
                  <span class="text-[11px] font-semibold px-2 py-0.5 rounded-full" :class="statusClass(ticket.status)" x-text="statusLabel(ticket.status)"></span>
                  <span class="text-[11px] font-semibold px-2 py-0.5 rounded-full" :class="priorityClass(ticket.priority)" x-text="'Prioridade ' + priorityLabel(ticket.priority)"></span>
                  <span class="text-[11px] text-gray-400 px-2 py-0.5 rounded-full bg-white/5 border border-white/10" x-text="progressLabel(ticket.progress)"></span>
                  <template x-if="slaLabel">
                    <span class="text-[11px] font-semibold px-2 py-0.5 rounded-full border"
                          :class="slaLabel.color==='emerald'?'bg-emerald-500/10 text-emerald-400 border-emerald-500/25':slaLabel.color==='amber'?'bg-amber-500/10 text-amber-400 border-amber-500/25':'bg-red-500/10 text-red-400 border-red-500/25'"
                          x-text="'SLA · '+slaLabel.text"></span>
                  </template>
                </div>
              </div>
              <div class="flex items-center gap-1.5 shrink-0">
                <button @click="Alpine.store('app').selectedTicket=ticket;Alpine.store('app').navigate('ticket-view');close()" title="Abrir página completa" class="p-1.5 rounded-lg text-gray-500 hover:text-blue-400 hover:bg-blue-500/10 transition">
                  <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                </button>
                <button @click="close()" class="p-1.5 rounded-lg text-gray-500 hover:text-red-400 hover:bg-red-500/10 transition">
                  <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
              </div>
            </div>
            <!-- TABS -->
            <div class="flex gap-1 mt-3">
              <button @click="tab='details'" class="px-3 py-1.5 rounded-lg text-xs font-medium transition" :class="tab==='details'?'bg-blue-600 text-white':'text-gray-400 hover:text-gray-200 hover:bg-white/5'">Detalhes</button>
              <button @click="tab='history'" class="px-3 py-1.5 rounded-lg text-xs font-medium transition" :class="tab==='history'?'bg-blue-600 text-white':'text-gray-400 hover:text-gray-200 hover:bg-white/5'">Histórico <span class="ml-1 text-[10px] opacity-60" x-text="'('+timeline.length+')'"></span></button>
              <button @click="tab='attachments'" class="px-3 py-1.5 rounded-lg text-xs font-medium transition" :class="tab==='attachments'?'bg-blue-600 text-white':'text-gray-400 hover:text-gray-200 hover:bg-white/5'">Anexos <span class="ml-1 text-[10px] opacity-60" x-text="'('+attachments.length+')'"></span></button>
            </div>
          </div>

          <!-- TAB DETALHES -->
          <div x-show="tab==='details'" class="flex-1 overflow-y-auto custom-scroll px-5 py-4 space-y-3">

            <!-- AÇÕES -->
            <div x-show="ticket.status !== 'cancelled'" class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl p-4">
              <div class="flex items-center justify-between">
                <p class="text-[10px] uppercase tracking-widest text-gray-400 font-semibold">Ações</p>
                <div class="flex items-center gap-2">
                  <button x-show="ticket.status==='open' && ticket.progress==='waiting' && actionMode!=='iniciar'"
                    @click="actionMode='iniciar'"
                    class="text-[11px] px-3 py-1 rounded-lg bg-blue-600/20 hover:bg-blue-600/30 text-blue-300 border border-blue-500/30 transition-all">Iniciar</button>
                  <button x-show="ticket.status==='open' && !['waiting','awaiting_confirmation','done'].includes(ticket.progress) && actionMode!=='finalizar'"
                    @click="actionMode='finalizar'; finishReason=''"
                    class="text-[11px] px-3 py-1 rounded-lg bg-red-600/20 hover:bg-red-600/30 text-red-300 border border-red-500/30 transition-all">Finalizar</button>
                  <button x-show="ticket.progress==='awaiting_confirmation'"
                    @click="closeTicket()" :disabled="actionLoading"
                    class="text-[11px] px-3 py-1 rounded-lg bg-emerald-600/20 hover:bg-emerald-600/30 text-emerald-300 border border-emerald-500/30 transition-all disabled:opacity-50">Aceitar resolução</button>
                  <button x-show="ticket.status==='closed'"
                    @click="reopenTicket()" :disabled="actionLoading"
                    class="text-[11px] px-3 py-1 rounded-lg bg-amber-600/20 hover:bg-amber-600/30 text-amber-300 border border-amber-500/30 transition-all disabled:opacity-50">Reabrir</button>
                  <button x-show="actionMode" @click="actionMode=''"
                    class="text-[11px] px-2 py-1 rounded-lg bg-white/5 hover:bg-white/10 text-gray-500 border border-white/10 transition-all">✕</button>
                </div>
              </div>
              <p x-show="!actionMode" class="mt-2 text-xs text-gray-500" x-text="progressLabel(ticket.progress)"></p>
              <!-- Iniciar -->
              <div x-show="actionMode==='iniciar'" class="mt-3 space-y-3">
                <p class="text-xs text-gray-400">Confirma o início do atendimento deste chamado?</p>
                <div class="flex gap-2">
                  <button @click="startTicket()" :disabled="actionLoading"
                    class="flex items-center gap-1.5 px-4 py-2 rounded-xl text-xs font-semibold bg-blue-600 hover:bg-blue-700 text-white transition disabled:opacity-50">
                    <svg x-show="actionLoading" class="animate-spin w-3.5 h-3.5" viewBox="0 0 24 24" fill="none"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/></svg>
                    <span x-text="actionLoading?'Iniciando...':'Confirmar'"></span>
                  </button>
                  <button @click="actionMode=''" class="px-4 py-2 rounded-xl text-xs text-gray-400 hover:text-gray-200 bg-white/5 hover:bg-white/10 border border-white/10 transition">Cancelar</button>
                </div>
              </div>
              <!-- Finalizar -->
              <div x-show="actionMode==='finalizar'" class="mt-3 space-y-3">
                <textarea x-model="finishReason" rows="3" placeholder="Descreva a conclusão ou resolução do chamado..."
                  class="w-full px-3 py-2.5 rounded-xl text-sm bg-gray-800/60 border border-white/10 text-gray-200 placeholder-gray-600 resize-none focus:outline-none focus:ring-1 focus:ring-red-500/50 transition"></textarea>
                <div class="flex gap-2">
                  <button @click="confirmFinishTicket()" :disabled="finishing||!finishReason.trim()"
                    class="flex items-center gap-1.5 px-4 py-2 rounded-xl text-xs font-semibold bg-red-600 hover:bg-red-700 text-white transition disabled:opacity-50">
                    <svg x-show="finishing" class="animate-spin w-3.5 h-3.5" viewBox="0 0 24 24" fill="none"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/></svg>
                    <span x-text="finishing?'Enviando...':'Enviar para confirmação'"></span>
                  </button>
                  <button @click="actionMode=''; finishReason=''" class="px-4 py-2 rounded-xl text-xs text-gray-400 hover:text-gray-200 bg-white/5 hover:bg-white/10 border border-white/10 transition">Cancelar</button>
                </div>
              </div>
            </div>

            <!-- TRANSFERIR CHAMADO -->
            <div class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl p-4">
              <div class="flex items-center justify-between">
                <p class="text-[10px] uppercase tracking-widest text-gray-400 font-semibold">Transferir chamado</p>
                <button x-show="!transferMode" @click="transferMode=true; fetchTeamUsers()"
                  class="text-[11px] px-3 py-1 rounded-lg bg-violet-600/20 hover:bg-violet-600/30 text-violet-300 border border-violet-500/30 transition-all">Transferir</button>
                <button x-show="transferMode" @click="transferMode=false; selectedTeamId=''; selectedUserId=''; transferSubcategoryId=''; teamSubcategories=[]"
                  class="text-[11px] px-2 py-1 rounded-lg bg-white/5 hover:bg-white/10 text-gray-500 border border-white/10 transition-all">✕</button>
              </div>
              <div class="mt-2 flex items-center gap-4 text-xs text-gray-500">
                <span>Equipe: <span class="text-gray-300" x-text="ticket.assigned_team?.name||'—'"></span></span>
                <span>Responsável: <span class="text-gray-300" x-text="ticket.assignee?.name||'—'"></span></span>
              </div>
              <div x-show="transferMode" class="mt-3 space-y-3">
                <div>
                  <label class="text-[10px] text-gray-500 uppercase tracking-wide mb-1 block">Para equipe</label>
                  <select x-model="selectedTeamId" @change="onTeamChange()"
                    class="w-full px-3 py-2 rounded-xl text-xs bg-gray-800/60 border border-white/10 text-gray-200 focus:outline-none focus:ring-1 focus:ring-violet-500/50 transition">
                    <option value="">Selecione uma equipe</option>
                    <template x-for="team in availableTeams" :key="team.id">
                      <template x-if="team.id !== ticket.assigned_team?.id">
                        <option :value="team.id" x-text="team.name"></option>
                      </template>
                    </template>
                  </select>
                </div>
                <div x-show="selectedTeamId && teamSubcategories.length > 0">
                  <label class="text-[10px] text-gray-500 uppercase tracking-wide mb-1 block">Subcategoria destino</label>
                  <select x-model="transferSubcategoryId"
                    class="w-full px-3 py-2 rounded-xl text-xs bg-gray-800/60 border border-white/10 text-gray-200 focus:outline-none focus:ring-1 focus:ring-violet-500/50 transition">
                    <option value="">Selecione a subcategoria</option>
                    <template x-for="sub in teamSubcategories" :key="sub.id">
                      <option :value="sub.id" x-text="sub.name"></option>
                    </template>
                  </select>
                </div>
                <div class="flex items-center gap-2">
                  <div class="flex-1 h-px bg-white/10"></div>
                  <span class="text-[10px] text-gray-600 font-semibold tracking-widest">OU</span>
                  <div class="flex-1 h-px bg-white/10"></div>
                </div>
                <div>
                  <label class="text-[10px] text-gray-500 uppercase tracking-wide mb-1 block">Para atendente</label>
                  <select x-model="selectedUserId" @change="selectedTeamId=''; transferSubcategoryId=''; teamSubcategories=[]"
                    class="w-full px-3 py-2 rounded-xl text-xs bg-gray-800/60 border border-white/10 text-gray-200 focus:outline-none focus:ring-1 focus:ring-purple-500/50 transition">
                    <option value="">Selecione um atendente</option>
                    <template x-for="user in teamUsers" :key="user.id">
                      <template x-if="user.id !== ticket.assignee?.id">
                        <option :value="user.id" x-text="user.name"></option>
                      </template>
                    </template>
                  </select>
                </div>
                <div class="flex gap-2">
                  <button @click="confirmTransfer()" :disabled="transferLoading||(!selectedTeamId&&!selectedUserId)"
                    class="flex items-center gap-1.5 px-4 py-2 rounded-xl text-xs font-semibold bg-violet-600 hover:bg-violet-700 text-white transition disabled:opacity-50">
                    <svg x-show="transferLoading" class="animate-spin w-3.5 h-3.5" viewBox="0 0 24 24" fill="none"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/></svg>
                    <span x-text="transferLoading?'Transferindo...':'Confirmar transferência'"></span>
                  </button>
                  <button @click="transferMode=false; selectedTeamId=''; selectedUserId=''; transferSubcategoryId=''; teamSubcategories=[]"
                    class="px-4 py-2 rounded-xl text-xs text-gray-400 hover:text-gray-200 bg-white/5 hover:bg-white/10 border border-white/10 transition">Cancelar</button>
                </div>
              </div>
            </div>

            <!-- AGENDAR VISITA -->
            <div class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl p-4">
              <div class="flex items-center justify-between">
                <p class="text-[10px] uppercase tracking-widest text-gray-400 font-semibold">Visita agendada</p>
                <button x-show="!scheduleMode" @click="openScheduleMode()"
                  class="text-[11px] px-3 py-1 rounded-lg bg-cyan-600/20 hover:bg-cyan-600/30 text-cyan-300 border border-cyan-500/30 transition-all"
                  x-text="ticket.scheduled_visit_at ? 'Reagendar' : 'Agendar'"></button>
                <button x-show="scheduleMode" @click="scheduleMode=false"
                  class="text-[11px] px-2 py-1 rounded-lg bg-white/5 hover:bg-white/10 text-gray-500 border border-white/10 transition-all">✕</button>
              </div>
              <div x-show="ticket.scheduled_visit_at && !scheduleMode" class="mt-2">
                <div class="flex items-center gap-2 px-3 py-2 rounded-xl bg-cyan-900/20 border border-cyan-600/20">
                  <svg class="w-3.5 h-3.5 text-cyan-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                  <span class="text-xs font-medium text-cyan-300" x-text="formatDate(ticket.scheduled_visit_at)"></span>
                </div>
              </div>
              <p x-show="!ticket.scheduled_visit_at && !scheduleMode" class="mt-2 text-xs text-gray-600">Nenhuma visita agendada</p>
              <div x-show="scheduleMode" class="mt-3 space-y-3">
                <input type="datetime-local" x-model="scheduleDate"
                  class="w-full px-3 py-2 rounded-xl text-xs bg-gray-800/60 border border-white/10 text-gray-200 focus:outline-none focus:ring-1 focus:ring-cyan-500/50 transition" />
                <div class="flex gap-2">
                  <button @click="confirmScheduleVisit()" :disabled="schedulingVisit||!scheduleDate"
                    class="flex items-center gap-1.5 px-4 py-2 rounded-xl text-xs font-semibold bg-cyan-600 hover:bg-cyan-700 text-white transition disabled:opacity-50">
                    <svg x-show="schedulingVisit" class="animate-spin w-3.5 h-3.5" viewBox="0 0 24 24" fill="none"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/></svg>
                    <span x-text="schedulingVisit?'Salvando...':'Confirmar'"></span>
                  </button>
                  <button @click="scheduleMode=false" class="px-4 py-2 rounded-xl text-xs text-gray-400 hover:text-gray-200 bg-white/5 hover:bg-white/10 border border-white/10 transition">Cancelar</button>
                </div>
              </div>
            </div>

            <!-- DESCRIÇÃO -->
            <template x-if="ticket.description">
              <div class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl p-4">
                <p class="text-[10px] font-semibold text-gray-500 uppercase tracking-wider mb-2">Descrição</p>
                <p class="text-sm text-gray-300 leading-relaxed whitespace-pre-wrap" x-text="ticket.description"></p>
              </div>
            </template>

            <!-- INFO GRID -->
            <div class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl p-4">
              <p class="text-[10px] font-semibold text-gray-500 uppercase tracking-wider mb-3">Informações</p>
              <div class="grid grid-cols-2 gap-x-6 gap-y-3 text-xs">
                <div><p class="text-gray-500 mb-0.5">Hotel</p><p class="text-gray-200 font-medium" x-text="ticket.hotel?.name||'—'"></p></div>
                <div><p class="text-gray-500 mb-0.5">Equipe</p><p class="text-gray-200 font-medium" x-text="ticket.assigned_team?.name||'—'"></p></div>
                <div><p class="text-gray-500 mb-0.5">Categoria</p><p class="text-gray-200 font-medium" x-text="ticket.category?.name||'—'"></p></div>
                <div><p class="text-gray-500 mb-0.5">Subcategoria</p><p class="text-gray-200 font-medium" x-text="ticket.subcategory?.name||'—'"></p></div>
                <div><p class="text-gray-500 mb-0.5">Responsável</p><p class="text-gray-200 font-medium" x-text="ticket.assignee?.name||'—'"></p></div>
                <div><p class="text-gray-500 mb-0.5">Aberto por</p><p class="text-gray-200 font-medium" x-text="ticket.creator?.name||'—'"></p></div>
                <div><p class="text-gray-500 mb-0.5">Abertura</p><p class="text-gray-200" x-text="formatDate(ticket.created_at)"></p></div>
                <div><p class="text-gray-500 mb-0.5">Última atualização</p><p class="text-gray-200" x-text="formatDate(ticket.updated_at)"></p></div>
              </div>
            </div>

          </div>

          <!-- TAB HISTÓRICO -->
          <div x-show="tab==='history'" class="flex-1 flex flex-col min-h-0 overflow-hidden">

            <!-- Campo de comentário (fixo no topo) -->
            <div x-show="ticket.status !== 'cancelled'" class="shrink-0 px-5 pt-4 pb-3 border-b border-white/5">
              <div class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl p-4"
                   :class="!canComment ? 'opacity-60' : ''">
                <div class="flex items-center gap-2 mb-2">
                  <svg class="w-3.5 h-3.5 text-gray-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"/></svg>
                  <p class="text-xs font-semibold text-gray-300">Novo comentário</p>
                  <span x-show="!canComment && canCommentReason"
                        class="ml-auto text-[10px] text-amber-400/80 italic"
                        x-text="canCommentReason"></span>
                </div>
                <textarea x-model="newComment" rows="2"
                  :placeholder="canComment ? 'Escreva um comentário...' : canCommentReason"
                  :disabled="!canComment"
                  class="w-full px-3 py-2 rounded-xl text-sm bg-gray-800/60 border border-white/10 text-gray-200 placeholder-gray-500 resize-none focus:outline-none focus:ring-1 focus:ring-blue-500/50 transition disabled:cursor-not-allowed disabled:opacity-50"></textarea>
                <div class="flex items-center justify-between mt-2">
                  <label class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs text-gray-400 hover:text-gray-200 bg-white/5 border border-white/10 hover:bg-white/10 cursor-pointer transition-colors"
                         :class="!canComment ? 'pointer-events-none opacity-40' : ''">
                    <svg class="w-3.5 h-3.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
                    <span x-text="uploadLoading?'Enviando...':'Anexar'"></span>
                    <input type="file" class="hidden" @change="uploadAttachment($event.target.files[0], $event.target)" :disabled="uploadLoading||!canComment" />
                  </label>
                  <button @click="submitComment()" :disabled="submittingComment||!newComment.trim()||!canComment"
                    class="flex items-center gap-1.5 px-4 py-2 rounded-xl text-xs font-semibold bg-blue-600 hover:bg-blue-700 text-white transition disabled:opacity-50 disabled:cursor-not-allowed">
                    <svg x-show="submittingComment" class="animate-spin w-3.5 h-3.5" viewBox="0 0 24 24" fill="none"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/></svg>
                    <span x-text="submittingComment?'Enviando...':'Comentar'"></span>
                  </button>
                </div>
              </div>
            </div>

            <!-- Lista da timeline -->
            <div class="flex-1 overflow-y-auto custom-scroll px-5 py-4 space-y-3">

              <template x-if="timeline.length===0">
                <div class="flex flex-col items-center justify-center py-12 text-gray-600 gap-2">
                  <svg class="w-8 h-8 opacity-30" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                  <p class="text-sm">Sem histórico</p>
                </div>
              </template>

              <template x-for="entry in timeline" :key="entry.id">
                <div>
                  <!-- Evento de sistema -->
                  <template x-if="entry.kind==='event'">
                    <div class="flex items-center gap-3">
                      <div class="w-8 h-8 rounded-full flex items-center justify-center shrink-0" :class="eventStyle(entry.action).dot">
                        <svg x-show="eventStyle(entry.action).icon==='play'"   class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                        <svg x-show="eventStyle(entry.action).icon==='check'"  class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
                        <svg x-show="eventStyle(entry.action).icon==='reopen'" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                        <svg x-show="eventStyle(entry.action).icon==='x'"     class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z"/></svg>
                        <svg x-show="eventStyle(entry.action).icon==='person'" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                        <svg x-show="eventStyle(entry.action).icon==='team'"   class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                        <svg x-show="eventStyle(entry.action).icon==='flag'"   class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><path d="M14.4 6L14 4H5v17h2v-7h5.6l.4 2h7V6z"/></svg>
                        <svg x-show="eventStyle(entry.action).icon==='clock'"  class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>
                        <svg x-show="eventStyle(entry.action).icon==='alert'"  class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                        <svg x-show="eventStyle(entry.action).icon==='info'"   class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><path d="M11 17h2v-6h-2v6zm1-15C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zM11 9h2V7h-2v2z"/></svg>
                      </div>
                      <div class="flex-1 min-w-0">
                        <div class="flex items-center justify-between gap-2 flex-wrap">
                          <span class="text-xs font-medium" :class="eventStyle(entry.action).label" x-text="entry.meta.label"></span>
                          <span class="text-[10px] text-gray-600 shrink-0 whitespace-nowrap" x-text="(entry.user?.name?entry.user.name+' · ':'')+formatDate(entry.date.toISOString())"></span>
                        </div>
                        <template x-if="entry.value">
                          <p class="text-[11px] text-gray-500 mt-0.5" x-text="translateValue(entry.value)"></p>
                        </template>
                      </div>
                    </div>
                  </template>
                  <!-- Comentário -->
                  <template x-if="entry.kind==='comment'">
                    <div class="flex items-start gap-3">
                      <div class="w-8 h-8 rounded-full bg-blue-500/20 border border-blue-500/30 flex items-center justify-center shrink-0 text-xs font-bold text-blue-300 uppercase"
                           x-text="(entry.author?.name||'?').split(' ').filter(p=>p).map(p=>p[0]).slice(0,2).join('').toUpperCase()"></div>
                      <div class="flex-1 min-w-0">
                        <div class="flex items-center justify-between gap-2 mb-1.5 flex-wrap">
                          <span class="text-xs font-semibold text-gray-200" x-text="entry.author?.name||'—'"></span>
                          <span class="text-[10px] text-gray-600 shrink-0 whitespace-nowrap" x-text="formatDate(entry.date.toISOString())"></span>
                        </div>
                        <div class="bg-gray-900/50 border border-white/[0.06] rounded-xl px-4 py-3">
                          <p class="text-sm text-gray-300 whitespace-pre-line leading-relaxed" x-html="renderMentions(entry.text)"></p>
                        </div>
                      </div>
                    </div>
                  </template>
                </div>
              </template>

            </div>
          </div>

          <!-- TAB ANEXOS -->
          <div x-show="tab==='attachments'" class="flex-1 overflow-y-auto custom-scroll px-5 py-4 space-y-3">

            <!-- Upload -->
            <div class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl p-4">
              <div class="flex items-center gap-2 mb-3">
                <p class="text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Adicionar anexo</p>
                <span class="ml-auto text-[10px] text-gray-600">Máx. 10 MB · JPG, PNG, PDF, Word, Excel, ZIP</span>
              </div>
              <label class="flex flex-col items-center justify-center gap-2 py-5 rounded-xl border-2 border-dashed border-white/10 hover:border-blue-500/40 hover:bg-blue-900/5 cursor-pointer transition-all group">
                <svg class="w-7 h-7 text-gray-600 group-hover:text-blue-400 transition" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                <span class="text-xs text-gray-500 group-hover:text-gray-300 transition" x-text="uploadLoading?'Enviando arquivo...':'Clique para selecionar um arquivo'"></span>
                <input type="file" class="hidden" @change="uploadAttachment($event.target.files[0], $event.target)" :disabled="uploadLoading" />
              </label>
            </div>

            <!-- Lista -->
            <div class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl p-4">
              <div class="flex items-center gap-2 mb-3">
                <p class="text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Arquivos</p>
                <span class="ml-auto text-[10px] text-gray-600" x-text="attachments.length+' arquivo(s)'"></span>
              </div>
              <template x-if="attachments.length===0">
                <div class="flex flex-col items-center justify-center py-8 text-gray-600 gap-2">
                  <svg class="w-8 h-8 opacity-30" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
                  <p class="text-sm">Nenhum anexo neste ticket</p>
                </div>
              </template>
              <div class="space-y-2">
                <template x-for="att in attachments" :key="att.id">
                  <div class="flex items-center gap-3 p-3 rounded-xl bg-gray-800/30 border border-white/5 hover:bg-gray-800/50 hover:border-white/10 transition-all">
                    <div class="w-8 h-8 rounded-lg bg-white/5 border border-white/10 flex items-center justify-center text-[9px] font-bold uppercase text-gray-400 tracking-wide shrink-0" x-text="fileIcon(att.mime_type)"></div>
                    <div class="flex-1 min-w-0">
                      <p class="text-xs font-medium text-gray-200 truncate" x-text="att.file_name"></p>
                      <div class="flex items-center gap-2 mt-0.5">
                        <span class="text-[10px] text-gray-500" x-text="formatFileSize(att.file_size)"></span>
                        <span class="text-gray-700">·</span>
                        <span class="text-[10px] text-gray-500 truncate" x-text="att.uploader?.name||'—'"></span>
                        <span class="text-gray-700">·</span>
                        <span class="text-[10px] text-gray-500 shrink-0" x-text="formatDate(att.created_at)"></span>
                      </div>
                    </div>
                    <div class="flex items-center gap-1.5 shrink-0">
                      <button @click="downloadAttachment(att)" class="flex items-center gap-1 px-2.5 py-1.5 rounded-lg text-[11px] text-gray-400 hover:text-white bg-white/5 border border-white/10 hover:bg-white/10 transition">⬇ Baixar</button>
                      <button x-show="$store.app.role==='admin'||att.uploader?.id==$store.app.userId"
                        @click="deleteAttachment(att.id)" :disabled="deletingAttachmentId===att.id"
                        class="flex items-center gap-1 px-2.5 py-1.5 rounded-lg text-[11px] text-red-400 hover:text-white bg-red-900/10 border border-red-900/20 hover:bg-red-900/30 transition disabled:opacity-40">
                        <svg x-show="deletingAttachmentId===att.id" class="w-3 h-3 animate-spin" viewBox="0 0 24 24" fill="none"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/></svg>
                        <svg x-show="deletingAttachmentId!==att.id" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                      </button>
                    </div>
                  </div>
                </template>
              </div>
            </div>

          </div>

        </div>
      </template>
    </div>
  </div>

  <!-- ── MODAL GLOBAL: QUALITOR TICKET ── -->
  <div x-data="qualitorTicketModal()" x-show="open"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-start justify-center z-[60] p-4 overflow-y-auto"
    style="display:none; overscroll-behavior:contain"
    @click.self="close()"
    @keydown.escape.window="open && close()">

    <template x-if="loading">
      <div class="flex items-center justify-center w-full h-64">
        <div class="w-8 h-8 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
      </div>
    </template>

    <template x-if="!loading && ticket">
      <div class="bg-gray-800/40 backdrop-blur-2xl border border-white/10 rounded-2xl shadow-2xl backdrop-saturate-150 w-full max-w-4xl my-4 flex flex-col" style="max-height:calc(100vh - 3rem)">

        <!-- Header -->
        <div class="px-6 py-4 border-b border-white/5 shrink-0">
          <div class="flex items-start justify-between gap-4">
            <div class="min-w-0">
              <p class="text-[10px] text-purple-400 font-semibold uppercase tracking-wider mb-1">Qualitor · #<span x-text="ticket.id"></span></p>
              <h2 class="font-bold text-lg leading-tight break-words whitespace-normal text-gray-100" x-text="ticket.titulo || '...'"></h2>
              <div class="flex flex-wrap items-center gap-1.5 mt-2">
                <span class="inline-flex items-center px-2.5 py-1 rounded-lg text-[11px] font-medium border" :class="situacaoBadge(ticket.situacao)" x-text="ticket.situacao || '—'"></span>
                <span class="inline-flex items-center px-2.5 py-1 rounded-lg text-[11px] font-medium border" :class="severidadeBadge(ticket.severidade)" x-text="ticket.severidade || 'Sem severidade'"></span>
                <span class="inline-flex items-center px-2.5 py-1 rounded-lg text-[11px] font-medium bg-white/5 border border-white/10 text-gray-400" x-text="ticket.equipe || '—'"></span>
              </div>
            </div>
            <button @click="close()" class="w-8 h-8 rounded-xl flex items-center justify-center text-gray-400 hover:text-white hover:bg-white/10 transition-all shrink-0">✕</button>
          </div>
          <!-- Tabs -->
          <div class="mt-4 flex flex-wrap gap-2 p-2 rounded-2xl bg-gray-900/40 backdrop-blur-xl border border-white/10 w-fit">
            <button @click="tab='detalhes'" class="px-4 py-2 rounded-xl text-sm transition-all" :class="tab==='detalhes' ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/30' : 'text-gray-400 hover:text-white hover:bg-white/5'">Detalhes</button>
            <button @click="tab='historico'" class="px-4 py-2 rounded-xl text-sm transition-all flex items-center gap-2" :class="tab==='historico' ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/30' : 'text-gray-400 hover:text-white hover:bg-white/5'">
              Histórico
              <span x-show="history.length > 0" class="inline-flex items-center justify-center min-w-[18px] h-[18px] px-1 rounded-full text-[10px]" :class="tab==='historico' ? 'bg-blue-500/40 text-blue-100' : 'bg-white/10 text-gray-400'" x-text="history.length"></span>
            </button>
            <button @click="tab='anexos'; fetchAttachments()" class="px-4 py-2 rounded-xl text-sm transition-all flex items-center gap-2" :class="tab==='anexos' ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/30' : 'text-gray-400 hover:text-white hover:bg-white/5'">
              Anexos
              <span x-show="attachments.length > 0" class="inline-flex items-center justify-center min-w-[18px] h-[18px] px-1 rounded-full text-[10px]" :class="tab==='anexos' ? 'bg-blue-500/40 text-blue-100' : 'bg-white/10 text-gray-400'" x-text="attachments.length"></span>
            </button>
          </div>
        </div>

        <!-- Conteúdo -->
        <div class="flex-1 min-h-0 overflow-hidden flex flex-col">

          <!-- TAB: DETALHES -->
          <div x-show="tab==='detalhes'" class="flex-1 overflow-y-auto custom-scroll">
            <div class="flex flex-1 flex-col gap-3 p-5">

              <!-- Ações -->
              <div x-show="['Aguardando atendimento', 'Em atendimento'].includes(ticket.situacao)"
                   class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl p-4">
                <div class="flex items-center justify-between mb-3">
                  <p class="text-[10px] uppercase tracking-widest text-gray-400 font-semibold">Ações</p>
                  <!-- Botão Iniciar -->
                  <button x-show="ticket.situacao === 'Aguardando atendimento'" @click="iniciarAtendimento()" :disabled="actionLoading"
                    class="text-[11px] px-3 py-1 rounded-lg bg-blue-600/20 hover:bg-blue-600/30 text-blue-300 border border-blue-500/30 transition-all disabled:opacity-50 flex items-center gap-1.5">
                    <div x-show="actionLoading" class="w-2.5 h-2.5 border border-blue-300 border-t-transparent rounded-full animate-spin"></div>
                    <span x-text="actionLoading ? 'Iniciando...' : 'Iniciar'"></span>
                  </button>
                  <!-- Botão Encerrar -->
                  <button x-show="ticket.situacao === 'Em atendimento' && actionMode !== 'encerrar'"
                    @click="actionMode='encerrar'; actionNota=''"
                    class="text-[11px] px-3 py-1 rounded-lg bg-red-600/20 hover:bg-red-600/30 text-red-300 border border-red-500/30 transition-all">
                    Encerrar
                  </button>
                </div>
                <!-- Status atual quando nenhum painel aberto -->
                <p x-show="!actionMode" class="text-xs text-gray-500" x-text="ticket.situacao"></p>
                <!-- Formulário: encerrar -->
                <div x-show="actionMode === 'encerrar'" class="space-y-3">
                  <p class="text-sm text-gray-300">Descreva a conclusão do atendimento:</p>
                  <textarea x-model="actionNota" placeholder="Motivo ou resolução (obrigatório)..." rows="3" class="w-full px-3 py-2.5 rounded-xl text-sm text-gray-200 bg-gray-800/60 border border-white/10 resize-none placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-red-500/50 transition-colors"></textarea>
                  <div class="flex gap-2">
                    <button @click="encerrarChamado()" :disabled="actionLoading || !actionNota.trim()" class="flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold bg-red-700 hover:bg-red-800 text-white transition-all disabled:opacity-50">
                      <div x-show="actionLoading" class="w-3.5 h-3.5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
