<div
  x-data="dashboardPage()"
  x-init="
    loadDashboardOverview();
    _themeHandler = () => refreshChartsForTheme();
    window.addEventListener('theme-changed', _themeHandler);
  "
  @destroy.window="window.removeEventListener('theme-changed', _themeHandler)"
  class="flex flex-col h-full overflow-hidden text-gray-200 p-3 gap-3">

  <!-- ── HEADER ───────────────────────────────────────────────────── -->
  <div class="flex items-center justify-between flex-wrap gap-3">
    <div>
      <h1 class="text-xl font-bold">Dashboard</h1>
      <p class="text-xs text-gray-400" x-text="source === 'helpdesk' ? 'Monitor em tempo real — chamados, SLA e desempenho das equipes' : sourceLabel()"></p>
    </div>

    <div class="flex items-center gap-2 flex-wrap">

      <!-- Toggle fonte -->
      <div class="flex items-center gap-1 p-1 rounded-xl bg-gray-900/60 border border-white/10">
        <template x-for="[val, lbl] in [['helpdesk','Helpdesk'],['qualitor','Qualitor'],['all','Ambos']]" :key="val">
          <button @click="setSource(val)"
            class="px-3 py-1.5 rounded-lg text-xs font-medium transition-all"
            :class="source === val
              ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-900/30'
              : 'text-gray-400 hover:text-white hover:bg-white/5'"
            x-text="lbl">
          </button>
        </template>
      </div>

      <!-- Toggle período (só aparece quando fonte ≠ helpdesk) -->
      <div x-show="source !== 'helpdesk'" class="flex items-center gap-1 p-1 rounded-xl bg-gray-900/60 border border-white/10">
        <template x-for="[val, lbl] in [['7d','7d'],['30d','30d'],['90d','90d']]" :key="val">
          <button @click="setPeriod(val)"
            class="px-3 py-1.5 rounded-lg text-xs font-medium transition-all"
            :class="period === val
              ? 'bg-gray-700 text-white'
              : 'text-gray-400 hover:text-white hover:bg-white/5'"
            x-text="lbl">
          </button>
        </template>
      </div>

      <button
        @click="loadDashboardOverview()"
        class="flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs
               bg-white/5 border border-white/10 hover:bg-white/10 transition-colors">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        Atualizar
      </button>
    </div>
  </div>

  <!-- ── TABS ─────────────────────────────────────────────────────── -->
  <div class="flex flex-wrap gap-1.5 p-1.5 w-full rounded-2xl bg-gray-900/40 backdrop-blur-xl border border-white/10 w-fit">
    <template x-for="tab in [
      {id:'operational',  label:'Operação'},
      {id:'bottlenecks',  label:'Gargalos'},
      {id:'volume',       label:'Volume'},
      {id:'sla',          label:'SLA'},
      {id:'history',      label:'Histórico'},
    ]" :key="tab.id">
      <button
        @click="switchTab(tab.id)"
        class="px-4 py-2 rounded-xl text-sm transition-all duration-200"
        :class="dashboardTab === tab.id
          ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/30'
          : 'text-gray-400 hover:text-white hover:bg-white/5'"
        x-text="tab.label">
      </button>
    </template>
  </div>

  <!-- ── SCROLL AREA ───────────────────────────────────────────────── -->
  <div class="flex-1 overflow-y-auto custom-scroll pr-1 space-y-4">


    <!-- ═══════════════════════════════════════════════════════════════ -->
    <!-- TAB: OPERAÇÃO                                                   -->
    <!-- ═══════════════════════════════════════════════════════════════ -->
    <div x-show="dashboardTab === 'operational'" class="space-y-4">

      <!-- Counters -->
      <div :class="source === 'helpdesk' ? 'grid-cols-2 md:grid-cols-5 xl:grid-cols-10' : 'grid-cols-2 md:grid-cols-4'" class="grid gap-3">
        <template x-for="card in overviewCards" :key="card.label">
          <div class="flex flex-col gap-1 p-4 rounded-2xl
                      bg-gray-900/40 backdrop-blur-xl border border-white/10">
            <span class="text-[11px] text-gray-500 leading-tight" x-text="card.label"></span>
            <span class="text-3xl font-bold mt-1" :class="cardColor(card.color)" x-text="card.value"></span>
          </div>
        </template>
      </div>

      <!-- Cards por equipe Qualitor -->
      <template x-if="source !== 'helpdesk'">
        <div>
          <p class="text-xs text-gray-500 font-medium uppercase tracking-wider mb-2">Por equipe</p>
          <div x-show="teamsBreakdownLoading" class="grid grid-cols-1 md:grid-cols-2 gap-3 animate-pulse">
            <template x-for="i in 2" :key="i">
              <div class="bg-gray-900/40 border border-white/10 rounded-2xl p-4 space-y-3">
                <div class="h-4 w-24 rounded bg-gray-700/60"></div>
                <div class="h-8 w-16 rounded bg-gray-700/50"></div>
                <template x-for="j in 5" :key="j">
                  <div class="flex justify-between">
                    <div class="h-3 w-32 rounded bg-gray-700/40"></div>
                    <div class="h-3 w-8 rounded bg-gray-700/40"></div>
                  </div>
                </template>
              </div>
            </template>
          </div>
          <div x-show="!teamsBreakdownLoading" class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <template x-for="team in teamsBreakdown" :key="team.nmequipe">
              <div class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl p-4 flex flex-col gap-3"
                   x-data="{ pct(v) { return team.total_abertos > 0 ? Math.round(v / team.total_abertos * 100) : 0 } }">
                <!-- Header -->
                <div class="flex items-center justify-between">
                  <span class="text-sm font-semibold text-gray-200" x-text="team.nmequipe"></span>
                  <span class="text-[11px] text-gray-500">em aberto</span>
                </div>
                <!-- Total destacado -->
                <div class="flex items-end gap-2">
                  <span class="text-4xl font-bold text-white" x-text="team.total_abertos - team.ag_confirmacao"></span>
                  <span class="text-xs text-gray-500 mb-1">em aberto</span>
                </div>
                <!-- Linhas de detalhe com barras -->
                <div class="space-y-2.5 border-t border-white/5 pt-3">

                  <div class="space-y-1">
                    <div class="flex items-center justify-between text-xs">
                      <span class="text-gray-400">Aguardando atendimento</span>
                      <span class="font-medium text-amber-300" x-text="team.aguardando_atendimento + ' (' + pct(team.aguardando_atendimento) + '%)'"></span>
                    </div>
                    <div class="h-1 w-full rounded-full bg-white/5">
                      <div class="h-1 rounded-full bg-amber-400/70 transition-all duration-500"
                           :style="`width:${pct(team.aguardando_atendimento)}%`"></div>
                    </div>
                  </div>

                  <div class="space-y-1">
                    <div class="flex items-center justify-between text-xs">
                      <span class="text-gray-400">Em atendimento</span>
                      <span class="font-medium text-blue-300" x-text="team.em_atendimento + ' (' + pct(team.em_atendimento) + '%)'"></span>
                    </div>
                    <div class="h-1 w-full rounded-full bg-white/5">
                      <div class="h-1 rounded-full bg-blue-400/70 transition-all duration-500"
                           :style="`width:${pct(team.em_atendimento)}%`"></div>
                    </div>
                  </div>

                  <div class="space-y-1">
                    <div class="flex items-center justify-between text-xs">
                      <span class="text-gray-400">Ag. confirmação encerramento</span>
                      <span class="font-medium text-violet-300" x-text="team.ag_confirmacao + ' (' + pct(team.ag_confirmacao) + '%)'"></span>
                    </div>
                    <div class="h-1 w-full rounded-full bg-white/5">
                      <div class="h-1 rounded-full bg-violet-400/70 transition-all duration-500"
                           :style="`width:${pct(team.ag_confirmacao)}%`"></div>
                    </div>
                  </div>

                  <div class="space-y-1">
                    <div class="flex items-center justify-between text-xs">
                      <span class="text-gray-400">Sem responsável</span>
                      <span class="font-medium" :class="team.sem_responsavel > 0 ? 'text-orange-400' : 'text-gray-500'"
                            x-text="team.sem_responsavel + ' (' + pct(team.sem_responsavel) + '%)'"></span>
                    </div>
                    <div class="h-1 w-full rounded-full bg-white/5">
                      <div class="h-1 rounded-full transition-all duration-500"
                           :class="team.sem_responsavel > 0 ? 'bg-orange-400/70' : 'bg-gray-600/40'"
                           :style="`width:${pct(team.sem_responsavel)}%`"></div>
                    </div>
                  </div>

                  <div class="space-y-1 border-t border-white/5 pt-2">
                    <div class="flex items-center justify-between text-xs">
                      <span class="text-gray-400">Abertos hoje</span>
                      <span class="font-medium text-emerald-400" x-text="team.abertos_hoje + ' (' + pct(team.abertos_hoje) + '%)'"></span>
                    </div>
                    <div class="h-1 w-full rounded-full bg-white/5">
                      <div class="h-1 rounded-full bg-emerald-400/70 transition-all duration-500"
                           :style="`width:${pct(team.abertos_hoje)}%`"></div>
                    </div>
                  </div>

                  <div class="space-y-1">
                    <div class="flex items-center justify-between text-xs">
                      <span class="text-gray-400">Visita agendada</span>
                      <span class="font-medium" :class="team.visita_agendada > 0 ? 'text-cyan-400' : 'text-gray-500'"
                            x-text="team.visita_agendada + ' (' + pct(team.visita_agendada) + '%)'"></span>
                    </div>
                    <div class="h-1 w-full rounded-full bg-white/5">
                      <div class="h-1 rounded-full transition-all duration-500"
                           :class="team.visita_agendada > 0 ? 'bg-cyan-400/70' : 'bg-gray-600/40'"
                           :style="`width:${pct(team.visita_agendada)}%`"></div>
                    </div>
                  </div>


                </div>
              </div>
            </template>
            <div x-show="teamsBreakdown.length === 0" class="md:col-span-2 text-center text-sm text-gray-600 py-6">
              Nenhum dado de equipe disponível
            </div>
          </div>
        </div>
      </template>

      <!-- Loading skeleton -->
      <template x-if="operationalLoading">
        <div class="grid grid-cols-1 xl:grid-cols-2 gap-4 animate-pulse">
          <template x-for="i in 4" :key="i">
            <div class="bg-gray-900/40 border border-white/10 rounded-2xl overflow-hidden">
              <div class="flex items-center gap-2 px-4 py-3 border-b border-white/10">
                <div class="w-4 h-4 rounded bg-gray-700/60 shrink-0"></div>
                <div class="h-3.5 w-44 rounded bg-gray-700/50"></div>
                <div class="ml-auto h-3 w-12 rounded bg-gray-700/40"></div>
              </div>
              <div class="p-4 space-y-3">
                <template x-for="j in 5" :key="j">
                  <div class="flex items-center gap-3">
                    <div class="h-3 w-6 rounded bg-gray-700/50"></div>
                    <div class="h-3 flex-1 rounded bg-gray-700/40"></div>
                    <div class="h-3 w-14 rounded bg-gray-700/40"></div>
                    <div class="h-3 w-12 rounded bg-gray-700/30"></div>
                  </div>
                </template>
              </div>
            </div>
          </template>
          <div class="xl:col-span-2 bg-gray-900/40 border border-white/10 rounded-2xl overflow-hidden">
            <div class="flex items-center gap-2 px-4 py-3 border-b border-white/10">
              <div class="w-4 h-4 rounded bg-gray-700/60 shrink-0"></div>
              <div class="h-3.5 w-52 rounded bg-gray-700/50"></div>
              <div class="ml-auto h-3 w-12 rounded bg-gray-700/40"></div>
            </div>
            <div class="p-4 space-y-3">
              <template x-for="j in 4" :key="j">
                <div class="flex items-center gap-3">
                  <div class="h-3 w-6 rounded bg-gray-700/50"></div>
                  <div class="h-3 flex-1 rounded bg-gray-700/40"></div>
                  <div class="h-3 w-20 rounded bg-gray-700/40"></div>
                  <div class="h-3 w-16 rounded bg-gray-700/30"></div>
                  <div class="h-3 w-14 rounded bg-gray-700/30"></div>
                </div>
              </template>
            </div>
          </div>
        </div>
      </template>

      <!-- Tables grid -->
      <template x-if="!operationalLoading">
        <div class="grid grid-cols-1 xl:grid-cols-2 gap-4">

          <!-- Tickets Parados (+24h / +5d) -->
          <div class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl overflow-hidden">
            <div class="flex items-center gap-2 px-4 py-3 border-b border-white/10">
              <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              <h3 class="text-sm font-semibold">Tickets Parados
                <span class="text-[11px] text-gray-500 font-normal" x-text="source === 'helpdesk' ? '(sem atualização há +24h)' : '(sem atualização há +5d)'"></span>
              </h3>
              <span class="ml-auto text-xs text-gray-500" x-text="operational.stale_tickets.length + ' itens'"></span>
            </div>
            <div x-show="!operational.stale_tickets.length" class="px-4 py-6 text-sm text-gray-600 text-center">Nenhum ticket parado</div>
            <div x-show="operational.stale_tickets.length" class="overflow-x-auto">
              <table class="w-full text-xs">
                <thead><tr class="border-b border-white/5 text-gray-500">
                  <th class="text-left px-4 py-2">#</th>
                  <th class="text-left px-4 py-2">Título</th>
                  <th class="text-left px-4 py-2" x-text="source === 'helpdesk' ? 'Hotel' : 'Equipe'"></th>
                  <th x-show="source === 'helpdesk'" class="text-left px-4 py-2">Prioridade</th>
                  <th x-show="source !== 'helpdesk'" class="text-left px-4 py-2">Responsável</th>
                  <th x-show="source === 'all'" class="text-left px-4 py-2">Portal</th>
                  <th class="text-left px-4 py-2">Parado há</th>
                </tr></thead>
                <tbody>
                  <template x-for="t in stalledShown" :key="t.id">
                    <tr class="border-b border-white/5 hover:bg-white/5 transition-colors cursor-pointer"
                        @click="t.portal === 'qualitor' ? window.openQualitorTicket(t.id) : window.openHelpdeskTicket(t.id)">
                      <td class="px-4 py-2.5 text-gray-500" x-text="'#' + t.id"></td>
                      <td class="px-4 py-2.5 text-gray-200 max-w-[180px] truncate" x-text="t.title"></td>
                      <td class="px-4 py-2.5 text-gray-400" x-text="t.hotel_name"></td>
                      <td x-show="source === 'helpdesk'" class="px-4 py-2.5">
                        <span class="inline-flex px-2 py-0.5 rounded-full text-[10px] border"
                          :class="priorityBadge(t.priority)" x-text="priorityLabel(t.priority) || '—'"></span>
                      </td>
                      <td x-show="source !== 'helpdesk'" class="px-4 py-2.5 text-gray-400" x-text="t.assignee_name || '—'"></td>
                      <td x-show="source === 'all'" class="px-4 py-2.5">
                        <span class="inline-flex px-1.5 py-0.5 rounded text-[10px] font-medium"
                          :class="t.portal === 'qualitor' ? 'bg-purple-500/20 text-purple-300' : 'bg-blue-500/20 text-blue-300'"
                          x-text="t.portal === 'qualitor' ? 'QT' : 'HD'"></span>
                      </td>
                      <td class="px-4 py-2.5 text-amber-400" x-text="timeAgo(t.updated_at)"></td>
                    </tr>
                  </template>
                </tbody>
              </table>
              <div class="flex items-center justify-center px-4 py-2.5 border-t border-white/5 gap-4">
                <button x-show="stalledHidden > 0"
                        @click="stalledVisible = Infinity"
                        class="text-xs text-gray-500 hover:text-gray-300 transition-colors"
                        x-text="'+ ver mais ' + stalledHidden + ' ticket' + (stalledHidden !== 1 ? 's' : '')">
                </button>
                <button x-show="stalledHidden === 0 && stalledHasMore"
                        @click="loadAllStalled()"
                        :disabled="stalledLoadingAll"
                        class="text-xs text-amber-500/70 hover:text-amber-400 transition-colors disabled:opacity-40">
                  <span x-show="!stalledLoadingAll">↓ carregar todos os tickets parados</span>
                  <span x-show="stalledLoadingAll">carregando...</span>
                </button>
              </div>
            </div>
          </div>

          <!-- Tickets Sem Responsável -->
          <div class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl overflow-hidden">
            <div class="flex items-center gap-2 px-4 py-3 border-b border-white/10">
              <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
              <h3 class="text-sm font-semibold">Sem Responsável</h3>
              <span class="ml-auto text-xs text-gray-500" x-text="source === 'helpdesk' ? operational.unassigned_tickets.length + ' itens' : '—'"></span>
            </div>
            <div x-show="source !== 'helpdesk'" class="px-4 py-6 text-sm text-gray-600 text-center">Disponível apenas para Helpdesk</div>
            <div x-show="source === 'helpdesk' && !operational.unassigned_tickets.length" class="px-4 py-6 text-sm text-gray-600 text-center">Todos os tickets têm responsável</div>
            <div x-show="source === 'helpdesk' && operational.unassigned_tickets.length" class="overflow-x-auto">
              <table class="w-full text-xs">
                <thead><tr class="border-b border-white/5 text-gray-500">
                  <th class="text-left px-4 py-2">#</th>
                  <th class="text-left px-4 py-2">Título</th>
                  <th class="text-left px-4 py-2">Hotel</th>
                  <th class="text-left px-4 py-2">Equipe</th>
                  <th class="text-left px-4 py-2">Aberto há</th>
                </tr></thead>
                <tbody>
                  <template x-for="t in operational.unassigned_tickets" :key="t.id">
                    <tr class="border-b border-white/5 hover:bg-white/5 transition-colors cursor-pointer"
                        @click="window.openHelpdeskTicket(t.id)">
                      <td class="px-4 py-2.5 text-gray-500" x-text="'#' + t.id"></td>
                      <td class="px-4 py-2.5 text-gray-200 max-w-[180px] truncate" x-text="t.title"></td>
                      <td class="px-4 py-2.5 text-gray-400" x-text="t.hotel_name"></td>
                      <td class="px-4 py-2.5 text-gray-400" x-text="t.team_name || '—'"></td>
                      <td class="px-4 py-2.5 text-red-400" x-text="timeAgo(t.created_at)"></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </div>

          <!-- Tickets Críticos -->
          <div class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl overflow-hidden">
            <div class="flex items-center gap-2 px-4 py-3 border-b border-white/10">
              <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
              <h3 class="text-sm font-semibold">Tickets Críticos <span class="text-[11px] text-gray-500 font-normal">(prioridade alta)</span></h3>
              <span class="ml-auto text-xs text-gray-500" x-text="source === 'helpdesk' ? operational.critical_tickets.length + ' itens' : '—'"></span>
            </div>
            <div x-show="source !== 'helpdesk'" class="px-4 py-6 text-sm text-gray-600 text-center">Disponível apenas para Helpdesk</div>
            <div x-show="source === 'helpdesk' && !operational.critical_tickets.length" class="px-4 py-6 text-sm text-gray-600 text-center">Nenhum ticket crítico</div>
            <div x-show="source === 'helpdesk' && operational.critical_tickets.length" class="overflow-x-auto">
              <table class="w-full text-xs">
                <thead><tr class="border-b border-white/5 text-gray-500">
                  <th class="text-left px-4 py-2">#</th>
                  <th class="text-left px-4 py-2">Título</th>
                  <th class="text-left px-4 py-2">Hotel</th>
                  <th class="text-left px-4 py-2">Atendente</th>
                  <th class="text-left px-4 py-2">Aberto há</th>
                </tr></thead>
                <tbody>
                  <template x-for="t in operational.critical_tickets" :key="t.id">
                    <tr class="border-b border-white/5 hover:bg-white/5 transition-colors cursor-pointer"
                        @click="window.openHelpdeskTicket(t.id)">
                      <td class="px-4 py-2.5 text-gray-500" x-text="'#' + t.id"></td>
                      <td class="px-4 py-2.5 text-gray-200 max-w-[180px] truncate" x-text="t.title"></td>
                      <td class="px-4 py-2.5 text-gray-400" x-text="t.hotel_name"></td>
                      <td class="px-4 py-2.5 text-gray-400" x-text="t.assignee_name || '—'"></td>
                      <td class="px-4 py-2.5 text-red-400" x-text="timeAgo(t.created_at)"></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </div>

          <!-- Aguardando Confirmação -->
          <div class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl overflow-hidden">
            <div class="flex items-center gap-2 px-4 py-3 border-b border-white/10">
              <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              <h3 class="text-sm font-semibold">Aguardando Confirmação</h3>
              <span class="ml-auto text-xs text-gray-500" x-text="source === 'helpdesk' ? operational.awaiting_confirmation_tickets.length + ' itens' : '—'"></span>
            </div>
            <div x-show="source !== 'helpdesk'" class="px-4 py-6 text-sm text-gray-600 text-center">Disponível apenas para Helpdesk</div>
            <div x-show="source === 'helpdesk' && !operational.awaiting_confirmation_tickets.length" class="px-4 py-6 text-sm text-gray-600 text-center">Nenhum pendente de confirmação</div>
            <div x-show="source === 'helpdesk' && operational.awaiting_confirmation_tickets.length" class="overflow-x-auto">
              <table class="w-full text-xs">
                <thead><tr class="border-b border-white/5 text-gray-500">
                  <th class="text-left px-4 py-2">#</th>
                  <th class="text-left px-4 py-2">Título</th>
                  <th class="text-left px-4 py-2">Hotel</th>
                  <th class="text-left px-4 py-2">Atendente</th>

                        <span class="line-clamp-1 block" x-text="t.titulo || '—'"></span>
                      </td>
                      <td class="px-4 py-2.5">
                        <span class="inline-flex px-1.5 py-0.5 rounded text-[10px] border"
                          :class="t.equipe === 'RM1 SAP' ? 'bg-violet-500/15 text-violet-300 border-violet-500/20' : 'bg-blue-500/15 text-blue-300 border-blue-500/20'"
                          x-text="t.equipe || '—'"></span>
                      </td>
                      <td class="px-4 py-2.5 text-gray-400" x-text="t.responsavel || '—'"></td>
                      <td class="px-4 py-2.5 text-gray-500 font-mono text-[11px]" x-text="qtSlaPrazoLabel(t.prazo_termino)"></td>
                      <td class="px-4 py-2.5 text-right font-bold"
                        :class="t.horas < 4 ? 'text-red-400' : t.horas < 12 ? 'text-orange-400' : 'text-amber-400'"
                        x-text="qtSlaHorasLabel(t.horas)"></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </div>

        </div>
      </template>

      <template x-if="!slaLoading && slaLoaded && source === 'helpdesk'">
        <div class="space-y-4">

          <!-- ── Counters SLA ───────────────────────────────────────────── -->
          <div class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-6 gap-3">

            <div class="flex flex-col gap-1 p-4 rounded-2xl bg-gray-900/40 backdrop-blur-xl border border-white/10">
              <span class="text-[11px] text-gray-500">Total com SLA</span>
              <span class="text-3xl font-bold text-gray-300" x-text="sla.summary.total_with_sla"></span>
            </div>

            <div class="flex flex-col gap-1 p-4 rounded-2xl bg-gray-900/40 backdrop-blur-xl border border-white/10">
              <span class="text-[11px] text-gray-500">SLA Ativos</span>
              <span class="text-3xl font-bold text-cyan-400" x-text="sla.summary.active_sla"></span>
            </div>

            <div class="flex flex-col gap-1 p-4 rounded-2xl bg-gray-900/40 backdrop-blur-xl border border-emerald-500/20">
              <span class="text-[11px] text-gray-500">% Cumprimento</span>
              <span class="text-3xl font-bold text-emerald-400"
                    x-text="sla.summary.overall_compliance_pct.toFixed(1) + '%'"></span>
            </div>

            <div class="flex flex-col gap-1 p-4 rounded-2xl bg-gray-900/40 backdrop-blur-xl border border-red-500/20">
              <span class="text-[11px] text-gray-500">Violados (abertos)</span>
              <span class="text-3xl font-bold text-red-400" x-text="sla.summary.resolution_breached_open"></span>
            </div>

            <div class="flex flex-col gap-1 p-4 rounded-2xl bg-gray-900/40 backdrop-blur-xl border border-amber-500/20">
              <span class="text-[11px] text-gray-500">Em Risco (&lt;8h)</span>
              <span class="text-3xl font-bold text-amber-400" x-text="sla.summary.at_risk"></span>
            </div>

            <div class="flex flex-col gap-1 p-4 rounded-2xl bg-gray-900/40 backdrop-blur-xl border border-white/10">
              <span class="text-[11px] text-gray-500">Tempo médio resposta</span>
              <span class="text-3xl font-bold text-blue-400"
                    x-text="sla.summary.avg_response_hours !== null ? slaHoursLabel(sla.summary.avg_response_hours) : '—'"></span>
            </div>

          </div>

          <!-- ── Gráficos ────────────────────────────────────────────────── -->
          <div class="grid grid-cols-1 xl:grid-cols-3 gap-4">

            <!-- Donut cumprimento geral -->
            <div class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl overflow-hidden">
              <div class="flex items-center gap-2 px-4 py-3 border-b border-white/10">
                <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 2v2m0 16v2M2 12h2m16 0h2m-3.343-6.657l-1.414 1.414M6.757 17.243l-1.414 1.414m12.728 0l-1.414-1.414M6.757 6.757L5.343 5.343"/></svg>
                <h3 class="text-sm font-semibold">Cumprimento Geral</h3>
                <span class="ml-auto text-[11px] text-gray-500">tickets finalizados</span>
              </div>
              <div class="p-4 flex flex-col items-center" style="height:260px">
                <template x-if="sla.summary.overall_compliance_pct === 0 && sla.summary.total_with_sla === 0">
                  <div class="flex flex-col items-center justify-center h-full text-gray-600">
                    <svg class="w-10 h-10 opacity-30 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                    <p class="text-sm">Nenhum dado ainda</p>
                  </div>
                </template>
                <template x-if="sla.summary.total_with_sla > 0">
                  <div class="relative w-full h-full">
                    <canvas id="slaDonutChart"></canvas>
                    <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none" style="top:-20px">
                      <span class="text-2xl font-bold text-emerald-400"
                            x-text="sla.summary.overall_compliance_pct.toFixed(1) + '%'"></span>
                      <span class="text-[10px] text-gray-500 mt-0.5">no prazo</span>
                    </div>
                  </div>
                </template>
              </div>
            </div>

            <!-- Barras por equipe -->
            <div class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl overflow-hidden">
              <div class="flex items-center gap-2 px-4 py-3 border-b border-white/10">
                <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                <h3 class="text-sm font-semibold">Cumprimento por Equipe</h3>
              </div>
              <div class="p-4" :style="`height:${Math.max(200, sla.by_team.length * 38 + 40)}px`">
                <template x-if="!sla.by_team.length">
                  <div class="flex flex-col items-center justify-center h-full text-gray-600">
                    <p class="text-sm">Sem dados de equipe</p>
                  </div>
                </template>
                <canvas id="slaTeamChart" x-show="sla.by_team.length"></canvas>
              </div>
            </div>

            <!-- Barras por política -->
            <div class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl overflow-hidden">
              <div class="flex items-center gap-2 px-4 py-3 border-b border-white/10">
                <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                <h3 class="text-sm font-semibold">Chamados por Política</h3>
              </div>
              <div class="p-4" style="height:260px">
                <template x-if="!sla.by_policy.length">
                  <div class="flex flex-col items-center justify-center h-full text-gray-600">
                    <p class="text-sm">Sem dados de política</p>
                  </div>
                </template>
                <canvas id="slaPolicyChart" x-show="sla.by_policy.length"></canvas>
              </div>
            </div>

          </div>

          <!-- ── Tabela: % por equipe detalhada ─────────────────────────── -->
          <template x-if="sla.by_team.length">
            <div class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl overflow-hidden">
              <div class="flex items-center gap-2 px-4 py-3 border-b border-white/10">
                <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                <h3 class="text-sm font-semibold">Detalhamento por Equipe</h3>
              </div>
              <div class="overflow-x-auto">
                <table class="w-full text-xs">
                  <thead><tr class="border-b border-white/5 text-gray-500">
                    <th class="text-left px-4 py-2">Equipe</th>
                    <th class="text-right px-4 py-2">Total</th>
                    <th class="text-right px-4 py-2">Cumpridos</th>
                    <th class="text-right px-4 py-2">Violados</th>
                    <th class="text-right px-4 py-2">% SLA</th>
                    <th class="text-right px-4 py-2">Tempo médio resposta</th>
                    <th class="px-4 py-2 w-32"></th>
                  </tr></thead>
                  <tbody>
                    <template x-for="row in sla.by_team" :key="row.team_name">
                      <tr class="border-b border-white/5 hover:bg-white/5 transition-colors">
                        <td class="px-4 py-2.5 font-medium text-gray-200" x-text="row.team_name"></td>
                        <td class="px-4 py-2.5 text-right text-gray-400" x-text="row.total"></td>
                        <td class="px-4 py-2.5 text-right text-emerald-400" x-text="row.compliant"></td>
                        <td class="px-4 py-2.5 text-right text-red-400" x-text="row.breached"></td>
                        <td class="px-4 py-2.5 text-right font-bold" :class="slaStatusClass(row)"
                            x-text="row.compliance_pct.toFixed(1) + '%'"></td>
                        <td class="px-4 py-2.5 text-right text-gray-400"
                            x-text="slaHoursLabel(row.avg_response_hours)"></td>
                        <td class="px-4 py-2.5">
                          <div class="h-1.5 rounded-full bg-white/5 overflow-hidden">
                            <div class="h-full rounded-full transition-all"
                              :class="row.compliance_pct >= 80 ? 'bg-emerald-500' : row.compliance_pct >= 60 ? 'bg-amber-500' : 'bg-red-500'"
                              :style="`width:${row.compliance_pct}%`"></div>
                          </div>
                        </td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
            </div>
          </template>

          <!-- ── Dois painéis lado a lado ───────────────────────────────── -->
          <div class="grid grid-cols-1 xl:grid-cols-2 gap-4">

            <!-- Em Risco -->
            <div class="bg-gray-900/40 backdrop-blur-xl border border-amber-500/15 rounded-2xl overflow-hidden">
              <div class="flex items-center gap-2 px-4 py-3 border-b border-white/10">
                <svg class="w-4 h-4 text-amber-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
                <h3 class="text-sm font-semibold">Em Risco <span class="text-[11px] text-gray-500 font-normal">(vence em &lt;8h)</span></h3>
                <span class="ml-auto text-xs text-amber-400" x-text="sla.at_risk_tickets.length + ' itens'"></span>
              </div>
              <div x-show="!sla.at_risk_tickets.length" class="px-4 py-6 text-sm text-gray-600 text-center">
                Nenhum ticket em risco
              </div>
              <div x-show="sla.at_risk_tickets.length" class="overflow-x-auto">
                <table class="w-full text-xs">
                  <thead><tr class="border-b border-white/5 text-gray-500">
                    <th class="text-left px-4 py-2">#</th>
                    <th class="text-left px-4 py-2">Título</th>
                    <th class="text-left px-4 py-2">Equipe</th>
                    <th class="text-left px-4 py-2">Política</th>
                    <th class="text-right px-4 py-2">Restam</th>
                  </tr></thead>
                  <tbody>
                    <template x-for="t in sla.at_risk_tickets" :key="t.id">
                      <tr class="border-b border-white/5 hover:bg-white/5 transition-colors cursor-pointer"
                          @click="window.openHelpdeskTicket(t.id)">
                        <td class="px-4 py-2.5 text-gray-500" x-text="'#' + t.id"></td>
                        <td class="px-4 py-2.5 text-gray-200 max-w-[160px] truncate" x-text="t.title"></td>
                        <td class="px-4 py-2.5 text-gray-400 truncate" x-text="t.team_name || '—'"></td>
                        <td class="px-4 py-2.5">
                          <span class="inline-flex px-1.5 py-0.5 rounded text-[10px] border"
                                :class="slaPriorityBadge(t.priority)"
                                x-text="t.policy_name || '—'"></span>
                        </td>
                        <td class="px-4 py-2.5 text-right font-bold text-amber-400"
                            x-text="slaHoursLabel(t.hours_diff)"></td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
            </div>

            <!-- Violados abertos -->
            <div class="bg-gray-900/40 backdrop-blur-xl border border-red-500/15 rounded-2xl overflow-hidden">
              <div class="flex items-center gap-2 px-4 py-3 border-b border-white/10">
                <svg class="w-4 h-4 text-red-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636l-1.414 1.414M6.05 17.95l-1.414 1.414M5.636 5.636l1.414 1.414M17.95 17.95l1.414 1.414M12 2v2m0 16v2M2 12h2m16 0h2"/><circle cx="12" cy="12" r="4"/></svg>
                <h3 class="text-sm font-semibold">Violados em Aberto</h3>
                <span class="ml-auto text-xs text-red-400" x-text="sla.breached_open_tickets.length + ' itens'"></span>
              </div>
              <div x-show="!sla.breached_open_tickets.length" class="px-4 py-6 text-sm text-gray-600 text-center">
                Nenhum ticket violado em aberto
              </div>
              <div x-show="sla.breached_open_tickets.length" class="overflow-x-auto">
                <table class="w-full text-xs">
                  <thead><tr class="border-b border-white/5 text-gray-500">
                    <th class="text-left px-4 py-2">#</th>
                    <th class="text-left px-4 py-2">Título</th>
                    <th class="text-left px-4 py-2">Equipe</th>
                    <th class="text-left px-4 py-2">Política</th>
                    <th class="text-right px-4 py-2">Atraso</th>
                  </tr></thead>
                  <tbody>
                    <template x-for="t in sla.breached_open_tickets" :key="t.id">
                      <tr class="border-b border-white/5 hover:bg-white/5 transition-colors cursor-pointer"
                          @click="window.openHelpdeskTicket(t.id)">
                        <td class="px-4 py-2.5 text-gray-500" x-text="'#' + t.id"></td>
                        <td class="px-4 py-2.5 text-gray-200 max-w-[160px] truncate" x-text="t.title"></td>
                        <td class="px-4 py-2.5 text-gray-400 truncate" x-text="t.team_name || '—'"></td>
                        <td class="px-4 py-2.5">
                          <span class="inline-flex px-1.5 py-0.5 rounded text-[10px] border"
                                :class="slaPriorityBadge(t.priority)"
                                x-text="t.policy_name || '—'"></span>
                        </td>
                        <td class="px-4 py-2.5 text-right font-bold text-red-400"
                            x-text="'+' + slaHoursLabel(Math.abs(t.hours_diff))"></td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
            </div>

          </div>

        </div>
      </template>

    </div>


    <!-- ═══════════════════════════════════════════════════════════════ -->
    <!-- TAB: HISTÓRICO                                                  -->
    <!-- ═══════════════════════════════════════════════════════════════ -->
    <div x-show="dashboardTab === 'history'" class="space-y-4">

      <p class="text-xs text-gray-500">Últimos 12 meses — Helpdesk</p>

      <!-- Notice for non-helpdesk sources -->
      <div x-show="source !== 'helpdesk'"
           class="flex flex-col items-center justify-center py-16 gap-3 bg-gray-900/30 border border-white/5 rounded-2xl text-center">
        <svg class="w-10 h-10 text-gray-600 opacity-40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"/></svg>
        <p class="text-sm text-gray-500">Histórico mensal disponível apenas para Helpdesk</p>
        <button @click="setSource('helpdesk')"
          class="px-4 py-1.5 rounded-xl text-xs bg-indigo-600/30 hover:bg-indigo-600/50 text-indigo-300 border border-indigo-500/30 transition-colors">
          Ver Helpdesk
        </button>
      </div>

      <template x-if="source === 'helpdesk' && historyLoading">
        <div class="bg-gray-900/40 border border-white/10 rounded-2xl overflow-hidden animate-pulse">
          <div class="flex items-center gap-2 px-4 py-3 border-b border-white/10">
            <div class="w-4 h-4 rounded bg-gray-700/60 shrink-0"></div>
            <div class="h-3.5 w-64 rounded bg-gray-700/50"></div>
          </div>
          <div class="p-4 flex items-end gap-2" style="height:320px">
            <template x-for="i in 12" :key="i">
              <div class="flex-1 flex flex-col gap-1 items-center">
                <div class="w-full rounded-t bg-blue-700/20" :style="`height:${30 + Math.random() * 50}%`"></div>
                <div class="w-full rounded-t bg-emerald-700/20" :style="`height:${20 + Math.random() * 40}%`"></div>
                <div class="h-2.5 w-full rounded bg-gray-700/30 mt-1"></div>
              </div>
            </template>
          </div>
        </div>
      </template>

      <template x-if="source === 'helpdesk' && !historyLoading && historyLoaded">
        <div class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl overflow-hidden">
          <div class="flex items-center gap-2 px-4 py-3 border-b border-white/10">
            <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"/></svg>
            <h3 class="text-sm font-semibold">Chamados criados vs encerrados por mês</h3>
          </div>
          <div class="p-4" style="height:320px">
            <canvas id="historyChart"></canvas>
          </div>
        </div>
      </template>

      <template x-if="source === 'helpdesk' && historyLoaded && !historyLoading && !history.monthly.length">
        <div class="flex flex-col items-center justify-center py-16 text-gray-600">
          <svg class="w-10 h-10 opacity-30 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
          <p class="text-sm">Nenhum dado histórico disponível ainda</p>
        </div>
      </template>

    </div>

  </div>

</div>
