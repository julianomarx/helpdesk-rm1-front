<div x-data="teamsPage()" x-init="init()"
  class="flex flex-1 flex-col min-h-0 gap-4 p-4 text-gray-200 overflow-y-auto custom-scroll">

  <!-- HEADER -->
  <div class="flex items-center justify-between shrink-0 flex-wrap gap-2">
    <div>
      <h1 class="text-xl font-bold">Equipes</h1>
      <p class="text-xs text-gray-400 mt-0.5">Status em tempo real — online, carga de chamados</p>
    </div>
    <div class="flex items-center gap-2">
      <!-- Nova equipe (admin only) -->
      <template x-if="$store.app.role === 'admin'">
        <button @click="showCreateModal = true"
          class="flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs bg-blue-600 hover:bg-blue-700
                 text-white font-medium transition">
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
          </svg>
          Nova equipe
        </button>
      </template>
      <button @click="load()" :disabled="loading"
        class="flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs bg-white/5 border border-white/10
               hover:bg-white/10 text-gray-300 disabled:opacity-50 transition">
        <svg class="w-3.5 h-3.5" :class="loading ? 'animate-spin' : ''" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        Atualizar
      </button>
    </div>
  </div>

  <!-- LOADING SKELETON -->
  <template x-if="loading">
    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 animate-pulse">
      <template x-for="i in 5" :key="i">
        <div class="bg-gray-900/40 border border-white/10 rounded-2xl p-4 space-y-3">
          <div class="h-4 w-32 rounded bg-gray-700/60"></div>
          <template x-for="j in 3" :key="j">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-full bg-gray-700/60 shrink-0"></div>
              <div class="flex-1 space-y-1.5">
                <div class="h-3 w-24 rounded bg-gray-700/50"></div>
                <div class="h-2.5 w-16 rounded bg-gray-700/40"></div>
              </div>
            </div>
          </template>
        </div>
      </template>
    </div>
  </template>

  <!-- TEAMS GRID -->
  <template x-if="!loading">
    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
      <template x-for="team in teams" :key="team.id">
        <div class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl overflow-hidden flex flex-col">

          <!-- Team Header -->
          <div class="flex items-center gap-2 px-4 py-3 border-b border-white/5">
            <div class="w-2 h-2 rounded-full shrink-0" :class="onlineCount(team) > 0 ? 'bg-emerald-400' : 'bg-gray-600'"></div>
            <h2 class="text-sm font-semibold flex-1 truncate" x-text="team.name"></h2>
            <span class="text-[10px] text-gray-500 shrink-0"
              x-text="onlineCount(team) + '/' + team.members.length + ' online'"></span>
            <!-- Delete team (admin only) -->
            <template x-if="$store.app.role === 'admin'">
              <button @click="deleteTeam(team.id, team.name)"
                class="ml-1 p-1 rounded-lg text-gray-600 hover:text-red-400 hover:bg-red-900/20 transition"
                title="Excluir equipe">
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
              </button>
            </template>
          </div>

          <!-- Members List -->
          <div class="divide-y divide-white/5 flex-1">
            <template x-if="team.members.length === 0">
              <div class="px-4 py-6 text-xs text-gray-600 text-center">Nenhum membro</div>
            </template>
            <template x-for="member in team.members" :key="member.id">
              <div class="flex items-center gap-3 px-4 py-2.5 hover:bg-white/5 transition-colors group">

                <!-- Avatar + online dot -->
                <div class="relative shrink-0">
                  <div class="w-8 h-8 rounded-full overflow-hidden bg-gradient-to-br from-blue-500 to-cyan-600
                               flex items-center justify-center text-[11px] font-semibold text-white">
                    <template x-if="member.avatar_url">
                      <img :src="member.avatar_url" class="w-full h-full object-cover">
                    </template>
                    <template x-if="!member.avatar_url">
                      <span x-text="initials(member.name)"></span>
                    </template>
                  </div>
                  <span class="absolute -bottom-0.5 -right-0.5 w-2.5 h-2.5 rounded-full border-2 border-gray-900"
                    :class="member.online ? 'bg-emerald-400' : 'bg-gray-600'"></span>
                </div>

                <!-- Name + role -->
                <div class="flex-1 min-w-0">
                  <p class="text-xs font-medium text-gray-200 truncate" x-text="member.name"></p>
                  <p class="text-[10px] text-gray-500" x-text="roleLabel(member.role)"></p>
                </div>

                <!-- Active tickets badge -->
                <div class="shrink-0 flex items-center gap-1.5">
                  <template x-if="member.active_tickets > 0">
                    <span class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded-full text-[10px] font-semibold"
                      :class="member.active_tickets >= 5 ? 'bg-red-900/40 text-red-300 border border-red-600/30'
                            : member.active_tickets >= 3 ? 'bg-amber-900/40 text-amber-300 border border-amber-600/30'
                            : 'bg-blue-900/30 text-blue-300 border border-blue-600/20'">
                      <svg class="w-2.5 h-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                      </svg>
                      <span x-text="member.active_tickets"></span>
                    </span>
                  </template>
                  <template x-if="member.active_tickets === 0">
                    <span class="text-[10px] text-gray-600">livre</span>
                  </template>

                  <!-- Remove member (admin only) -->
                  <template x-if="$store.app.role === 'admin'">
                    <button @click="removeMember(team.id, member.id, member.name)"
                      class="opacity-0 group-hover:opacity-100 p-0.5 rounded text-gray-600 hover:text-red-400 transition"
                      title="Remover da equipe">
                      <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                      </svg>
                    </button>
                  </template>
                </div>

              </div>
            </template>
          </div>

          <!-- Add member panel (admin only) -->
          <template x-if="$store.app.role === 'admin'">
            <div class="border-t border-white/5">
              <!-- Toggle button -->
              <button @click="toggleMemberPanel(team.id)"
                class="w-full flex items-center justify-center gap-1.5 px-4 py-2 text-xs text-gray-500
                       hover:text-gray-300 hover:bg-white/5 transition"
                :class="memberPanel[team.id]?.open ? 'text-blue-400' : ''">
                <svg class="w-3 h-3 transition-transform" :class="memberPanel[team.id]?.open ? 'rotate-45' : ''" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
                </svg>
                <span x-text="memberPanel[team.id]?.open ? 'Cancelar' : 'Adicionar membro'"></span>
              </button>

              <!-- Search + list -->
              <div x-show="memberPanel[team.id]?.open" class="px-3 pb-3 space-y-2">
                <input
                  x-model="memberPanel[team.id].search"
                  type="text"
                  placeholder="Buscar agente..."
                  class="w-full px-3 py-1.5 rounded-lg bg-white/[0.04] border border-white/10
                         text-xs text-gray-200 placeholder-gray-600
                         focus:outline-none focus:ring-1 focus:ring-blue-500/50">

                <div class="max-h-40 overflow-y-auto custom-scroll space-y-0.5">
                  <template x-if="availableAgents(team.id).length === 0">
                    <p class="text-xs text-gray-600 text-center py-3">
                      <span x-text="memberPanel[team.id]?.search ? 'Nenhum resultado' : 'Todos os agentes já são membros'"></span>
                    </p>
                  </template>
                  <template x-for="agent in availableAgents(team.id)" :key="agent.id">
                    <button @click="addMember(team.id, agent.id)"
                      :disabled="memberPanel[team.id]?.adding"
                      class="w-full flex items-center gap-2 px-2 py-1.5 rounded-lg text-left
                             hover:bg-white/[0.06] disabled:opacity-50 transition group/add">
                      <div class="w-6 h-6 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600
                                   flex items-center justify-center text-[9px] font-bold text-white shrink-0">
                        <span x-text="initials(agent.name)"></span>
                      </div>
                      <span class="flex-1 text-xs text-gray-300 truncate" x-text="agent.name"></span>
                      <svg class="w-3 h-3 text-gray-600 group-hover/add:text-blue-400 transition shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
                      </svg>
                    </button>
                  </template>
                </div>
              </div>
            </div>
          </template>

        </div>
      </template>

      <!-- Card "Nova equipe" vazio (admin only) -->
      <template x-if="$store.app.role === 'admin'">
        <button @click="showCreateModal = true"
          class="bg-gray-900/20 border border-dashed border-white/10 rounded-2xl
                 flex flex-col items-center justify-center gap-2 py-10
                 text-gray-600 hover:text-gray-400 hover:border-white/20 hover:bg-gray-900/30
                 transition min-h-[120px]">
          <svg class="w-8 h-8 opacity-40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
          </svg>
          <span class="text-xs font-medium">Nova equipe</span>
        </button>
      </template>
    </div>
  </template>

  <!-- EMPTY (não admin) -->
  <template x-if="!loading && teams.length === 0 && $store.app.role !== 'admin'">
    <div class="flex flex-col items-center justify-center py-20 text-gray-600">
      <svg class="w-12 h-12 mb-3 opacity-30" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      <p class="text-sm">Nenhuma equipe encontrada</p>
    </div>
  </template>

  <!-- MODAL: CRIAR EQUIPE -->
  <template x-if="showCreateModal">
    <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm"
         @click.self="showCreateModal = false">
      <div class="bg-gray-900 border border-white/10 rounded-2xl w-full max-w-sm shadow-2xl p-6 space-y-4">
        <div class="flex items-center justify-between">
          <h2 class="text-base font-semibold">Nova equipe</h2>
          <button @click="showCreateModal = false" class="text-gray-500 hover:text-gray-300 transition">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1.5">Nome da equipe</label>
          <input
            x-model="newTeamName"
            @keydown.enter="createTeam()"
            @keydown.escape="showCreateModal = false"
            type="text"
            placeholder="Ex: RM1, RM1 SAP, Suporte N2..."
            x-ref="teamNameInput"
            x-init="$nextTick(() => $refs.teamNameInput?.focus())"
            class="w-full px-3 py-2 rounded-xl bg-white/[0.05] border border-white/10
                   text-sm text-gray-200 placeholder-gray-600
                   focus:outline-none focus:ring-1 focus:ring-blue-500/50">
        </div>
        <div class="flex gap-2 justify-end">
          <button @click="showCreateModal = false"
            class="px-4 py-2 rounded-xl text-sm text-gray-400 hover:text-white hover:bg-white/5 transition">
            Cancelar
          </button>
          <button @click="createTeam()" :disabled="creating || !newTeamName.trim()"
            class="px-5 py-2 rounded-xl text-sm bg-blue-600 hover:bg-blue-700 text-white font-medium
                   disabled:opacity-50 disabled:cursor-not-allowed transition flex items-center gap-2">
            <svg x-show="creating" class="w-3.5 h-3.5 animate-spin" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
            Criar equipe
          </button>
        </div>
      </div>
    </div>
  </template>

</div>
