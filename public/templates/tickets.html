<div
  x-data="ticketsPage()"
  x-init="getTickets(); fetchStats()"

  class="
    flex flex-col flex-1
    min-h-0
    overflow-x-hidden
    gap-5
    p-3
    text-gray-200"
  >

  
  <!-- HEADER -->
  <div class="shrink-0 flex items-center justify-between gap-3 flex-wrap">

    <!-- ESQUERDA: título + tabs + busca -->
    <div class="flex items-center gap-3 flex-wrap">

      <!-- TÍTULO -->
      <h1 class="text-xl font-bold text-gray-100 whitespace-nowrap mr-1">Gerenciar Chamados</h1>

      <!-- STATUS TABS -->
      <div class="inline-flex items-center gap-1 p-1 rounded-2xl bg-gray-800/30 backdrop-blur-2xl border border-white/10">
        <button @click="changeStatus('open')"
          class="px-4 py-2 rounded-xl text-sm transition"
          :class="ticketFilters.status === 'open' ? 'bg-blue-600 text-white shadow-lg' : 'text-gray-400 hover:text-white'">
          Abertos
        </button>
        <button @click="changeStatus('closed')"
          class="px-4 py-2 rounded-xl text-sm transition"
          :class="ticketFilters.status === 'closed' ? 'bg-emerald-600 text-white shadow-lg' : 'text-gray-400 hover:text-white'">
          Concluídos
        </button>
        <button @click="changeStatus('cancelled')"
          class="px-4 py-2 rounded-xl text-sm transition"
          :class="ticketFilters.status === 'cancelled' ? 'bg-red-600 text-white shadow-lg' : 'text-gray-400 hover:text-white'">
          Cancelados
        </button>
      </div>

      <!-- SEARCH -->
      <div class="relative min-w-[220px] max-w-[340px]">
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35m1.85-5.15a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </span>
        <input type="text" x-model="ticketFilters.search" placeholder="Buscar chamado..."
          @keydown.enter="getTickets()"
          class="w-full h-10 pl-10 pr-3 rounded-2xl bg-gray-800/50 border border-white/10">
      </div>

    </div>

    <!-- DIREITA: badges de progresso (somente quando aba Abertos) -->
    <template x-if="ticketStats && ticketFilters.status === 'open' && progressBadges.length > 0">
      <div class="flex items-center gap-1.5 flex-wrap">
        <span class="inline-flex items-center gap-1.5 px-2.5 py-1.5 rounded-xl text-xs bg-white/[0.04] border border-white/10 text-gray-300">
          <span class="w-1.5 h-1.5 rounded-full bg-blue-400"></span>
          <span x-text="ticketStats.total_open + ' abertos'"></span>
        </span>
        <template x-for="b in progressBadges" :key="b.key">
          <span class="inline-flex items-center gap-1 px-2.5 py-1.5 rounded-xl text-xs border"
                :class="b.cls">
            <span x-text="b.label + ': ' + b.count"></span>
          </span>
        </template>
      </div>
    </template>

  </div>

  <!-- FILTROS -->

  <div
    class="
      shrink-0
      px-4 py-3
      bg-gray-900/40
      backdrop-blur-xl
      border border-white/10
      rounded-2xl">

    <div
      class="
        flex
        flex-wrap
        items-end
        gap-3">

      <!-- PROGRESS -->

      <div class="flex flex-col min-w-[180px] flex-1">

        <label
          for="ticket-progress-filter"
          class="text-[11px] text-gray-400 mb-1">

          Progresso

        </label>

        <select
          id="ticket-progress-filter"
          x-model="ticketFilters.progress"

          class="
            h-10
            px-3
            rounded-xl
            input-class
            bg-gray-800/90
            border border-white/10">

          <option value="">Todos</option>
          <option value="waiting">Aguardando</option>
          <option value="in_progress">Em andamento</option>
          <option value="feedback">Feedback</option>
          <option value="awaiting_confirmation">Confirmação</option>
          <option value="scheduled_visit">Visita agendada</option>
          <option value="done">Finalizado</option>

        </select>

      </div>

      <!-- PRIORIDADE -->

      <div class="flex flex-col min-w-[140px] flex-1">

        <label
          for="ticket-priority-filter"
          class="text-[11px] text-gray-400 mb-1">

          Prioridade

        </label>

        <select
          id="ticket-priority-filter"
          x-model="ticketFilters.priority"

          class="
            h-10
            px-3
            rounded-xl
            input-class
            bg-gray-800/90
            border border-white/10">

          <option value="">Todas</option>
          <option value="high">Alta</option>
          <option value="medium">Média</option>
          <option value="low">Baixa</option>

        </select>

      </div>

      <!-- TIME -->

      <div class="flex flex-col min-w-[180px] flex-1">

        <label
          for="ticket-team-filter"
          class="text-[11px] text-gray-400 mb-1">

          Time

        </label>

        <select
          id="ticket-team-filter"
          x-model="ticketFilters.team_id"

          class="
            h-10
            px-3
            rounded-xl
            input-class
            bg-gray-800/90
            border border-white/10">

          <option value="">Todos</option>

          <template
            x-for="team in $store.app.teams"
            :key="team.id">

            <option
              :value="team.id"
              x-text="team.name">
            </option>

          </template>

        </select>

      </div>

      <!-- HOTEL -->

      <div class="flex flex-col min-w-[180px] flex-1">

        <label
          for="ticket-hotel-filter"
          class="text-[11px] text-gray-400 mb-1">

          Hotel

        </label>

        <select
          id="ticket-hotel-filter"
          x-model="ticketFilters.hotel_id"

          class="
            h-10
            px-3
            rounded-xl
            input-class
            bg-gray-800/90
            border border-white/10">

          <option value="">Todos</option>

          <template
            x-for="hotel in $store.app.hotels"
            :key="hotel.id">

            <option
              :value="hotel.id"
               x-text="`${hotel.code} - ${hotel.name}`">
            </option>

          </template>

        </select>

      </div>

      <!-- MEUS TICKETS -->

      <button
        x-show="$store.app.role === 'admin' || $store.app.role === 'agent'"
        @click="toggleMine()"
        :class="ticketFilters.mine
          ? 'bg-blue-600 border-blue-500/60 text-white'
          : 'input-class text-gray-400 hover:text-white'"
        class="h-10 px-4 rounded-xl border border-white/10 text-sm transition shrink-0 flex items-center gap-1.5">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
        Meus tickets
      </button>

      <!-- BOTÃO -->

      <button
        id="ticket-search-btn"
        @click="getTickets()"

        class="
          h-10
          px-6
          rounded-xl
          input-class
          bg-blue-600
          hover:bg-blue-700
          text-white
          transition
          shrink-0">

        Buscar

      </button>

    </div>

  </div>

  <!-- TABLE LIST -->
  <div class="flex flex-col flex-1 min-h-0 overflow-hidden rounded-2xl border border-white/10">

    <!-- SKELETON -->
    <template x-if="loadingTickets">
      <div class="flex flex-col flex-1 min-h-0">
        <div class="shrink-0 grid grid-cols-[48px_1fr_100px_170px_130px_150px_36px] gap-3 px-4 py-2
                    bg-gray-900/95 backdrop-blur-sm border-b border-white/5
                    text-[10px] uppercase tracking-widest text-gray-600 font-semibold">
          <span>#</span>
          <span>Título / Hotel</span>
          <span>Prioridade</span>
          <span>Progresso</span>
          <span>Time</span>
          <span>Responsável</span>
          <span></span>
        </div>
        <div class="flex-1 overflow-y-auto">
          <template x-for="i in 8" :key="i">
            <div class="grid grid-cols-[48px_1fr_100px_170px_130px_150px_36px] gap-3 px-4 py-3
                        border-b border-white/[0.04] animate-pulse">
              <div class="h-3.5 w-8 bg-gray-700/60 rounded self-center"></div>
              <div class="self-center space-y-1.5">
                <div class="h-3.5 w-48 bg-gray-700/60 rounded"></div>
                <div class="h-2.5 w-28 bg-gray-700/40 rounded"></div>
              </div>
              <div class="h-5 w-14 bg-gray-700/50 rounded-lg self-center"></div>
              <div class="h-5 w-24 bg-gray-700/50 rounded-lg self-center"></div>
              <div class="h-3 w-20 bg-gray-700/40 rounded self-center"></div>
              <div class="self-center space-y-1.5">
                <div class="h-3 w-20 bg-gray-700/40 rounded"></div>
                <div class="h-2.5 w-16 bg-gray-700/30 rounded"></div>
              </div>
              <div></div>
            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- LIST -->
    <template x-if="!loadingTickets">
      <div class="flex flex-col flex-1 min-h-0">

        <div class="shrink-0 grid grid-cols-[48px_1fr_100px_170px_130px_150px_36px] gap-3 px-4 py-2
                    bg-gray-900/95 backdrop-blur-sm border-b border-white/5
                    text-[10px] uppercase tracking-widest text-gray-600 font-semibold">
          <span>#</span>
          <span>Título / Hotel</span>
          <span>Prioridade</span>
          <span>Progresso</span>
          <span>Time</span>
          <span>Responsável</span>
          <span></span>
        </div>

        <div class="flex-1 overflow-y-auto custom-scroll">

          <template x-for="ticket in ticketList" :key="ticket.id">
            <div @click="viewTicket(ticket)"
              class="grid grid-cols-[48px_1fr_100px_170px_130px_150px_36px] gap-3 px-4 py-2.5
                     border-b border-white/[0.04] hover:bg-white/[0.06] cursor-pointer transition group">

              <span class="text-xs font-mono text-blue-400 group-hover:text-blue-300 transition self-center"
                    x-text="'#' + ticket.id"></span>

              <div class="min-w-0 self-center">
                <p class="text-sm font-medium text-gray-200 truncate group-hover:text-white transition"
                   x-text="ticket.title"></p>
                <p class="text-[11px] text-gray-500 truncate mt-0.5"
                   x-text="(ticket.hotel?.code || '') + (ticket.hotel?.name ? ' · ' + ticket.hotel.name : '')"></p>
                <p x-show="ticket.description"
                   class="text-[10px] text-gray-600 truncate mt-0.5"
                   x-text="ticket.description ? ticket.description.slice(0, 120) : ''"></p>
              </div>

              <div class="self-center">
                <span class="inline-flex items-center px-2 py-1 rounded-lg text-[10px] font-medium border"
                      :class="{
                        'bg-orange-500/15 text-orange-300 border-orange-500/30': ticket.priority === 'high',
                        'bg-yellow-500/15 text-yellow-300 border-yellow-500/30': ticket.priority === 'medium',
                        'bg-slate-500/15 text-slate-300 border-slate-500/30':   ticket.priority === 'low'
                      }"
                      x-text="({'high':'Alta','medium':'Média','low':'Baixa'})[ticket.priority] || ticket.priority"></span>
              </div>

              <div class="self-center">
                <span class="inline-flex items-center px-2 py-1 rounded-lg text-[10px] font-medium border"
                      :class="{
                        'bg-red-500/15 text-red-300 border-red-500/30':            ticket.progress === 'waiting',
                        'bg-blue-500/15 text-blue-300 border-blue-500/30':         ticket.progress === 'in_progress',
                        'bg-yellow-500/15 text-yellow-300 border-yellow-500/30':   ticket.progress === 'feedback',
                        'bg-gray-500/15 text-gray-300 border-gray-500/30':         ticket.progress === 'awaiting_confirmation',
                        'bg-indigo-500/15 text-indigo-300 border-indigo-500/30':   ticket.progress === 'scheduled_visit',
                        'bg-emerald-500/15 text-emerald-300 border-emerald-500/30': ticket.progress === 'done'
                      }"
                      x-text="({'waiting':'Aguardando','in_progress':'Em atendimento','feedback':'Feedback','awaiting_confirmation':'Ag. confirmação','scheduled_visit':'Visita agendada','done':'Concluído'})[ticket.progress] || ticket.progress"></span>
              </div>

              <span class="text-[11px] text-gray-500 truncate self-center"
                    x-text="ticket.assigned_team?.name || '—'"></span>

              <div class="min-w-0 self-center">
                <p class="text-[11px] text-gray-500 truncate" x-text="ticket.creator?.name || '—'"></p>
                <p class="text-[10px] text-gray-600 mt-0.5" x-text="formatDate(ticket.created_at)"></p>
              </div>

              <div class="self-center flex justify-center">
                <button @click.stop="copyTicket(ticket)" title="Copiar resumo"
                  class="w-7 h-7 flex items-center justify-center rounded-lg
                         border border-transparent hover:border-green-500/20 hover:bg-green-500/10 transition-all">
                  <svg class="w-3.5 h-3.5 text-gray-500 group-hover:text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                  </svg>
                </button>
              </div>

            </div>
          </template>

          <template x-if="ticketList.length === 0">
            <div class="flex flex-col items-center justify-center py-20 text-gray-600">
              <svg class="w-10 h-10 mb-3 opacity-30" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
              </svg>
              <span class="text-sm">Nenhum chamado encontrado</span>
            </div>
          </template>

          <p class="text-[10px] text-gray-700 text-center py-3"
             x-text="ticketList.length + ' chamado(s) nesta página'"></p>

        </div>
      </div>
    </template>

  </div>

  <!-- PAGINATION -->

  <div
    class="
      shrink-0
      relative
      border-t border-white/10
      pt-3">

    <!-- TOTAL -->

    <div
      class="
        absolute
        left-0
        top-3
        text-sm
        text-gray-500">

      <span x-text="pagination.total"></span>
      chamados

    </div>

    <!-- PAGINAÇÃO -->

    <div
      class="
        flex
        justify-center
        items-center
        gap-2">

      <button
        id="ticket-previous-page-btn"
        @click="previousPage"
        :disabled="pagination.page <= 1"

        class="
          w-9 h-9
          rounded-xl
          bg-gray-800
          hover:bg-gray-700
          transition
          disabled:opacity-30">

        ←

      </button>

      <span class="text-sm text-gray-400">

        <span x-text="pagination.page"></span>
        /
        <span x-text="pagination.pages"></span>

      </span>

      <button
        id="ticket-next-page-btn"
        @click="nextPage"
        :disabled="pagination.page >= pagination.pages"

        class="
          w-9 h-9
          rounded-xl
          bg-gray-800
          hover:bg-gray-700
          transition
          disabled:opacity-30">

        →

      </button>

    </div>

  </div>

  <!-- FAB -->
  <button
    id="create-ticket-btn"
    @click="resetNewTicketModal(); showCreateTicketModal = true;"

    class="
      fixed
      bottom-8 right-8
      w-16 h-16
      rounded-full
      bg-blue-600
      hover:bg-blue-700
      text-white
      shadow-2xl
      flex items-center justify-center
      transition
      hover:scale-105
      z-40">

    <span class="text-4xl leading-none">
      +
    </span>

  </button>

  <!-- MODAL CREATE TICKET -->
  <div
    x-show="showCreateTicketModal"
    x-transition.opacity
    class="fixed inset-0 z-50
          bg-black/60 backdrop-blur-sm
          flex items-center justify-center px-3 py-4">

    <div
      @click.outside="showCreateTicketModal = false"
      class="bg-gray-900/95 backdrop-blur-xl
            border border-white/10
            rounded-2xl
            shadow-2xl
            w-full
            max-w-2xl
            flex flex-col
            overflow-hidden"
      style="height:min(90vh,760px)">

      <!-- Header -->
      <div class="flex items-center gap-3 px-6 py-4 border-b border-white/10 shrink-0">

        <div class="w-8 h-8 rounded-xl bg-blue-600/20 border border-blue-500/30 flex items-center justify-center shrink-0">
          <svg class="w-4 h-4 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
          </svg>
        </div>

        <div class="flex-1 min-w-0">
          <h2 class="font-semibold text-base text-gray-100">Abrir chamado</h2>
          <p class="text-[11px] text-gray-500 mt-0.5">Registre uma nova solicitação</p>
        </div>

        <button @click="showCreateTicketModal = false"
          class="w-8 h-8 rounded-xl bg-white/5 hover:bg-white/10 flex items-center justify-center text-gray-400 hover:text-gray-200 transition">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>

      </div>

      <!-- Body -->
      <div class="flex-1 overflow-y-auto px-6 py-5 custom-scroll">

        <!-- Título -->
        <div class="mb-5">

          <label class="block text-xs mb-1 text-gray-300">
            Título *
          </label>

          <input
            type="text"
            x-model="newTicket.title"
            maxlength="100"
            placeholder="Digite o título do chamado"
            class="w-full p-3 rounded-2xl
                  bg-gray-800/50 border border-white/10
                  focus:ring-1 focus:ring-blue-500
                  focus:outline-none
                  placeholder-gray-400">

          <div
            class="flex justify-end text-xs mt-2"
            :class="100 - newTicket.title.length < 15
              ? 'text-yellow-400'
              : 'text-gray-400'">

            <span
              x-text="(100 - newTicket.title.length) + ' caracteres restantes'">
            </span>

          </div>

        </div>

        <!-- Categoria + Subcategoria -->
        <div class="grid grid-cols-2 gap-4 mb-5">

          <div>

            <label class="block text-xs mb-1 text-gray-300">
              Categoria *
            </label>

            <select
              x-model="newTicket.categoryId"
              @change="newTicket.subcategoryId = ''"
              class="w-full p-3 rounded-2xl
                    bg-gray-800/90 border border-white/10
                    focus:ring-1 focus:ring-blue-500
                    focus:outline-none">

              <option value="">
                Selecione uma categoria
              </option>

              <template
                x-for="cat in $store.app.categories"
                :key="cat.id">

                <option
                  :value="cat.id"
                  x-text="cat.name">
                </option>

              </template>

            </select>

          </div>

          <div>

            <label class="block text-xs mb-1 text-gray-300">
              Subcategoria *
            </label>

            <select
              x-model="newTicket.subcategoryId"
              :disabled="!newTicket.categoryId"
              class="w-full p-3 rounded-2xl
                    bg-gray-800/90 border border-white/10
                    focus:ring-1 focus:ring-blue-500
                    focus:outline-none
                    disabled:opacity-50
                    disabled:cursor-not-allowed">

              <option value="">
                Selecione uma subcategoria
              </option>

              <template
                x-for="sub in $store.app.subcategories"
                :key="sub.id">

                <option
                  x-show="sub.category_id === Number(newTicket.categoryId)"
                  :value="sub.id"
                  x-text="sub.name">
                </option>

              </template>

            </select>

          </div>

        </div>

        <!-- Descrição -->
        <div class="mb-5">

          <label class="block text-xs mb-1 text-gray-300">
            Descrição *
          </label>

          <textarea
            x-model="newTicket.description"
            rows="10"
            placeholder="Descreva o problema..."
            class="w-full p-3 rounded-xl h-[200px]
                  bg-gray-800/50 border border-white/10
                  focus:ring-1 focus:ring-blue-500
                  focus:outline-none
                  resize-none
                  placeholder-gray-400">
          </textarea>

        </div>

        <!-- Hotel -->
        <div>

          <label class="block text-xs mb-1 text-gray-300">
            Hotel *
          </label>

          <select
            x-model="newTicket.hotelId"
            class="w-full p-3 rounded-2xl
                  bg-gray-800/90 border border-white/10
                  focus:ring-1 focus:ring-blue-500
                  focus:outline-none">

            <option value="">
              Selecione um hotel
            </option>

            <template
              x-for="hotel in $store.app.hotels"
              :key="hotel.id">

              <option
                :value="hotel.id"
                x-text="hotel.code + ' - ' + hotel.name">
              </option>

            </template>

          </select>

        </div>

        <!-- Anexos -->
        <div class="mt-5">

          <label class="block text-xs text-gray-300 mb-2">
            Anexos <span class="text-gray-500 font-normal">(opcional)</span>
          </label>

          <!-- Drop zone -->
          <div
            class="border border-dashed border-white/20 rounded-xl p-4 text-center
                   hover:border-white/40 hover:bg-white/[0.02] transition cursor-pointer"
            @dragover.prevent
            @drop.prevent="addPendingFiles($event.dataTransfer.files)"
            @click="$refs.fileInput.click()">

            <input type="file" x-ref="fileInput" class="hidden" multiple
              accept=".jpg,.jpeg,.png,.gif,.webp,.pdf,.doc,.docx,.xls,.xlsx,.txt,.csv,.zip"
              @change="addPendingFiles($event.target.files); $event.target.value = ''">

            <div class="flex items-center justify-center gap-2 text-gray-500">
              <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M18.375 12.739l-7.693 7.693a4.5 4.5 0 01-6.364-6.364l10.94-10.94A3 3 0 1119.5 7.372L8.552 18.32m.009-.01l-.01.01m5.699-9.941l-7.81 7.81a1.5 1.5 0 002.112 2.13"/>
              </svg>
              <span class="text-xs">Clique ou arraste arquivos aqui</span>
            </div>
            <p class="text-[10px] text-gray-600 mt-1">PDF, Word, Excel, imagens, ZIP — máx. 10 MB por arquivo</p>

          </div>

          <!-- Lista de arquivos pendentes -->
          <div x-show="pendingFiles.length > 0" class="mt-2 space-y-1.5">
            <template x-for="(file, i) in pendingFiles" :key="i">
              <div class="flex items-center gap-2 px-3 py-2 rounded-xl bg-white/5 border border-white/10">
                <svg class="w-3.5 h-3.5 text-gray-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
                </svg>
                <span class="text-xs text-gray-300 flex-1 min-w-0 truncate" x-text="file.name"></span>
                <span class="text-[10px] text-gray-500 shrink-0" x-text="file.size > 1048576 ? (file.size / 1048576).toFixed(1) + ' MB' : Math.round(file.size / 1024) + ' KB'"></span>
                <button @click.stop="removePendingFile(i)"
                  class="w-5 h-5 rounded flex items-center justify-center text-gray-500 hover:text-red-400 hover:bg-red-500/10 transition shrink-0">
                  <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                  </svg>
                </button>
              </div>
            </template>
          </div>

        </div>

      </div>

      <!-- Footer -->
      <div class="flex justify-end gap-2 px-6 py-4 border-t border-white/10 shrink-0">

        <button
          @click="showCreateTicketModal = false"
          class="px-4 py-2 rounded-xl text-sm font-medium text-gray-300
                bg-white/5 hover:bg-white/10 border border-white/10 transition">
          Cancelar
        </button>

        <button
          @click="submitCreateTicket()"
          class="flex items-center gap-1.5 px-5 py-2 rounded-xl text-sm font-semibold
                bg-blue-600 hover:bg-blue-500 text-white shadow-lg shadow-blue-900/30 transition">
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
          Abrir chamado
        </button>

      </div>

    </div>

  </div>

</div>
