<div class="flex flex-col flex-1 min-h-0 gap-5 p-4 text-gray-200">

  <!-- HEADER -->
  <div class="shrink-0">

    <h1
      class="font-bold text-gray-200
             border-b border-gray-400 pb-1">

      Gerenciar Chamados

    </h1>

  </div>

  <!-- FILTERS -->
  <div
    class="p-5 shrink-0
           bg-gray-900/40
           backdrop-blur-xl backdrop-saturate-150
           border border-white/10
           rounded-2xl shadow-xl">

    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-5 gap-4">

      <!-- SEARCH -->
      <div class="xl:col-span-2">

        <label class="block text-xs mb-1">
          Buscar chamado
        </label>

        <input
          type="text"
          x-model="filters.search"
          placeholder="Título, descrição ou ticket..."
          class="w-full p-3 rounded-xl
                 bg-gray-800/50
                 border border-white/10
                 focus:outline-none
                 focus:ring-1 focus:ring-blue-500">
      </div>

      <!-- STATUS -->
      <div>

        <label class="block text-xs mb-1">
          Progresso
        </label>

        <select
          x-model="filters.progress"
          class="w-full p-3 rounded-xl
                 bg-gray-800/90
                 border border-white/10">

          <option value="">
            Todos
          </option>

          <option value="waiting">
            Aguardando
          </option>

          <option value="in_progress">
            Em andamento
          </option>

          <option value="feedback">
            Feedback
          </option>

          <option value="awaiting_confirmation">
            Confirmação
          </option>

          <option value="done">
            Finalizado
          </option>

        </select>

      </div>

      <!-- PRIORITY -->
      <div>

        <label class="block text-xs mb-1">
          Prioridade
        </label>

        <select
          x-model="filters.priority"
          class="w-full p-3 rounded-xl
                 bg-gray-800/90
                 border border-white/10">

          <option value="">
            Todas
          </option>

          <option value="critical">
            Crítica
          </option>

          <option value="high">
            Alta
          </option>

          <option value="medium">
            Média
          </option>

          <option value="low">
            Baixa
          </option>

        </select>

      </div>

      <!-- TEAM -->
      <div>

        <label class="block text-xs mb-1">
          Time
        </label>

        <select
          x-model="filters.team_id"
          class="w-full p-3 rounded-xl
                 bg-gray-800/90
                 border border-white/10">

          <option value="">
            Todos
          </option>

          <template
            x-for="team in $store.app.teams"
            :key="team.id">

            <option
              :value="team.id"
              x-text="team.name">
            </option>

          </template>

        </select>

      </div>

    </div>

  </div>

  <!-- LIST -->
  <div
    class="flex flex-col flex-1 min-h-0
           overflow-y-auto gap-3">

    <template
      x-for="ticket in filteredTickets"
      :key="ticket.id">

      <div
        @click="viewTicket(ticket)"
        class="group
               bg-gray-900/40
               backdrop-blur-xl backdrop-saturate-150
               border border-white/10
               rounded-2xl
               p-5
               cursor-pointer
               hover:bg-white/[0.04]
               hover:border-white/20
               transition-all">

        <!-- TOP -->
        <div class="flex items-start gap-4">

          <!-- ID -->
          <div
            class="shrink-0
                   text-blue-400
                   font-bold">

            #<span x-text="ticket.id"></span>

          </div>

          <!-- CONTENT -->
          <div class="flex-1 min-w-0">

            <!-- TITLE -->
            <div
              class="font-semibold text-gray-100
                     line-clamp-2 break-words"
              x-text="ticket.title">
            </div>

            <!-- SUB -->
            <div
              class="mt-1 text-xs text-gray-500
                     flex flex-wrap gap-2">

              <span
                x-text="ticket.hotel.code">
              </span>

              <span>
                •
              </span>

              <span
                x-text="ticket.hotel.name">
              </span>

              <span>
                •
              </span>

              <span
                x-text="ticket.creator.name">
              </span>

            </div>

          </div>

          <!-- ARROW -->
          <div
            class="text-gray-500
                   group-hover:text-gray-300">

            →

          </div>

        </div>

        <!-- BOTTOM -->
        <div
          class="mt-4
                 flex flex-wrap items-center
                 gap-2">

          <!-- PRIORITY -->
          <span
            class="px-3 py-1 rounded-full
                   text-xs font-semibold"

            :class="{
              'bg-red-500/15 text-red-300': ticket.priority === 'critical',
              'bg-orange-500/15 text-orange-300': ticket.priority === 'high',
              'bg-yellow-500/15 text-yellow-300': ticket.priority === 'medium',
              'bg-slate-500/15 text-slate-300': ticket.priority === 'low'
            }">

            <span x-text="ticket.priority"></span>

          </span>

          <!-- PROGRESS -->
          <span
            class="px-3 py-1 rounded-full
                   text-xs font-semibold"

            :class="{
              'bg-blue-500/15 text-blue-300': ticket.progress === 'in_progress',
              'bg-yellow-500/15 text-yellow-300': ticket.progress === 'feedback',
              'bg-emerald-500/15 text-emerald-300': ticket.progress === 'done',
              'bg-gray-500/15 text-gray-300': ticket.progress === 'awaiting_confirmation',
              'bg-red-500/15 text-red-300': ticket.progress === 'waiting'
            }">

            <span x-text="ticket.progress"></span>

          </span>

          <!-- TEAM -->
          <span
            class="px-3 py-1 rounded-full
                   text-xs font-semibold
                   bg-cyan-500/15
                   text-cyan-300"

            x-text="ticket.assigned_team.name">
          </span>

          <!-- UPDATED -->
          <span
            class="ml-auto
                   text-xs
                   text-gray-500"
            x-text="ticket.updated_at">
          </span>

        </div>

      </div>

    </template>

    <!-- EMPTY -->
    <template x-if="filteredTickets.length === 0">

      <div
        class="flex flex-1
               items-center justify-center
               text-gray-500">

        Nenhum chamado encontrado

      </div>

    </template>

  </div>

  <!-- FLOATING BUTTON -->
  <button
    @click="showCreateTicketModal = true"
    class="fixed
           bottom-8 right-8
           w-16 h-16
           rounded-full
           bg-blue-600  
           hover:bg-blue-700
           shadow-2xl
           flex items-center justify-center
           transition
           hover:scale-105
           z-40">

    <span class="text-4xl leading-none">
      +
    </span>

  </button>

</div>
