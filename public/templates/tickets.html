<div
  x-data="ticketsPage()"
  x-init="getTickets()"

  class="
    flex flex-col flex-1
    min-h-0
    overflow-x-hidden
    gap-5
    p-3
    text-gray-200"
  >

  
  <!-- HEADER -->
  <div
    class="
      shrink-0
      flex
      items-center
      gap-3
      pb-1
      border-b
      border-gray-400
      flex-wrap">

    <!-- TÍTULO -->

    <h1
      class="
        text-xl
        font-semibold
        whitespace-nowrap
        mr-3">

      Gerenciar Chamados

    </h1>

    <!-- STATUS -->

    <div
        class="inline-flex
        items-center
        gap-1
        p-1
        rounded-2xl
        bg-gray-800/30
        backdrop-blur-2xl
        border border-white/10">

        <button
            @click="changeStatus('open')"
            class="px-4 py-2 rounded-xl text-sm transition"
            :class="
                ticketFilters.status === 'open'
                ? 'bg-blue-600 text-white shadow-lg'
                : 'text-gray-400 hover:text-white'
            ">

            Abertos

        </button>

        <button
            @click="changeStatus('closed')"
            class="px-4 py-2 rounded-xl text-sm transition"
            :class="
                ticketFilters.status === 'closed'
                ? 'bg-emerald-600 text-white shadow-lg'
                : 'text-gray-400 hover:text-white'
            ">

            Concluídos

        </button>

        <button
            @click="changeStatus('cancelled')"
            class="px-4 py-2 rounded-xl text-sm transition"
            :class="
                ticketFilters.status === 'cancelled'
                ? 'bg-red-600 text-white shadow-lg'
                : 'text-gray-400 hover:text-white'
            ">

            Cancelados

        </button>

    </div>

    <!-- SEARCH -->

    <div class="relative flex-1 min-w-[260px] max-w-[420px]">

      <span
        class="
          absolute
          left-3
          top-1/2
          -translate-y-1/2
          text-gray-500
          pointer-events-none">

        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-4 h-4"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor">

          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M21 21l-4.35-4.35m1.85-5.15a7 7 0 11-14 0 7 7 0 0114 0z" />

        </svg>

      </span>

      <input
        type="text"
        x-model="ticketFilters.search"
        placeholder="Buscar chamado..."

        @keydown.enter="getTickets()"

        class="
          w-full
          h-10
          pl-10
          pr-3
          rounded-2xl
          bg-gray-800/50
          border border-white/10"
         >

    </div>

  </div>

  <!-- FILTROS -->

  <div
    class="
      shrink-0
      px-4 py-3
      bg-gray-900/40
      backdrop-blur-xl
      border border-white/10
      rounded-2xl">

    <div
      class="
        flex
        flex-wrap
        items-end
        gap-3">

      <!-- PROGRESS -->

      <div class="flex flex-col min-w-[180px] flex-1">

        <label
          for="ticket-progress-filter"
          class="text-[11px] text-gray-400 mb-1">

          Progresso

        </label>

        <select
          id="ticket-progress-filter"
          x-model="ticketFilters.progress"

          class="
            h-10
            px-3
            rounded-xl
            input-class
            bg-gray-800/90
            border border-white/10">

          <option value="">Todos</option>
          <option value="waiting">Aguardando</option>
          <option value="in_progress">Em andamento</option>
          <option value="feedback">Feedback</option>
          <option value="awaiting_confirmation">Confirmação</option>
          <option value="scheduled_visit">Visita agendada</option>
          <option value="done">Finalizado</option>

        </select>

      </div>

      <!-- PRIORIDADE -->

      <div class="flex flex-col min-w-[140px] flex-1">

        <label
          for="ticket-priority-filter"
          class="text-[11px] text-gray-400 mb-1">

          Prioridade

        </label>

        <select
          id="ticket-priority-filter"
          x-model="ticketFilters.priority"

          class="
            h-10
            px-3
            rounded-xl
            input-class
            bg-gray-800/90
            border border-white/10">

          <option value="">Todas</option>
          <option value="high">Alta</option>
          <option value="medium">Média</option>
          <option value="low">Baixa</option>

        </select>

      </div>

      <!-- TIME -->

      <div class="flex flex-col min-w-[180px] flex-1">

        <label
          for="ticket-team-filter"
          class="text-[11px] text-gray-400 mb-1">

          Time

        </label>

        <select
          id="ticket-team-filter"
          x-model="ticketFilters.team_id"

          class="
            h-10
            px-3
            rounded-xl
            input-class
            bg-gray-800/90
            border border-white/10">

          <option value="">Todos</option>

          <template
            x-for="team in $store.app.teams"
            :key="team.id">

            <option
              :value="team.id"
              x-text="team.name">
            </option>

          </template>

        </select>

      </div>

      <!-- HOTEL -->

      <div class="flex flex-col min-w-[180px] flex-1">

        <label
          for="ticket-hotel-filter"
          class="text-[11px] text-gray-400 mb-1">

          Hotel

        </label>

        <select
          id="ticket-hotel-filter"
          x-model="ticketFilters.hotel_id"

          class="
            h-10
            px-3
            rounded-xl
            input-class
            bg-gray-800/90
            border border-white/10">

          <option value="">Todos</option>

          <template
            x-for="hotel in $store.app.hotels"
            :key="hotel.id">

            <option
              :value="hotel.id"
               x-text="`${hotel.code} - ${hotel.name}`">
            </option>

          </template>

        </select>

      </div>

      <!-- BOTÃO -->

      <button
        id="ticket-search-btn"
        @click="getTickets()"

        class="
          h-10
          px-6
          rounded-xl
          input-class
          bg-blue-600
          hover:bg-blue-700
          text-white
          transition
          shrink-0">

        Buscar

      </button>

    </div>

  </div>

  <div class="flex flex-col flex-1 min-h-0 overflow-y-auto gap-3">

    <!-- SKELETON -->
    <template x-if="loadingTickets">

        <div class="space-y-3">

            <template x-for="i in 6">

                <div
                    class="
                        h-28
                        rounded-2xl
                        border border-white/10
                        bg-gray-800/30
                        backdrop-blur-xl
                        animate-pulse
                        p-4
                    "
                >

                    <div class="flex justify-between">

                        <div class="space-y-2 flex-1">

                            <div class="h-4 w-40 bg-gray-700 rounded"></div>

                            <div class="h-3 w-64 bg-gray-700 rounded"></div>

                            <div class="h-3 w-52 bg-gray-700 rounded"></div>

                        </div>

                        <div class="h-6 w-20 bg-gray-700 rounded-full"></div>

                    </div>

                </div>

            </template>

        </div>

    </template>

  <!-- LIST -->
  <div x-if="!loadingTickets"
    class="flex flex-col flex-1 min-h-0
           overflow-y-auto gap-3">

    <template
      x-for="ticket in ticketList"
      :key="ticket.id">

      <div
        @click="viewTicket(ticket)"
        class="
          group
          bg-gray-900/40
          backdrop-blur-xl
          border border-white/10
          rounded-2xl
          p-4
          cursor-pointer
          hover:bg-white/[0.04]
          hover:border-white/20
          transition-all">

        <div class="flex items-start gap-4">

          <div
            class="shrink-0
                   text-blue-400
                   font-bold">

            #<span x-text="ticket.id"></span>

          </div>

          <div class="flex-1 min-w-0">

            <div
              class="font-semibold text-gray-100 line-clamp-2"
              x-text="ticket.title">
            </div>

            <div
              class="mt-1 text-xs text-gray-500 flex flex-wrap gap-2">

              <span x-text="ticket.hotel?.code"></span>

              <span>•</span>

              <span x-text="ticket.hotel?.name"></span>

    
            </div>

          </div>

          <button
            @click.stop="copyTicket(ticket)"
            title="Copiar resumo do ticket"
            class="group
                  w-8 h-8
                  flex items-center justify-center
                  rounded-lg
                  border border-transparent
                  hover:border-green-500/20
                  hover:bg-green-500/10
                  transition-all">

            <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-6 h-6 text-gray-400 group-hover:text-green-400"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor">

                <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
            </svg>

          </button>

        </div>

        <div
          class="mt-3
                 flex flex-wrap items-center gap-2">

          <span
            class="px-3 py-1 rounded-full text-xs font-semibold"

            :class="{
              'bg-orange-500/15 text-orange-300': ticket.priority === 'high',
              'bg-yellow-500/15 text-yellow-300': ticket.priority === 'medium',
              'bg-slate-500/15 text-slate-300': ticket.priority === 'low'
            }">

            <span x-text="ticket.priority"></span>

          </span>

          <span
            class="px-3 py-1 rounded-full text-xs font-semibold"

            :class="{
              'bg-red-500/15 text-red-300':    ticket.progress === 'waiting',
              'bg-blue-500/15 text-blue-300':  ticket.progress === 'in_progress',
              'bg-yellow-500/15 text-yellow-300': ticket.progress === 'feedback',
              'bg-gray-500/15 text-gray-300':  ticket.progress === 'awaiting_confirmation',
              'bg-indigo-500/15 text-indigo-300': ticket.progress === 'scheduled_visit',
              'bg-emerald-500/15 text-emerald-300': ticket.progress === 'done'
            }">

            <span x-text="({'waiting':'Aguardando','in_progress':'Em atendimento','feedback':'Retorno','awaiting_confirmation':'Ag. confirmação','scheduled_visit':'Visita agendada','done':'Concluído'})[ticket.progress] || ticket.progress"></span>

          </span>

          <template x-if="ticket.assigned_team">

            <span
              class="
                px-3 py-1 rounded-full
                text-xs font-semibold
                bg-cyan-500/15
                text-cyan-300"

              x-text="ticket.assigned_team.name">
            </span>

          </template>


        

          <div
            class="ml-auto text-xs text-gray-500"
          >

          <span>Aberto por: </span>

          <span x-text="ticket.creator?.name"></span>

          <span>•</span>

          <span
            x-text="formatDate(ticket.created_at)">
          </span>

          </div>
          
  

        </div>

      </div>

    </template>

    <!-- EMPTY -->
    <template x-if="ticketList.length === 0">

       <div
        class="flex items-center justify-center
               h-full text-gray-500 text-sm">

        Nenhum ticket encontrado

      </div>

    </template>
  

  </div>

  <!-- PAGINATION -->

  <div
    class="
      shrink-0
      relative
      border-t border-white/10
      pt-3">

    <!-- TOTAL -->

    <div
      class="
        absolute
        left-0
        top-3
        text-sm
        text-gray-500">

      <span x-text="pagination.total"></span>
      chamados

    </div>

    <!-- PAGINAÇÃO -->

    <div
      class="
        flex
        justify-center
        items-center
        gap-2">

      <button
        id="ticket-previous-page-btn"
        @click="previousPage"
        :disabled="pagination.page <= 1"

        class="
          w-9 h-9
          rounded-xl
          bg-gray-800
          hover:bg-gray-700
          transition
          disabled:opacity-30">

        ←

      </button>

      <span class="text-sm text-gray-400">

        <span x-text="pagination.page"></span>
        /
        <span x-text="pagination.pages"></span>

      </span>

      <button
        id="ticket-next-page-btn"
        @click="nextPage"
        :disabled="pagination.page >= pagination.pages"

        class="
          w-9 h-9
          rounded-xl
          bg-gray-800
          hover:bg-gray-700
          transition
          disabled:opacity-30">

        →

      </button>

    </div>

  </div>

  <!-- FAB -->
  <button
    id="create-ticket-btn"
    @click="resetNewTicketModal(); showCreateTicketModal = true;"

    class="
      fixed
      bottom-8 right-8
      w-16 h-16
      rounded-full
      bg-blue-600
      hover:bg-blue-700
      text-white
      shadow-2xl
      flex items-center justify-center
      transition
      hover:scale-105
      z-40">

    <span class="text-4xl leading-none">
      +
    </span>

  </button>

  <!-- MODAL CREATE TICKET -->
  <div
    x-show="showCreateTicketModal"
    x-transition.opacity
    class="fixed inset-0 z-50
          bg-black/50 backdrop-blur-sm
          flex items-center justify-center">

    <div
      @click.outside="showCreateTicketModal = false"
      class="bg-gray-800/40 backdrop-blur-2xl
            border border-white/10
            rounded-[32px]
            shadow-2xl
            w-[94vw]
            max-w-7xl
            h-[82vh]
            p-6
            flex flex-col
            backdrop-saturate-150">

      <!-- Header -->
      <div class="mb-6 shrink-0">

        <h2 class="text-xl font-bold text-gray-100">
          Abrir chamado
        </h2>

        <p class="text-sm text-gray-400 mt-1">
          Registre uma nova solicitação.
        </p>

      </div>

      <!-- Body -->
      <div class="flex-1 overflow-y-auto pr-2 custom-scroll">

        <!-- Título -->
        <div class="mb-5">

          <label class="block text-xs mb-1 text-gray-300">
            Título *
          </label>

          <input
            type="text"
            x-model="newTicket.title"
            maxlength="100"
            placeholder="Digite o título do chamado"
            class="w-full p-3 rounded-2xl
                  bg-gray-800/50 border border-white/10
                  focus:ring-1 focus:ring-blue-500
                  focus:outline-none
                  placeholder-gray-400">

          <div
            class="flex justify-end text-xs mt-2"
            :class="100 - newTicket.title.length < 15
              ? 'text-yellow-400'
              : 'text-gray-400'">

            <span
              x-text="(100 - newTicket.title.length) + ' caracteres restantes'">
            </span>

          </div>

        </div>

        <!-- Categoria + Subcategoria -->
        <div class="grid grid-cols-2 gap-4 mb-5">

          <div>

            <label class="block text-xs mb-1 text-gray-300">
              Categoria *
            </label>

            <select
              x-model="newTicket.categoryId"
              @change="newTicket.subcategoryId = ''"
              class="w-full p-3 rounded-2xl
                    bg-gray-800/90 border border-white/10
                    focus:ring-1 focus:ring-blue-500
                    focus:outline-none">

              <option value="">
                Selecione uma categoria
              </option>

              <template
                x-for="cat in $store.app.categories"
                :key="cat.id">

                <option
                  :value="cat.id"
                  x-text="cat.name">
                </option>

              </template>

            </select>

          </div>

          <div>

            <label class="block text-xs mb-1 text-gray-300">
              Subcategoria *
            </label>

            <select
              x-model="newTicket.subcategoryId"
              :disabled="!newTicket.categoryId"
              class="w-full p-3 rounded-2xl
                    bg-gray-800/90 border border-white/10
                    focus:ring-1 focus:ring-blue-500
                    focus:outline-none
                    disabled:opacity-50
                    disabled:cursor-not-allowed">

              <option value="">
                Selecione uma subcategoria
              </option>

              <template
                x-for="sub in $store.app.subcategories"
                :key="sub.id">

                <option
                  x-show="sub.category_id === Number(newTicket.categoryId)"
                  :value="sub.id"
                  x-text="sub.name">
                </option>

              </template>

            </select>

          </div>

        </div>

        <!-- Descrição -->
        <div class="mb-5">

          <label class="block text-xs mb-1 text-gray-300">
            Descrição *
          </label>

          <textarea
            x-model="newTicket.description"
            rows="10"
            placeholder="Descreva o problema..."
            class="w-full p-3 rounded-xl h-[200px]
                  bg-gray-800/50 border border-white/10
                  focus:ring-1 focus:ring-blue-500
                  focus:outline-none
                  resize-none
                  placeholder-gray-400">
          </textarea>

        </div>

        <!-- Prioridade + Hotel -->
        <div class="grid grid-cols-2 gap-4">

          <div>

            <label class="block text-xs mb-1 text-gray-300">
              Prioridade *
            </label>

            <select
              x-model="newTicket.priority"
              class="w-full p-3 rounded-2xl
                    bg-gray-800/90 border border-white/10
                    focus:ring-1 focus:ring-blue-500
                    focus:outline-none">

              <option value="low">
                Baixa
              </option>

              <option value="medium">
                Média
              </option>

              <option value="high">
                Alta
              </option>

            </select>

          </div>

          <div>

            <label class="block text-xs mb-1 text-gray-300">
              Hotel *
            </label>

            <select
              x-model="newTicket.hotelId"
              class="w-full p-3 rounded-2xl
                    bg-gray-800/90 border border-white/10
                    focus:ring-1 focus:ring-blue-500
                    focus:outline-none">

              <option value="">
                Selecione um hotel
              </option>

              <template
                x-for="hotel in $store.app.hotels"
                :key="hotel.id">

                <option
                  :value="hotel.id"
                  x-text="hotel.code + ' - ' + hotel.name">
                </option>

              </template>

            </select>

          </div>

        </div>

      </div>

      <!-- Footer -->
      <div
        class="flex justify-end gap-3
              pt-5 mt-5
              border-t border-white/10
              shrink-0">

        <button
          @click="showCreateTicketModal = false"
          class="px-5 py-3 rounded-xl input-class
                bg-gray-700 hover:bg-gray-600
                transition">

          Cancelar

        </button>

        <button
          @click="submitCreateTicket()"
          class="px-6 py-3 rounded-xl input-class
                bg-blue-600 hover:bg-blue-700
                text-white font-semibold
                shadow-lg transition">

          Abrir chamado

        </button>

      </div>

    </div>

  </div>

</div>
