<div class="  flex-1 flex flex-col h-full gap-3">

  <!-- Cabeçalho FIXO AO TOPO  -->
  <div class=" p-1 rounded-t-lg  sticky top-0 z-10">

    <h1 class=" mr-1 font-bold text-gray-200  ">Chamados</h1>

    <div class="flex space-x-2 border-b border-gray-400">

      <button class="tab-btn" @click="currentTab = 'all'"
        :class="currentTab === 'all' ? 'border-b-2 border-gray-400 text-white' : 'border-b-2 border-transparent text-gray-400 hover:text-gray-200 hover:border-gray-500'"
        class="">
        Todos
      </button>

      <button class="tab-btn" @click="currentTab = 'waiting'"
        :class="currentTab === 'waiting' ? 'border-b-2 border-gray-400 text-white' : 'border-b-2 border-transparent text-gray-400 hover:text-gray-200 hover:border-gray-500'"
        class="">
        Aguardando atendimento
      </button>

      <button class="tab-btn" @click="currentTab = 'in_progress'"
        :class="currentTab === 'in_progress' ? 'border-b-2 border-gray-400 text-white' : 'border-b-2 border-transparent text-gray-400 hover:text-gray-200 hover:border-gray-500'"
        class="">
        Em atendimento
      </button>

      <button class="tab-btn" @click="currentTab = 'feedback'"
        :class="currentTab === 'feedback' ? 'border-b-2 border-gray-400 text-white' : 'border-b-2 border-transparent text-gray-400 hover:text-gray-200 hover:border-gray-500'"
        class="">
        Feedback do solicitante
      </button>

      <button class="tab-btn" @click="currentTab = 'awaiting_confirmation'"
        :class="currentTab === 'awaiting_confirmation' ? 'border-b-2 border-gray-400 text-white' : 'border-b-2 border-transparent text-gray-400 hover:text-gray-200 hover:border-gray-500'"
        class="">
        Enviado para encerramento
      </button>

      <button class="tab-btn" @click="currentTab = 'done'"
        :class="currentTab === 'done' ? 'border-b-2 border-gray-400 text-white' : 'border-b-2 border-transparent text-gray-400 hover:text-gray-200 hover:border-gray-500'"
        class="">
        Concluído
      </button>
    </div>
  </div>


  <!-- Animação loading tickets -->
  <div x-show="loadingTickets" x-cloak class="flex flex-col items-center gap-3 py-12 text-gray-400">

    <div class="w-10 h-10 border-3 border-gray-700 border-t-blue-500 rounded-full animate-spin"></div>

    <span class="text-sm">Carregando tickets...</span>

  </div>

  <!-- Lista de tickets -->
  <div class="overflow-auto overflow-x-hidden x-transition.opacity.duration.200mss" x-show="!loadingTickets">

    <template x-for="ticket in filteredTickets" :key="ticket.id">

      <div @click="viewTicket(ticket)" class="relative pl-10 pr-5 py-5 m-2 rounded-2xl 
       bg-gray-800/30 backdrop-blur-xl backdrop-saturate-150 
       border border-white/10 shadow-[0_8px_32px_0_rgba(0,0,0,0.3)]
       text-gray-200 transition-all duration-300 ease-out 
       hover:bg-gray-800/40 hover:scale-[1.01] cursor-pointer overflow-hidden">

        <!-- Linha lateral -->
        <div class="absolute left-5 top-0 bottom-0 w-px bg-gray-700"></div>

        <!-- Bolinha com cor por status -->
        <div class="absolute left-[13px] top-7 w-4 h-4 rounded-full border-2 border-gray-900" :class="{
           'bg-red-500': ticket.progress === 'waiting',
           'bg-blue-500': ticket.progress === 'in_progress',
           'bg-amber-500': ticket.progress === 'feedback',
           'bg-green-500': ticket.progress === 'done',
           'bg-slate-400': ticket.progress === 'awaiting_confirmation'
         }">
        </div>

        <div class="flex justify-between">

          <!-- ESQUERDA -->
          <div class="w-3/4">

            <!-- Linha superior -->
            <p class="text-xs text-gray-400">
              <span x-text="ticket.id"></span>
              •
              <span x-text="ticket.hotel.name"></span>
              -
              <span x-text="ticket.hotel.code"></span>
            </p>

            <!-- Título -->
            <h2 class="mt-1 text-white font-bold text-sm" x-text="ticket.title">
            </h2>

            <!-- Descrição -->
            <p class="mt-2 text-xs text-gray-300 leading-relaxed" x-text="ticket.description.length > 220
                   ? ticket.description.substring(0,220) + '...'
                   : ticket.description">
            </p>

          </div>

          <!-- DIREITA -->
          <div class="text-right text-xs space-y-1 flex flex-col justify-center">

            <!-- Status traduzido -->
            <span class="font-semibold" :class="{
                'text-red-500': ticket.progress === 'waiting',
                'text-blue-500': ticket.progress === 'in_progress',
                'text-amber-500': ticket.progress === 'feedback',
                'text-green-500': ticket.progress === 'done',
                'text-slate-400': ticket.progress === 'awaiting_confirmation'
              }" x-text="{
                waiting: 'Aguardando atendimento',
                in_progress: 'Em atendimento',
                feedback: 'Feedback do solicitante',
                awaiting_confirmation: 'Enviado para encerramento',
                done: 'Concluído'
              }[ticket.progress]">
            </span>

            <!-- Criador -->
            <p class="italic text-gray-400" x-text="'Aberto por ' + ticket.creator.name">
            </p>

            <!-- Data -->
            <p class="text-gray-500" x-text="dayjs(ticket.created_at).format('DD/MM/YYYY HH:mm')">
            </p>

          </div>

        </div>

      </div>

    </template>


    <!-- Mensagem quando não há tickets -->
    <p x-show="ticketList.length === 0" class="text-gray-400">Nenhum chamado encontrado</p>

  </div>

</div>
