<div
  class="flex flex-col flex-1 min-h-0 gap-5 p-4 text-gray-200">

  <!-- HEADER -->
  <div class="shrink-0">
    <h1 class="font-bold text-gray-200 border-b border-gray-400 pb-1">
      Gerenciar Usuários
    </h1>
  </div>

  <!-- FILTERS -->
  <div
    class="p-5 shrink-0
           bg-gray-900/40 backdrop-blur-xl backdrop-saturate-150
           border border-white/10 rounded-2xl shadow-xl">

    <div class="flex flex-wrap items-end gap-4">

      <!-- SEARCH -->
      <div class="flex-[2] min-w-[280px]">

        <label class="block text-xs mb-1">
          Buscar usuário
        </label>

        <input
          type="text"
          x-model="filters.search"
          placeholder="Nome do usuário..."
          class="w-full p-3 rounded-xl
                 bg-gray-800/50 border border-white/10
                 focus:ring-1 focus:ring-blue-500
                 focus:outline-none text-sm
                 placeholder-gray-400">
      </div>

      <!-- HOTEL -->
      <template x-if="['admin','agent'].includes($store.app.role)">

        <div class="flex-1 min-w-[220px]">

          <label class="block text-xs mb-1">
            Hotel
          </label>

          <select
            x-model="filters.hotelId"
            class="w-full p-3 rounded-xl
                   bg-gray-800/90 border border-white/10
                   focus:ring-1 focus:ring-blue-500
                   focus:outline-none text-sm">

            <option value="">
              Todos hotéis
            </option>

            <template
              x-for="hotel in $store.app.hotels"
              :key="hotel.id">

              <option
                :value="hotel.id"
                x-text="hotel.code + ' - ' + hotel.name">
              </option>

            </template>

          </select>
        </div>

      </template>

      <!-- ROLE -->
      <template x-if="['admin','agent'].includes($store.app.role)">

        <div class="flex-1 min-w-[220px]">

          <label class="block text-xs mb-1">
            Função
          </label>

          <select
            x-model="filters.role"
            class="w-full p-3 rounded-xl
                   bg-gray-800/90 border border-white/10
                   focus:ring-1 focus:ring-blue-500
                   focus:outline-none text-sm">

            <option value="">
              Todas
            </option>

            <option value="admin">
              Admin
            </option>

            <option value="agent">
              Suporte
            </option>

            <option value="client_manager">
              Gerente
            </option>

            <option value="client_receptionist">
              Recepcionista
            </option>

          </select>
        </div>

      </template>

      <!-- BUTTON -->
      <div class="w-[220px]">

        <button
          @click="fetchUsers()"
          class="w-full
                 bg-blue-600/90 hover:bg-blue-700
                 transition-colors
                 py-3 rounded-xl
                 text-sm font-semibold
                 shadow-md">

          Buscar usuários

        </button>

      </div>

    </div>

  </div>

  <!-- TABLE -->
  <div
    class="flex flex-col flex-1 min-h-0
           bg-gray-900/40 backdrop-blur-xl backdrop-saturate-150
           border border-white/10 rounded-2xl shadow-xl
           overflow-hidden">

    <!-- HEADER -->
    <div
      class="flex items-center px-5 py-4
             border-b border-white/10
             text-xs uppercase tracking-wide
             text-gray-400 shrink-0">

      <div class="flex-[1.5]">
        Nome
      </div>

      <div class="flex-[2]">
        Email
      </div>

      <div class="flex-1">
        Função
      </div>

      <div class="w-24 text-center">
        Hotéis
      </div>

      <div class="w-20 text-right">
        Abrir
      </div>

    </div>

    <!-- BODY -->
    <div class="flex-1 overflow-y-auto">

      <template
        x-for="user in listedUsers"
        :key="user.id">

        <div
          @click="selectUser(user)"
          class="flex items-center px-5 py-4
                 border-b border-white/5
                 hover:bg-white/5
                 cursor-pointer transition">

          <!-- NAME -->
          <div
            class="flex-[1.5] font-medium text-gray-100 truncate"
            x-text="user.name">
          </div>

          <!-- EMAIL -->
          <div
            class="flex-[2] text-sm text-gray-400 truncate"
            x-text="user.email">
          </div>

          <!-- ROLE -->
          <div class="flex-1">

            <span
              class="text-xs rounded-full px-3 py-1 font-semibold"
              :class="roleMeta(user.role).class"
              x-text="roleMeta(user.role).label">
            </span>

          </div>

          <!-- HOTELS -->
          <div
            class="w-24 text-center text-sm text-gray-400"
            x-text="user.hotels?.length || 0">
          </div>

          <!-- ACTION -->
          <div class="w-20 text-right text-gray-500">
            →
          </div>

        </div>

      </template>

      <!-- EMPTY -->
      <template x-if="listedUsers.length === 0">

        <div
          class="flex items-center justify-center
                 h-full text-gray-500 text-sm">

          Nenhum usuário encontrado

        </div>

      </template>

    </div>

  </div>

  <!-- MODAL -->
  <div
    x-show="showUserModal"
    x-transition.opacity
    class="fixed inset-0 z-50
           bg-black/40 backdrop-blur-sm
           flex items-center justify-center">

    <div
      @click.outside="showUserModal = false"
      class="bg-gray-800/40 backdrop-blur-2xl
             border border-white/10
             rounded-[32px]
             shadow-2xl
             w-[94vw]
             max-w-7xl
             h-[82vh]
             p-6
             flex flex-col
             backdrop-saturate-150">

      <!-- HEADER -->
      <div class="flex items-center justify-between mb-5 shrink-0">

        <div>

          <h2 class="font-bold text-xl">
            Editar usuário
          </h2>

          <p class="text-xs text-gray-400">
            Atualize informações do usuário
          </p>

        </div>

        <div class="flex gap-3">

          <template x-if="!editor.enabled">
            <button
              @click="editor.enabled = !editor.enabled"
              class="bg-blue-600 hover:bg-blue-700
                    px-4 py-2 rounded-xl
                    text-sm font-semibold">

              <span>
                <p>Editar usuário</p>
              </span>
            </button>
          </template>


        </div>

      </div>

      <template x-if="editor.user">

        <div class="flex flex-col flex-1 min-h-0">

          <!-- FORM -->
          <div class="flex flex-col flex-1 min-h-0">

            <!-- ROW 1 -->
            <div class="flex gap-4 mb-4 shrink-0">

              <!-- NOME -->
              <div class="flex flex-col flex-1 min-w-0">

                <label class="block text-xs mb-1">
                  Nome
                </label>

                <input
                  type="text"
                  x-model="editor.user.name"
                  :disabled="!editor.enabled"
                  class="w-full p-3 rounded-xl
                         bg-gray-800/50 border border-white/10
                         disabled:opacity-50
                         focus:outline-none
                         focus:ring-1 focus:ring-blue-500">
              </div>

              <!-- EMAIL -->
              <div class="flex flex-col flex-1 min-w-0">

                <label class="block text-xs mb-1">
                  Email
                </label>

                <input
                  type="email"
                  x-model="editor.user.email"
                  :disabled="!editor.enabled"
                  class="w-full p-3 rounded-xl
                         bg-gray-800/50 border border-white/10
                         disabled:opacity-50
                         focus:outline-none
                         focus:ring-1 focus:ring-blue-500">
              </div>

            </div>

            <!-- ROW 2 -->
            <div class="flex gap-4 mb-5 shrink-0">

              <!-- ROLE -->
              <div class="flex flex-col flex-1 min-w-0">

                <label class="block text-xs mb-1">
                  Função
                </label>

                <select
                  x-model="editor.user.role"
                  :disabled="!editor.enabled"
                  class="w-full p-3 rounded-xl
                         bg-gray-800/50 border border-white/10
                         disabled:opacity-50">

                  <option value="admin">
                    Admin
                  </option>

                  <option value="agent">
                    Suporte
                  </option>

                  <option value="client_manager">
                    Gerente
                  </option>

                  <option value="client_receptionist">
                    Recepcionista
                  </option>

                </select>
              </div>

              <!-- PASSWORD -->
              <div class="flex flex-col flex-1 min-w-0">

                <label class="block text-xs mb-1">
                  Nova senha
                </label>

                <input
                  type="password"
                  x-model="editor.user.password"
                  :disabled="!editor.enabled"
                  placeholder="Deixe vazio para manter"
                  class="w-full p-3 rounded-xl
                         bg-gray-800/50 border border-white/10
                         disabled:opacity-50
                         focus:outline-none
                         focus:ring-1 focus:ring-blue-500">
              </div>

            </div>

            <!-- HOTELS -->
            <div
              class="flex flex-col flex-1 min-h-0"
              x-show="!(
                editor.user.role === 'admin' ||
                editor.user.role === 'agent'
              )">

              <!-- TITLE -->
              <div class="mb-3 shrink-0">

                <label class="block text-xs mb-2">
                  Hotéis vinculados
                </label>

                <input
                  type="text"
                  x-model="hotelSearch"
                  :disabled="!editor.enabled"
                  placeholder="Buscar hotel por nome ou código..."
                  class="w-full p-3 rounded-xl
                         bg-gray-800/40 border border-white/10
                         focus:ring-1 focus:ring-blue-500
                         focus:outline-none
                         disabled:opacity-50
                         placeholder-gray-400 text-sm">
              </div>

              <!-- LISTS -->
              <div class="flex gap-5 flex-1 min-h-0">

                <!-- DISPONÍVEIS -->
                <div
                  class="flex flex-col flex-1 min-h-0
                         rounded-3xl overflow-hidden
                         border border-white/10
                         bg-gray-900/40 backdrop-blur-md">

                  <!-- HEADER -->
                  <div
                    class="flex items-center justify-between
                           px-4 py-3 shrink-0
                           border-b border-white/10">

                    <span class="text-xs font-semibold text-gray-300">
                      Disponíveis
                    </span>

                    <span
                      class="text-[11px] text-gray-500"
                      x-text="filteredHotels.length">
                    </span>

                  </div>

                  <!-- BODY -->
                  <div
                    class="flex-1 overflow-y-auto
                           p-2 space-y-2">

                    <template
                      x-for="hotel in filteredHotels"
                      :key="hotel.id">

                      <div
                        class="flex items-center justify-between
                               px-3 py-3 rounded-2xl
                               bg-gray-900/30
                               border border-transparent
                               hover:border-white/10
                               hover:bg-gray-700/20
                               transition">

                        <div class="min-w-0">

                          <div
                            class="text-xs font-medium truncate"
                            x-text="hotel.code">
                          </div>

                          <div
                            class="text-[11px] text-gray-400 truncate"
                            x-text="hotel.name">
                          </div>

                        </div>

                        <button
                          type="button"
                          :disabled="!editor.enabled"
                          @click="addHotel(hotel)"
                          class="ml-3 shrink-0
                                 w-9 h-9 rounded-xl
                                 bg-emerald-500/10
                                 text-emerald-300
                                 hover:bg-emerald-500/20
                                 disabled:opacity-40
                                 transition">

                          +

                        </button>

                      </div>

                    </template>

                  </div>

                </div>

                <!-- VINCULADOS -->
                <div
                  class="flex flex-col flex-1 min-h-0
                         rounded-3xl overflow-hidden
                         border border-white/10
                         bg-gray-900/40 backdrop-blur-md">

                  <!-- HEADER -->
                  <div
                    class="flex items-center justify-between
                           px-4 py-3 shrink-0
                           border-b border-white/10">

                    <span class="text-xs font-semibold text-gray-300">
                      Vinculados
                    </span>

                    <span
                      class="text-[11px] text-gray-500"
                      x-text="editor.user.hotels.length">
                    </span>

                  </div>

                  <!-- BODY -->
                  <div
                    class="flex-1 overflow-y-auto
                           p-2 space-y-2">

                    <template
                      x-for="hotel in editor.user.hotels"
                      :key="hotel.id">

                      <div
                        class="flex items-center justify-between
                               px-3 py-3 rounded-2xl
                               bg-gray-900/30">

                        <div class="min-w-0">

                          <div
                            class="text-xs font-medium truncate"
                            x-text="hotel.code">
                          </div>

                          <div
                            class="text-[11px] text-gray-400 truncate"
                            x-text="hotel.name">
                          </div>

                        </div>

                        <button
                          type="button"
                          :disabled="!editor.enabled"
                          @click="removeHotel(hotel)"
                          class="ml-3 shrink-0
                                 w-9 h-9 rounded-xl
                                 bg-red-500/10
                                 text-red-300
                                 hover:bg-red-500/20
                                 disabled:opacity-40
                                 transition">

                          −

                        </button>

                      </div>

                    </template>

                    <!-- EMPTY -->
                    <div
                      x-show="editor.user.hotels.length === 0"
                      class="flex items-center justify-center
                             h-full text-xs text-gray-500">

                      Nenhum hotel vinculado

                    </div>

                  </div>

                </div>

              </div>

            </div>

            <!-- teams -->
            <!-- TEAMS -->
<div
  class="flex flex-col shrink-0"
  x-show="
  editor.user.role == 'agent' ||
  editor.user.role == 'admin'
  ">

  <!-- HEADER -->
  <div class="mb-3">

    <label class="block text-xs mb-2">
      Times vinculados
    </label>

    <p class="text-[11px] text-gray-500">
      Selecione os times do usuário
    </p>

  </div>

  <!-- LIST -->
  <div
    class="grid grid-cols-2 lg:grid-cols-3 gap-3">

    <template
      x-for="team in teams"
      :key="team.id">

      <button
        type="button"
        :disabled="!editor.enabled"
        @click="addTeam(team)"
        class="group flex items-center justify-between
               px-4 py-4 rounded-2xl
               border transition-all duration-200
               disabled:opacity-50"

        :class="hasTeam(team.id)
          ? 'bg-emerald-500/15 border-emerald-500/40'
          : 'bg-gray-900/30 border-white/10 hover:bg-white/5 hover:border-white/20'">

        <div class="min-w-0 text-left">

          <div
            class="text-sm font-medium truncate"
            x-text="team.name">
          </div>

        </div>

        <!-- TOGGLE -->
        <div
          class="ml-4 shrink-0 w-12 h-7 rounded-full
                 relative transition-all"

          :class="hasTeam(team.id)
            ? 'bg-emerald-500/70'
            : 'bg-gray-700/70'">

          <div
            class="absolute top-1 left-1
                   w-5 h-5 rounded-full
                   bg-white transition-all"

            :class="hasTeam(team.id)
              ? 'translate-x-5'
              : ''">
          </div>

        </div>

      </button>

    </template>

  </div>

</div>

            <!-- FOOTER -->
            <div
              class="flex justify-end gap-3
                     pt-5 mt-5 shrink-0">

              <button
                @click="showUserModal = false"
                class="px-5 py-3 rounded-xl
                       bg-gray-700 hover:bg-gray-600
                       transition">

                Cancelar

              </button>

              <button
                x-show="editor.enabled"
                @click="saveUser()"
                class="px-6 py-3 rounded-xl
                       bg-green-600 hover:bg-green-700
                       font-semibold transition">

                Salvar alterações

              </button>

            </div>

          </div>

        </div>

      </template>

      <!-- EMPTY -->
      <template x-if="!editor.user">

        <div class="flex flex-1 items-center justify-center">

          <div class="text-center">

            <div class="text-6xl mb-4">
              👤
            </div>

            <div class="font-semibold">
              Selecione um usuário
            </div>

          </div>

        </div>

      </template>

    </div>

  </div>

</div>
