<div
  class="flex flex-1 gap-5 p-4 overflow-hidden text-gray-200"">

  <!-- LEFT -->
  <div class="flex flex-col w-[420px] shrink-0">

    <!-- HEADER -->
    <div class="p-1 rounded-t-lg">
      <h1 class="font-bold text-gray-200 border-b border-gray-400">
        Gerenciar Usuários
      </h1>
    </div>

    <!-- FILTER CARD -->
    <div
      class="mt-5 p-5
             bg-gray-900/40 backdrop-blur-xl backdrop-saturate-150
             border border-white/10 rounded-2xl shadow-xl">

      <div class="flex flex-col gap-4">

        <!-- SEARCH -->
        <div>
          <label class="block text-xs mb-1">
            Buscar usuário
          </label>

          <input
            type="text"
            x-model="filters.search"
            placeholder="Nome do usuário..."
            class="w-full p-2 rounded-md
                   bg-gray-800/50 border border-white/10
                   focus:ring-1 focus:ring-blue-500
                   focus:outline-none text-sm
                   placeholder-gray-400">
        </div>

        <!-- HOTEL -->


        <template x-if="['admin', 'agent'].includes($store.app.role)">
          <div>
            <label class="block text-xs mb-1">
              Hotel
            </label>

            <select 
              x-model="filters.hotelId"
              :disabled="$store.app.role === 'client_manager' || $store.app.role === 'client_receptionist' "
              class="w-full p-2 rounded-md
                    bg-gray-800/90 border border-white/10
                    focus:ring-1 focus:ring-blue-500
                    focus:outline-none text-sm
                    disabled:opacity-50">

              <option  value="">
                Todos hotéis
              </option>

              <template
                x-for="hotel in $store.app.hotels"
                :key="hotel.id">

                <option
                  :value="hotel.id"
                  x-text="hotel.code + ' - ' + hotel.name">
                </option>

              </template>

            </select>
          </div>
        </template>

        <!-- ROLE -->
        <template x-if="['admin', 'agent'].includes($store.app.role)">
          <div>
          <label class="block text-xs mb-1">
            Função
          </label>

          <select
            x-model="filters.role"
            :disabled="$store.app.role === 'client_manager' || $store.app.role === 'client_receptionist' "
            class="w-full p-2 rounded-md
                   bg-gray-800/90 border border-white/10
                   focus:ring-1 focus:ring-blue-500
                   focus:outline-none text-sm
                   disabled:opacity-50">

            <option value="">
              Todas
            </option>

            <option value="admin">
              Admin
            </option>

            <option value="agent">
              Suporte
            </option>

            <option value="client_manager">
              Gerente
            </option>

            <option value="client_receptionist">
              Recepcionista
            </option>

          </select>
        </div>
        </template>

        <!-- BTN -->
        <button
          @click="fetchUsers()"
          class="w-full
                 bg-blue-600/90 hover:bg-blue-700
                 transition-colors
                 py-2 rounded-lg
                 text-sm font-semibold
                 shadow-md">

          Buscar usuários

        </button>
      </div>
    </div>

    <!-- LIST -->
    <div
      class="flex-1 mt-5 p-4
             bg-gray-900/40 backdrop-blur-xl backdrop-saturate-150
             border border-white/10 rounded-2xl shadow-xl
             overflow-hidden">

      <div class="flex justify-between mb-4">

        <span class="font-semibold">
          Usuários
        </span>

        <span
          class="text-xs text-gray-400"
          x-text="listedUsers.length + ' encontrados'">
        </span>

      </div>

      <div class="overflow-y-auto h-full pr-1 flex flex-col gap-3">

        <template
          x-for="user in listedUsers"
          :key="user.id">

          <div
            class="rounded-2xl border border-white/10
                   bg-gray-800/50 p-4">

            <div class="flex justify-between items-start">

              <div>

                <div
                  class="font-semibold"
                  x-text="user.name">
                </div>

                <div
                  class="text-xs text-gray-400"
                  x-text="user.email">
                </div>

                <!-- BADGE -->
                <div class="mt-3">

                  <span
                    class="text-xs rounded-full px-3 py-1 font-semibold"
                    :class="roleMeta(user.role).class"
                    x-text="roleMeta(user.role).label">
                  </span>

                </div>
              </div>

              <button
                @click="selectUser(user)"
                class="w-10 h-10 rounded-xl
                       bg-gray-700 hover:bg-blue-600
                       transition">

                ✏️

              </button>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="flex flex-1 flex-col">

    <div
      class="mt-8 p-5
             bg-gray-900/40 backdrop-blur-xl backdrop-saturate-150
             border border-white/10 rounded-2xl shadow-xl
             h-full overflow-y-auto">

      <template x-if="editor.user">

        <div>

          <!-- HEADER -->
          <div
            class="flex items-center justify-between mb-5">

            <div>
              <h2 class="font-bold text-lg">
                Editar usuário
              </h2>

              <p class="text-xs text-gray-400">
                Atualize informações do usuário
              </p>
            </div>

            <button
              @click="editor.enabled = !editor.enabled"
              class="bg-blue-600 hover:bg-blue-700
                     px-4 py-2 rounded-lg
                     text-sm font-semibold">

              ✏️ Editar usuário

            </button>
          </div>

          <!-- NAME + EMAIL -->
          <div class="flex gap-4">

            <div class="flex-1 mb-4">
              <label class="block text-xs mb-1">
                Nome
              </label>

              <input
                x-model="editor.user.name"
                :disabled="!editor.enabled"
                class="w-full p-2 rounded-md
                       bg-gray-800/50 border border-white/10
                       disabled:opacity-50">
            </div>

            <div class="flex-1 mb-4">
              <label class="block text-xs mb-1">
                Email
              </label>

              <input
                x-model="editor.user.email"
                :disabled="!editor.enabled"
                class="w-full p-2 rounded-md
                       bg-gray-800/50 border border-white/10
                       disabled:opacity-50">
            </div>
          </div>

          <!-- ROLE -->
          <div class="mb-4">
            <label class="block text-xs mb-1">
              Função
            </label>

            <select
              x-model="editor.user.role"
              :disabled="!editor.enabled"
              class="w-full p-2 rounded-md
                     bg-gray-800/90 border border-white/10
                     disabled:opacity-50">

              <option value="admin">
                Admin
              </option>

              <option value="agent">
                Suporte
              </option>

              <option value="client_manager">
                Gerente
              </option>

              <option value="client_receptionist">
                Recepcionista
              </option>

            </select>
          </div>

          <!-- PASSWORD -->
          <div class="mb-4">
            <label class="block text-xs mb-1">
              Nova senha
            </label>

            <input
              type="password"
              x-model="editor.password"
              :disabled="!editor.enabled"
              placeholder="Opcional"
              class="w-full p-2 rounded-md
                     bg-gray-800/50 border border-white/10
                     disabled:opacity-50">
          </div>

          <!-- HOTELS -->
          <div class="mb-4">

            <label class="block text-xs mb-2">
              Hotéis
            </label>

            <div class="flex gap-4">

              <!-- AVAILABLE -->
              <div
                class="flex-1 p-4 rounded-2xl
                       bg-gray-800/50 border border-white/10">

                <input
                  x-model="hotelSearch"
                  placeholder="Buscar hotel..."
                  class="w-full p-2 mb-3 rounded-md
                         bg-gray-900 border border-white/10">

                <div
                  class="max-h-64 overflow-y-auto flex flex-col gap-2">

                  <template
                    x-for="hotel in filteredHotels"
                    :key="hotel.id">

                    <button
                      @click="addHotel(hotel)"
                      :disabled="!editor.enabled"
                      class="text-left p-2 rounded-lg
                             bg-gray-700 hover:bg-gray-600">

                      <span
                        x-text="hotel.code + ' - ' + hotel.name">
                      </span>

                    </button>

                  </template>
                </div>
              </div>

              <!-- SELECTED -->
              <div
                class="flex-1 p-4 rounded-2xl
                       bg-gray-800/50 border border-white/10">

                <div
                  class="max-h-80 overflow-y-auto flex flex-col gap-2">

                  <template
                    x-for="hotel in editor.user.hotels"
                    :key="hotel.id">

                    <div
                      class="flex items-center justify-between
                             p-2 rounded-lg bg-gray-700">

                      <span
                        class="text-sm"
                        x-text="hotel.name">
                      </span>

                      <button
                        @click="removeHotel(hotel)"
                        :disabled="!editor.enabled">

                        ❌

                      </button>
                    </div>

                  </template>
                </div>
              </div>

            </div>
          </div>

          <!-- SAVE -->
          <button
            x-show="editor.enabled"
            @click="saveUser()"
            class="w-full
                   bg-emerald-600 hover:bg-emerald-700
                   transition-colors
                   py-2 rounded-lg
                   text-sm font-semibold">

            Salvar alterações

          </button>

        </div>
      </template>

      <!-- EMPTY -->
      <template x-if="!editor.user">

        <div
          class="flex h-full items-center justify-center">

          <div class="text-center">

            <div class="text-6xl mb-4">
              👤
            </div>

            <div class="font-semibold">
              Selecione um usuário
            </div>

          </div>
        </div>
      </template>
    </div>
  </div>
</div>
