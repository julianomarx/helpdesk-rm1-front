<div
  x-data="hotelsPage()"
  x-init="init()"
  class="flex flex-col flex-1 min-h-0 gap-4 p-3 text-gray-200">

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- LIST VIEW                                                        -->
  <!-- ════════════════════════════════════════════════════════════════ -->
  <template x-if="!detailHotel">
    <div class="flex flex-col flex-1 min-h-0 gap-4">

      <!-- HEADER -->
      <div class="shrink-0 flex items-center justify-between">
        <div>
          <h1 class="text-xl font-bold text-gray-100">Gerenciar Hotéis</h1>
          <p class="text-xs text-gray-500 mt-0.5">Clique em um hotel para ver detalhes e estatísticas</p>
        </div>
        <button
          @click="openCreateModal()"
          class="flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold
                 bg-blue-600 hover:bg-blue-700 transition-colors shadow-md">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
          Novo Hotel
        </button>
      </div>

      <!-- SEARCH -->
      <div class="shrink-0 bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl px-4 py-3">
        <div class="flex items-center gap-3">
          <svg class="w-4 h-4 text-gray-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/></svg>
          <input
            type="text"
            x-model="hotelSearch"
            placeholder="Buscar por nome ou código..."
            class="flex-1 bg-transparent focus:outline-none text-sm placeholder-gray-500">
          <span class="text-xs text-gray-600" x-text="filteredHotels.length + ' hotel(s)'"></span>
        </div>
      </div>

      <!-- TABLE -->
      <div class="flex flex-col flex-1 min-h-0 bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl overflow-hidden">

        <!-- TABLE HEADER -->
        <div class="flex items-center px-5 py-3 border-b border-white/10 text-xs uppercase tracking-wide text-gray-500 shrink-0">
          <div class="w-28">Código</div>
          <div class="flex-1">Nome</div>
          <div class="w-24 text-right">Detalhe</div>
        </div>

        <!-- TABLE BODY -->
        <div class="flex-1 overflow-y-auto custom-scroll">

          <!-- SKELETON -->
          <template x-if="loadingHotels">
            <div class="divide-y divide-white/5 animate-pulse">
              <template x-for="i in 8" :key="i">
                <div class="flex items-center px-5 py-4">
                  <div class="w-28"><div class="h-4 w-14 rounded bg-gray-700/60"></div></div>
                  <div class="flex-1"><div class="h-4 w-52 rounded bg-gray-700/40"></div></div>
                  <div class="w-24 flex justify-end"><div class="h-4 w-4 rounded bg-gray-700/40"></div></div>
                </div>
              </template>
            </div>
          </template>

          <!-- ROWS -->
          <template x-if="!loadingHotels">
            <div>
              <template x-for="hotel in filteredHotels" :key="hotel.id">
                <div
                  @click="openDetail(hotel)"
                  class="flex items-center px-5 py-4 border-b border-white/5 hover:bg-white/5 cursor-pointer transition-colors group">
                  <div class="w-28">
                    <span class="text-xs font-mono font-semibold px-2 py-1 rounded-lg bg-blue-500/10 text-blue-300 border border-blue-500/20"
                      x-text="hotel.code"></span>
                  </div>
                  <div class="flex-1 font-medium text-gray-100 truncate" x-text="hotel.name"></div>
                  <div class="w-24 flex justify-end">
                    <svg class="w-4 h-4 text-gray-600 group-hover:text-gray-300 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
                  </div>
                </div>
              </template>

              <template x-if="filteredHotels.length === 0 && !loadingHotels">
                <div class="flex flex-col items-center justify-center h-48 text-gray-600">
                  <svg class="w-10 h-10 opacity-30 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                  <p class="text-sm">Nenhum hotel encontrado</p>
                </div>
              </template>
            </div>
          </template>

        </div>
      </div>

    </div>
  </template>


  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- DETAIL VIEW                                                      -->
  <!-- ════════════════════════════════════════════════════════════════ -->
  <template x-if="detailHotel">
    <div class="flex flex-col flex-1 min-h-0 gap-4">

      <!-- HEADER -->
      <div class="shrink-0 flex items-center gap-4">
        <button
          @click="closeDetail()"
          class="flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs
                 bg-white/5 border border-white/10 hover:bg-white/10 transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
          Voltar
        </button>
        <div class="flex items-center gap-3">
          <span class="text-xs font-mono font-semibold px-2.5 py-1 rounded-lg bg-blue-500/10 text-blue-300 border border-blue-500/20"
            x-text="detailHotel.code"></span>
          <h1 class="text-xl font-bold text-gray-100" x-text="detailHotel.name"></h1>
        </div>
        <button
          @click="printReport()"
          class="ml-auto flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs
                 bg-white/5 border border-white/10 hover:bg-white/10 transition-colors print:hidden">
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6v-8z"/></svg>
          Imprimir relatório
        </button>
      </div>

      <!-- TABS -->
      <div class="flex gap-1.5 p-1.5 rounded-2xl bg-gray-900/40 border border-white/10 w-fit shrink-0 print:hidden">
        <button @click="switchDetailTab('info')"
          class="px-4 py-2 rounded-xl text-sm transition-all duration-200"
          :class="detailTab === 'info' ? 'bg-blue-600 text-white shadow-lg' : 'text-gray-400 hover:text-white hover:bg-white/5'">
          Informações
        </button>
        <button @click="switchDetailTab('dashboard')"
          class="px-4 py-2 rounded-xl text-sm transition-all duration-200"
          :class="detailTab === 'dashboard' ? 'bg-blue-600 text-white shadow-lg' : 'text-gray-400 hover:text-white hover:bg-white/5'">
          Dashboard
        </button>
      </div>

      <!-- SCROLL AREA -->
      <div class="flex-1 overflow-y-auto custom-scroll pr-1 space-y-4">


        <!-- ── TAB: INFORMAÇÕES ─────────────────────────────────────────── -->
        <div x-show="detailTab === 'info'" class="space-y-4">

          <div class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl p-6 max-w-lg">

            <div class="flex items-center justify-between mb-6">
              <h2 class="text-sm font-semibold text-gray-300">Dados do Hotel</h2>
              <button x-show="!editEnabled"
                @click="editEnabled = true"
                class="px-3 py-1.5 rounded-xl text-xs bg-blue-600 hover:bg-blue-700 transition font-semibold">
                Editar
              </button>
            </div>

            <div class="space-y-4">
              <div>
                <label class="block text-xs text-gray-500 mb-1.5">Código</label>
                <input type="text" x-model="editForm.code" :disabled="!editEnabled" maxlength="10"
                  placeholder="Ex: RM01"
                  class="w-full p-3 rounded-xl bg-gray-800/50 border border-white/10
                         disabled:opacity-50 focus:outline-none focus:ring-1 focus:ring-blue-500 text-sm">
              </div>
              <div>
                <label class="block text-xs text-gray-500 mb-1.5">Nome</label>
                <input type="text" x-model="editForm.name" :disabled="!editEnabled"
                  placeholder="Nome completo do hotel"
                  class="w-full p-3 rounded-xl bg-gray-800/50 border border-white/10
                         disabled:opacity-50 focus:outline-none focus:ring-1 focus:ring-blue-500 text-sm">
              </div>
            </div>

            <template x-if="editEnabled">
              <div class="flex gap-3 mt-6">
                <button @click="editEnabled = false; editForm = { code: detailHotel.code, name: detailHotel.name }"
                  class="px-4 py-2 rounded-xl text-sm bg-gray-700/60 hover:bg-gray-700 transition">
                  Cancelar
                </button>
                <button @click="saveHotel()"
                  class="px-5 py-2 rounded-xl text-sm bg-emerald-600 hover:bg-emerald-700 font-semibold transition">
                  Salvar alterações
                </button>
              </div>
            </template>

          </div>

          <!-- DANGER ZONE -->
          <div class="bg-gray-900/40 backdrop-blur-xl border border-red-500/20 rounded-2xl p-6 max-w-lg">
            <h2 class="text-sm font-semibold text-red-400 mb-1">Zona de perigo</h2>
            <p class="text-xs text-gray-500 mb-4">Esta ação é irreversível. Todos os usuários vinculados perderão o acesso a este hotel.</p>

            <template x-if="!deleteConfirm">
              <button @click="deleteConfirm = true"
                class="px-4 py-2 rounded-xl text-sm border border-red-500/30 text-red-400
                       bg-red-900/10 hover:bg-red-900/30 transition">
                Excluir hotel
              </button>
            </template>

            <template x-if="deleteConfirm">
              <div class="space-y-3">
                <p class="text-sm text-red-300 font-medium">Tem certeza? Esta ação não pode ser desfeita.</p>
                <div class="flex gap-3">
                  <button @click="deleteConfirm = false"
                    class="px-4 py-2 rounded-xl text-sm bg-gray-700 hover:bg-gray-600 transition">
                    Cancelar
                  </button>
                  <button @click="deleteHotel()"
                    class="px-4 py-2 rounded-xl text-sm bg-red-700 hover:bg-red-800 font-semibold transition">
                    Excluir definitivamente
                  </button>
                </div>
              </div>
            </template>
          </div>

        </div>


        <!-- ── TAB: DASHBOARD ──────────────────────────────────────────── -->
        <div x-show="detailTab === 'dashboard'" class="space-y-4">

          <!-- SKELETON -->
          <template x-if="statsLoading">
            <div class="space-y-4 animate-pulse">
              <div class="grid grid-cols-3 gap-3">
                <template x-for="i in 3" :key="i">
                  <div class="flex flex-col gap-2 p-4 rounded-2xl bg-gray-900/40 border border-white/10">
                    <div class="h-3 w-20 rounded bg-gray-700/50"></div>
                    <div class="h-8 w-12 rounded bg-gray-700/60"></div>
                  </div>
                </template>
              </div>
              <div class="bg-gray-900/40 border border-white/10 rounded-2xl overflow-hidden">
                <div class="px-4 py-3 border-b border-white/10">
                  <div class="h-4 w-40 rounded bg-gray-700/50"></div>
                </div>
                <div class="p-4 space-y-3">
                  <template x-for="j in 5" :key="j">
                    <div class="flex gap-3">
                      <div class="h-3 w-6 rounded bg-gray-700/50"></div>
                      <div class="h-3 flex-1 rounded bg-gray-700/40"></div>
                      <div class="h-3 w-16 rounded bg-gray-700/30"></div>
                    </div>
                  </template>
                </div>
              </div>
            </div>
          </template>

          <!-- STATS -->
          <template x-if="!statsLoading && stats">
            <div class="space-y-4">

              <!-- COUNTERS -->
              <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <div class="flex flex-col gap-1 p-4 rounded-2xl bg-gray-900/40 border border-white/10">
                  <span class="text-[11px] text-gray-500">Total de chamados</span>
                  <span class="text-3xl font-bold text-gray-300" x-text="stats.total"></span>
                </div>
                <div class="flex flex-col gap-1 p-4 rounded-2xl bg-gray-900/40 border border-blue-500/20">
                  <span class="text-[11px] text-gray-500">Em aberto</span>
                  <span class="text-3xl font-bold text-blue-400" x-text="stats.open"></span>
                </div>
                <div class="flex flex-col gap-1 p-4 rounded-2xl bg-gray-900/40 border border-emerald-500/20">
                  <span class="text-[11px] text-gray-500">Encerrados</span>
                  <span class="text-3xl font-bold text-emerald-400" x-text="stats.closed"></span>
                </div>
                <div class="flex flex-col gap-1 p-4 rounded-2xl bg-gray-900/40 border border-white/10">
                  <span class="text-[11px] text-gray-500">Cancelados</span>
                  <span class="text-3xl font-bold text-gray-500" x-text="stats.cancelled"></span>
                </div>
              </div>

              <!-- PROGRESS BREAKDOWN -->
              <template x-if="stats.open > 0">
                <div class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl overflow-hidden">
                  <div class="flex items-center gap-2 px-4 py-3 border-b border-white/10">
                    <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                    <h3 class="text-sm font-semibold">Chamados abertos por progresso</h3>
                  </div>
                  <div class="p-4 space-y-3">
                    <template x-for="[key, label] in [
                      ['waiting','Aguardando'],
                      ['in_progress','Em atendimento'],
                      ['feedback','Retorno solicitante'],
                      ['awaiting_confirmation','Aguard. confirmação'],
                      ['done','Concluído']
                    ]" :key="key">
                      <template x-if="(stats.by_progress[key] || 0) > 0">
                        <div class="flex items-center gap-3">
                          <span class="text-xs text-gray-400 w-44 shrink-0" x-text="label"></span>
                          <div class="flex-1 h-2 rounded-full bg-white/5 overflow-hidden">
                            <div class="h-full rounded-full bg-blue-500 transition-all"
                              :style="`width:${Math.round(((stats.by_progress[key]||0)/stats.open)*100)}%`"></div>
                          </div>
                          <span class="text-xs font-bold text-gray-300 w-8 text-right shrink-0"
                            x-text="stats.by_progress[key] || 0"></span>
                        </div>
                      </template>
                    </template>
                  </div>
                </div>
              </template>

              <!-- RECENT TICKETS -->
              <div class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl overflow-hidden">
                <div class="flex items-center gap-2 px-4 py-3 border-b border-white/10">
                  <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                  <h3 class="text-sm font-semibold">Chamados recentes</h3>
                  <span class="ml-auto text-xs text-gray-500">últimos 10</span>
                </div>

                <template x-if="!stats.recent.length">
                  <div class="px-4 py-8 text-sm text-gray-600 text-center">Nenhum chamado registrado</div>
                </template>

                <template x-if="stats.recent.length">
                  <div class="overflow-x-auto">
                    <table class="w-full text-xs">
                      <thead>
                        <tr class="border-b border-white/5 text-gray-500">
                          <th class="text-left px-4 py-2">#</th>
                          <th class="text-left px-4 py-2">Título</th>
                          <th class="text-left px-4 py-2">Situação</th>
                          <th class="text-left px-4 py-2">Prioridade</th>
                          <th class="text-left px-4 py-2">Aberto há</th>
                        </tr>
                      </thead>
                      <tbody>
                        <template x-for="t in stats.recent" :key="t.id">
                          <tr class="border-b border-white/5 hover:bg-white/5 transition-colors">
                            <td class="px-4 py-2.5 text-gray-500" x-text="'#' + t.id"></td>
                            <td class="px-4 py-2.5 text-gray-200 max-w-[220px] truncate" x-text="t.title"></td>
                            <td class="px-4 py-2.5">
                              <span class="inline-flex px-2 py-0.5 rounded-full text-[10px] border"
                                :class="statusBadge(t.status)" x-text="statusLabel(t.status)"></span>
                            </td>
                            <td class="px-4 py-2.5">
                              <span class="inline-flex px-2 py-0.5 rounded-full text-[10px] border"
                                :class="priorityBadge(t.priority)" x-text="priorityLabel(t.priority)"></span>
                            </td>
                            <td class="px-4 py-2.5 text-gray-400" x-text="timeAgo(t.created_at)"></td>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>
                </template>
              </div>

            </div>
          </template>

          <!-- EMPTY state when stats not yet loaded and not loading -->
          <template x-if="!statsLoading && !stats">
            <div class="flex flex-col items-center justify-center py-16 text-gray-600">
              <svg class="w-10 h-10 opacity-30 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
              <p class="text-sm">Clique em Dashboard para carregar</p>
            </div>
          </template>

        </div>

      </div>
    </div>
  </template>


  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- MODAL: CRIAR HOTEL                                               -->
  <!-- ════════════════════════════════════════════════════════════════ -->
  <div
    x-show="showCreateModal"
    x-transition.opacity
    style="display:none"
    class="fixed inset-0 z-50 bg-black/40 backdrop-blur-sm flex items-center justify-center">

    <div
      @click.outside="showCreateModal = false"
      class="bg-gray-800/40 backdrop-blur-2xl border border-white/10 rounded-[28px] shadow-2xl
             w-[94vw] max-w-md p-6 flex flex-col gap-5 backdrop-saturate-150">

      <div>
        <h2 class="font-bold text-xl">Criar hotel</h2>
        <p class="text-xs text-gray-400 mt-0.5">Adicione um novo hotel ao sistema</p>
      </div>

      <div class="flex flex-col gap-4">
        <div>
          <label class="block text-xs text-gray-500 mb-1.5">Código <span class="text-gray-600">(máx. 10 caracteres)</span></label>
          <input type="text" x-model="newHotel.code" placeholder="Ex: RM01" maxlength="10"
            class="w-full p-3 rounded-xl bg-gray-800/50 border border-white/10
                   focus:outline-none focus:ring-1 focus:ring-blue-500 text-sm">
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1.5">Nome</label>
          <input type="text" x-model="newHotel.name" placeholder="Nome completo do hotel"
            class="w-full p-3 rounded-xl bg-gray-800/50 border border-white/10
                   focus:outline-none focus:ring-1 focus:ring-blue-500 text-sm">
        </div>
      </div>

      <div class="flex justify-end gap-3 pt-1">
        <button @click="showCreateModal = false"
          class="px-5 py-2.5 rounded-xl text-sm bg-gray-700 hover:bg-gray-600 transition">
          Cancelar
        </button>
        <button @click="createHotel()"
          :disabled="!newHotel.code?.trim() || !newHotel.name?.trim()"
          class="px-6 py-2.5 rounded-xl text-sm bg-emerald-600 hover:bg-emerald-700 font-semibold transition
                 disabled:opacity-40 disabled:cursor-not-allowed">
          Criar hotel
        </button>
      </div>

    </div>
  </div>

</div>
