<div x-data="muralPage()" x-init="init()" class="flex flex-col h-full overflow-hidden">

  <!-- Header -->
  <div class="flex items-center justify-between px-6 py-4 border-b border-white/5 shrink-0">
    <div>
      <h1 class="text-lg font-semibold text-gray-100">Mural</h1>
      <p class="text-xs text-gray-500 mt-0.5">Logbook de turno — registros e avisos da equipe</p>
    </div>

    <!-- Date filter -->
    <div class="flex items-center gap-2">
      <input type="date" x-model="startDate"
        class="text-xs rounded-lg bg-gray-800 border border-white/10 px-3 py-1.5 text-gray-300
               focus:outline-none focus:ring-1 focus:ring-blue-500">
      <span class="text-gray-600 text-xs">até</span>
      <input type="date" x-model="endDate"
        class="text-xs rounded-lg bg-gray-800 border border-white/10 px-3 py-1.5 text-gray-300
               focus:outline-none focus:ring-1 focus:ring-blue-500">
      <button @click="applyFilter()"
        class="text-xs px-3 py-1.5 rounded-lg bg-blue-600 hover:bg-blue-700 text-white transition">
        Filtrar
      </button>
    </div>
  </div>

  <!-- Body -->
  <div class="flex-1 overflow-y-auto custom-scroll px-6 py-4 space-y-4">

    <!-- New post form -->
    <div class="bg-gray-800/50 border border-white/10 rounded-2xl p-4 relative">
      <textarea
        x-model="postInput"
        @input="onPostInput($event)"
        @keydown.ctrl.enter.prevent="submitPost()"
        rows="3"
        placeholder="Escreva um recado, aviso ou registro... Use @nome para mencionar, @all para todos. (Ctrl+Enter para enviar)"
        class="w-full text-sm rounded-xl bg-gray-900/60 border border-white/10 px-4 py-3
               focus:outline-none focus:ring-1 focus:ring-blue-500 resize-none
               placeholder-gray-600 text-gray-200">
      </textarea>

      <!-- Mention autocomplete -->
      <div x-show="postMentionOpen && postMentionResults.length > 0"
        class="absolute left-4 right-4 mt-1 bg-gray-800 border border-white/10 rounded-xl shadow-xl z-10 overflow-hidden">
        <template x-for="u in postMentionResults" :key="u.id">
          <div @click="insertPostMention(u)"
            class="flex items-center gap-2 px-3 py-2 hover:bg-white/10 cursor-pointer">
            <span class="text-xs font-medium text-gray-200" x-text="u.name"></span>
          </div>
        </template>
      </div>

      <div class="flex items-center justify-between mt-2">
        <span class="text-[11px] text-gray-600">@nome para mencionar · @all para todos</span>
        <button @click="submitPost()" :disabled="postSubmitting || !postInput.trim()"
          class="flex items-center gap-1.5 text-xs px-4 py-1.5 rounded-lg bg-blue-600 hover:bg-blue-700
                 text-white disabled:opacity-50 disabled:cursor-not-allowed transition">
          <template x-if="postSubmitting">
            <svg class="w-3 h-3 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>
          </template>
          Publicar
        </button>
      </div>
    </div>

    <!-- Loading -->
    <template x-if="loading">
      <div class="flex justify-center py-12">
        <div class="w-6 h-6 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
      </div>
    </template>

    <!-- Posts feed -->
    <template x-if="!loading">
      <div class="space-y-4">
        <template x-if="posts.length === 0">
          <div class="flex flex-col items-center justify-center py-16 text-gray-600">
            <svg class="w-10 h-10 mb-3 opacity-30" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            <span class="text-sm">Nenhum post no período selecionado</span>
          </div>
        </template>

        <template x-for="post in posts" :key="post.id">
          <div class="bg-gray-800/40 border border-white/[0.07] rounded-2xl p-4 hover:border-white/[0.12] transition">

            <!-- Post header -->
            <div class="flex items-start justify-between gap-3">
              <div class="flex items-center gap-2.5">
                <!-- Avatar initials -->
                <div class="w-8 h-8 rounded-full bg-blue-600/30 border border-blue-500/30 flex items-center justify-center shrink-0">
                  <span class="text-[11px] font-bold text-blue-300" x-text="initials(post.author.name)"></span>
                </div>
                <div>
                  <span class="text-sm font-medium text-gray-200" x-text="post.author.name"></span>
                  <span class="text-[11px] text-gray-600 ml-2" x-text="formatDateTime(post.created_at)"></span>
                </div>
              </div>

              <!-- Delete button (author or admin) -->
              <template x-if="isMyPost(post) || isAdmin()">
                <button @click="deletePost(post)"
                  class="text-gray-600 hover:text-red-400 transition p-1 rounded">
                  <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                  </svg>
                </button>
              </template>
            </div>

            <!-- Post body -->
            <div class="mt-3 text-sm text-gray-300 leading-relaxed whitespace-pre-wrap"
              x-html="highlightMentions(post.body)"></div>

            <!-- Footer: ACK + comments toggle -->
            <div class="flex items-center gap-4 mt-3 pt-3 border-t border-white/5">

              <!-- ACK button -->
              <button @click="ackPost(post)"
                class="flex items-center gap-1.5 text-[11px] transition px-2 py-1 rounded-lg"
                :class="post.acked_by_me
                  ? 'text-emerald-400 bg-emerald-500/10 border border-emerald-500/20 cursor-default'
                  : 'text-gray-500 hover:text-emerald-400 hover:bg-emerald-500/10 border border-transparent'">
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span x-text="post.acked_by_me ? 'Confirmado' : 'Confirmar'"></span>
                <template x-if="post.ack_count > 0">
                  <span class="bg-emerald-500/20 text-emerald-400 px-1.5 rounded-full font-medium"
                    x-text="post.ack_count"></span>
                </template>
              </button>

              <!-- ACK names -->
              <template x-if="post.acks && post.acks.length > 0">
                <span class="text-[10px] text-gray-500 ml-1">
                  <span class="text-gray-600">Confirmado por:</span>
                  <span x-text="ackNames(post)"></span>
                </span>
              </template>

              <!-- Comments toggle -->
              <button @click="toggleComments(post.id)"
                class="flex items-center gap-1.5 text-[11px] text-gray-500 hover:text-blue-400 transition
                       px-2 py-1 rounded-lg hover:bg-blue-500/10 border border-transparent">
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                </svg>
                <span x-text="post.comments.length > 0 ? post.comments.length + ' comentário' + (post.comments.length > 1 ? 's' : '') : 'Comentar'"></span>
              </button>
            </div>

            <!-- Comments section -->
            <template x-if="commentState[post.id] && commentState[post.id].open">
              <div class="mt-3 space-y-2">

                <!-- Existing comments -->
                <template x-for="comment in post.comments" :key="comment.id">
                  <div class="flex items-start gap-2 pl-2 border-l-2 border-white/5">
                    <div class="w-6 h-6 rounded-full bg-gray-700 flex items-center justify-center shrink-0 mt-0.5">
                      <span class="text-[9px] font-bold text-gray-400" x-text="initials(comment.author.name)"></span>
                    </div>
                    <div class="flex-1 min-w-0">
                      <div class="flex items-baseline gap-1.5">
                        <span class="text-xs font-medium text-gray-300" x-text="comment.author.name"></span>
                        <span class="text-[10px] text-gray-600" x-text="formatDateTime(comment.created_at)"></span>
                      </div>
                      <p class="text-xs text-gray-400 mt-0.5 leading-relaxed"
                        x-html="highlightMentions(comment.body)"></p>
                    </div>
                  </div>
                </template>

                <!-- Comment input -->
                <div class="flex items-start gap-2 pt-1">
                  <div class="w-6 h-6 rounded-full bg-blue-600/20 border border-blue-500/20 flex items-center justify-center shrink-0 mt-0.5">
                    <span class="text-[9px] font-bold text-blue-400"
                      x-text="initials($store.app.userName)"></span>
                  </div>
                  <div class="flex-1 flex gap-2">
                    <input
                      type="text"
                      x-model="commentState[post.id].input"
                      @keydown.enter.prevent="submitComment(post)"
                      placeholder="Adicionar comentário... (Enter para enviar)"
                      class="flex-1 text-xs rounded-lg bg-gray-900/60 border border-white/10 px-3 py-1.5
                             focus:outline-none focus:ring-1 focus:ring-blue-500 text-gray-300 placeholder-gray-600">
                    <button @click="submitComment(post)"
                      :disabled="commentState[post.id].submitting || !commentState[post.id].input.trim()"
                      class="text-xs px-3 py-1.5 rounded-lg bg-blue-600 hover:bg-blue-700 text-white
                             disabled:opacity-50 disabled:cursor-not-allowed transition shrink-0">
                      Enviar
                    </button>
                  </div>
                </div>
              </div>
            </template>

          </div>
        </template>

        <!-- Pagination -->
        <template x-if="pages > 1">
          <div class="flex items-center justify-center gap-3 pt-2 pb-4">
            <button @click="loadPosts(page - 1)" :disabled="page <= 1"
              class="text-xs px-3 py-1.5 rounded-lg border border-white/10 text-gray-400
                     hover:text-gray-200 hover:border-white/20 disabled:opacity-30 disabled:cursor-not-allowed transition">
              ← Anterior
            </button>
            <span class="text-xs text-gray-600" x-text="'Página ' + page + ' de ' + pages"></span>
            <button @click="loadPosts(page + 1)" :disabled="page >= pages"
              class="text-xs px-3 py-1.5 rounded-lg border border-white/10 text-gray-400
                     hover:text-gray-200 hover:border-white/20 disabled:opacity-30 disabled:cursor-not-allowed transition">
              Próxima →
            </button>
          </div>
        </template>

      </div>
    </template>

  </div>
</div>
