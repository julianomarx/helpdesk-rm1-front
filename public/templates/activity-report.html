<style>
  @media print {
    .no-print { display: none !important; }
    .print-area { display: block !important; }
    body { background: white !important; color: black !important; }
    .report-card { background: white !important; border: 1px solid #ddd !important; color: black !important; }
    .report-table th { background: #f3f4f6 !important; color: #111 !important; }
    .report-table td { color: #333 !important; border-bottom: 1px solid #e5e7eb !important; }
    .report-header-box { background: #1e3a5f !important; color: white !important; }
    .stat-box { background: #f9fafb !important; border: 1px solid #e5e7eb !important; color: black !important; }
    .stat-box .stat-value { color: #1d4ed8 !important; }
    .badge-open { color: #1d4ed8 !important; }
    .badge-closed { color: #059669 !important; }
    .badge-cancelled { color: #6b7280 !important; }
    .badge-high { color: #dc2626 !important; }
    .badge-medium { color: #d97706 !important; }
    .badge-low { color: #2563eb !important; }
  }
</style>

<div
  x-data="activityReportPage()"
  x-init="init()"
  class="flex flex-col flex-1 min-h-0 gap-4 p-4 text-gray-200">

  <!-- HEADER -->
  <div class="shrink-0 no-print">
    <h1 class="font-bold text-gray-200 border-b border-gray-400 pb-1">
      Relatório de Atividades
    </h1>
    <p class="text-xs text-gray-400 mt-1">Gere relatórios de atendimento por agente e período</p>
  </div>

  <!-- FILTER SECTION -->
  <div class="shrink-0 no-print">
    <div class="rounded-2xl border border-white/10 bg-gray-900/40 backdrop-blur-xl shadow-lg p-5">
      <h2 class="text-sm font-semibold text-gray-300 mb-4">Filtros</h2>

      <div class="flex flex-wrap gap-4 items-end">

        <!-- AGENT SELECT -->
        <div class="flex-1 min-w-48">
          <label class="block text-xs text-gray-400 mb-1.5">Agente</label>
          <template x-if="loadingAgents">
            <div class="h-10 rounded-xl bg-gray-700/40 animate-pulse"></div>
          </template>
          <template x-if="!loadingAgents">
            <select
              x-model="filters.userId"
              class="w-full px-3 py-2.5 rounded-xl text-sm bg-gray-800/60 border border-white/10
                     focus:outline-none focus:ring-1 focus:ring-blue-500 text-gray-200">
              <option value="">— selecione o agente —</option>
              <template x-for="a in agents" :key="a.id">
                <option :value="a.id" x-text="a.name + ' (' + roleLabel(a.role) + ')'"></option>
              </template>
            </select>
          </template>
        </div>

        <!-- START DATE -->
        <div>
          <label class="block text-xs text-gray-400 mb-1.5">Data inicial</label>
          <input
            type="date"
            x-model="filters.startDate"
            class="px-3 py-2.5 rounded-xl text-sm bg-gray-800/60 border border-white/10
                   focus:outline-none focus:ring-1 focus:ring-blue-500 text-gray-200">
        </div>

        <!-- END DATE -->
        <div>
          <label class="block text-xs text-gray-400 mb-1.5">Data final</label>
          <input
            type="date"
            x-model="filters.endDate"
            class="px-3 py-2.5 rounded-xl text-sm bg-gray-800/60 border border-white/10
                   focus:outline-none focus:ring-1 focus:ring-blue-500 text-gray-200">
        </div>

        <!-- GENERATE BUTTON -->
        <button
          @click="generateReport()"
          :disabled="generating"
          class="px-5 py-2.5 rounded-xl text-sm bg-blue-600 hover:bg-blue-700 text-white font-semibold
                 transition disabled:opacity-50 flex items-center gap-2 shrink-0">
          <template x-if="generating">
            <svg class="animate-spin w-4 h-4" viewBox="0 0 24 24" fill="none">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
            </svg>
          </template>
          <template x-if="!generating">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 17v-6h13M9 17H5a2 2 0 01-2-2V5a2 2 0 012-2h11l4 4v5"/>
            </svg>
          </template>
          <span x-text="generating ? 'Gerando...' : 'Gerar Relatório'"></span>
        </button>

      </div>

      <!-- ERROR -->
      <p x-show="error" x-text="error" class="text-xs text-red-400 mt-3"></p>
    </div>
  </div>

  <!-- EMPTY STATE -->
  <template x-if="!report && !generating">
    <div class="flex flex-col items-center justify-center flex-1 text-gray-500 gap-3 no-print">
      <svg class="w-16 h-16 opacity-20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
          d="M9 17v-6h13M9 17H5a2 2 0 01-2-2V5a2 2 0 012-2h11l4 4v5m0 0v6m0-6h-4"/>
      </svg>
      <p class="text-sm">Selecione um agente e período para gerar o relatório</p>
    </div>
  </template>

  <!-- REPORT CONTENT -->
  <template x-if="report">
    <div class="flex flex-col gap-4 overflow-y-auto flex-1 min-h-0 pb-4">

      <!-- REPORT HEADER (visible on screen and print) -->
      <div class="report-header-box rounded-2xl bg-blue-900/40 border border-blue-500/20 p-5">
        <div class="flex items-start justify-between gap-4 flex-wrap">
          <div>
            <p class="text-xs text-blue-300 uppercase tracking-wider font-semibold mb-1">Relatório de Atividades</p>
            <h2 class="text-xl font-bold text-white" x-text="report.agent.name"></h2>
            <p class="text-sm text-blue-200" x-text="report.agent.email"></p>
          </div>
          <div class="text-right">
            <p class="text-xs text-blue-300 uppercase tracking-wider font-semibold mb-1">Período</p>
            <p class="text-lg font-semibold text-white"
              x-text="formatDate(report.period.start) + ' — ' + formatDate(report.period.end)"></p>
            <p class="text-xs text-blue-300 mt-1"
              x-text="'Gerado em ' + new Date().toLocaleDateString('pt-BR') + ' às ' + new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})">
            </p>
          </div>
        </div>

        <!-- ACTION BUTTONS (hidden on print) -->
        <div class="flex gap-3 mt-4 no-print">
          <button
            @click="printReport()"
            class="flex items-center gap-2 px-4 py-2 rounded-xl text-sm bg-white/10 hover:bg-white/20 text-white transition font-medium border border-white/20">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3M3 17V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
            </svg>
            Baixar / Imprimir PDF
          </button>
          <button
            disabled
            title="Configure as credenciais SMTP para habilitar"
            class="flex items-center gap-2 px-4 py-2 rounded-xl text-sm bg-white/5 text-gray-500 cursor-not-allowed border border-white/10 font-medium">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            Enviar por E-mail
            <span class="text-[10px] bg-gray-700 px-1.5 py-0.5 rounded-full">Em breve</span>
          </button>
        </div>
      </div>

      <!-- SUMMARY CARDS -->
      <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3">

        <div class="stat-box report-card rounded-xl border border-white/10 bg-gray-900/40 p-4 text-center">
          <p class="text-xs text-gray-400 mb-1">Chamados atendidos</p>
          <p class="stat-value text-3xl font-bold text-blue-400" x-text="report.summary.tickets_interacted"></p>
        </div>

        <div class="stat-box report-card rounded-xl border border-white/10 bg-gray-900/40 p-4 text-center">
          <p class="text-xs text-gray-400 mb-1">Fechados no período</p>
          <p class="stat-value text-3xl font-bold text-emerald-400" x-text="report.summary.tickets_closed"></p>
        </div>

        <div class="stat-box report-card rounded-xl border border-white/10 bg-gray-900/40 p-4 text-center">
          <p class="text-xs text-gray-400 mb-1">Abertos no período</p>
          <p class="stat-value text-3xl font-bold text-yellow-400" x-text="report.summary.tickets_opened"></p>
        </div>

        <div class="stat-box report-card rounded-xl border border-white/10 bg-gray-900/40 p-4 text-center">
          <p class="text-xs text-gray-400 mb-1">Comentários</p>
          <p class="stat-value text-3xl font-bold text-purple-400" x-text="report.summary.comments_made"></p>
        </div>

        <div class="stat-box report-card rounded-xl border border-white/10 bg-gray-900/40 p-4 text-center">
          <p class="text-xs text-gray-400 mb-1">Ações registradas</p>
          <p class="stat-value text-3xl font-bold text-orange-400" x-text="report.summary.total_actions"></p>
        </div>

      </div>

      <!-- BREAKDOWN ROW -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">

        <!-- BY PRIORITY -->
        <div class="report-card rounded-xl border border-white/10 bg-gray-900/40 p-4">
          <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Por prioridade</h3>
          <div class="flex items-center gap-4">
            <div class="flex-1 text-center">
              <p class="badge-high text-2xl font-bold text-red-400" x-text="report.by_priority.high"></p>
              <p class="text-xs text-gray-500 mt-0.5">Alta</p>
            </div>
            <div class="w-px h-10 bg-white/10"></div>
            <div class="flex-1 text-center">
              <p class="badge-medium text-2xl font-bold text-yellow-400" x-text="report.by_priority.medium"></p>
              <p class="text-xs text-gray-500 mt-0.5">Média</p>
            </div>
            <div class="w-px h-10 bg-white/10"></div>
            <div class="flex-1 text-center">
              <p class="badge-low text-2xl font-bold text-blue-400" x-text="report.by_priority.low"></p>
              <p class="text-xs text-gray-500 mt-0.5">Baixa</p>
            </div>
          </div>
        </div>

        <!-- BY STATUS -->
        <div class="report-card rounded-xl border border-white/10 bg-gray-900/40 p-4">
          <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Por status atual</h3>
          <div class="flex items-center gap-4">
            <div class="flex-1 text-center">
              <p class="badge-open text-2xl font-bold text-blue-400" x-text="report.by_status.open"></p>
              <p class="text-xs text-gray-500 mt-0.5">Abertos</p>
            </div>
            <div class="w-px h-10 bg-white/10"></div>
            <div class="flex-1 text-center">
              <p class="badge-closed text-2xl font-bold text-emerald-400" x-text="report.by_status.closed"></p>
              <p class="text-xs text-gray-500 mt-0.5">Fechados</p>
            </div>
            <div class="w-px h-10 bg-white/10"></div>
            <div class="flex-1 text-center">
              <p class="badge-cancelled text-2xl font-bold text-gray-400" x-text="report.by_status.cancelled"></p>
              <p class="text-xs text-gray-500 mt-0.5">Cancelados</p>
            </div>
          </div>
        </div>

      </div>

      <!-- TICKET TABLE -->
      <div class="report-card rounded-xl border border-white/10 bg-gray-900/40">
        <div class="px-5 py-4 border-b border-white/10 flex items-center justify-between">
          <h3 class="text-sm font-semibold text-gray-300">Lista de chamados atendidos</h3>
          <span class="text-xs text-gray-500" x-text="report.ticket_list.length + ' chamado(s)'"></span>
        </div>

        <template x-if="report.ticket_list.length === 0">
          <div class="px-5 py-8 text-center text-sm text-gray-500">
            Nenhum chamado registrado no período para este agente.
          </div>
        </template>

        <template x-if="report.ticket_list.length > 0">
          <div class="overflow-x-auto">
            <table class="report-table w-full text-sm">
              <thead>
                <tr class="border-b border-white/10 bg-white/[0.02]">
                  <th class="px-5 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wider">#</th>
                  <th class="px-3 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wider">Título</th>
                  <th class="px-3 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wider">Hotel</th>
                  <th class="px-3 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wider">Categoria</th>
                  <th class="px-3 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wider">Prioridade</th>
                  <th class="px-3 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wider">Status</th>
                  <th class="px-5 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wider">Progresso</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="t in report.ticket_list" :key="t.id">
                  <tr class="border-b border-white/5 hover:bg-white/[0.02] transition">
                    <td class="px-5 py-3 text-gray-400 text-xs font-mono" x-text="'#' + t.id"></td>
                    <td class="px-3 py-3 text-gray-200 max-w-xs">
                      <span class="truncate block" x-text="t.title"></span>
                    </td>
                    <td class="px-3 py-3 text-gray-400 text-xs whitespace-nowrap" x-text="t.hotel"></td>
                    <td class="px-3 py-3 text-gray-400 text-xs whitespace-nowrap" x-text="t.category"></td>
                    <td class="px-3 py-3 text-xs font-semibold whitespace-nowrap" :class="priorityClass(t.priority)" x-text="priorityLabel(t.priority)"></td>
                    <td class="px-3 py-3 text-xs font-semibold whitespace-nowrap" :class="statusClass(t.status)" x-text="statusLabel(t.status)"></td>
                    <td class="px-5 py-3 text-xs text-gray-400 whitespace-nowrap" x-text="progressLabel(t.progress)"></td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </template>
      </div>

    </div>
  </template>

</div>
