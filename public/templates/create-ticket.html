<div class="flex flex-1 flex-col mr-2">

  <!-- Cabeçalho -->
  <div class="p-1 rounded-t-lg">
    <h1 class="mr-1 font-bold text-gray-200 border-b border-gray-400">
      Abrir Chamado
    </h1>
  </div>

  <!-- FORM CARD -->
  <form
    autocomplete="off"
    x-data="{
      title: '',
      description: '',
      priority: 'low',
      createdBy: $store.app.userId,
      assignedTo: null,
      hotelId: '',
      categoryId: '',
      subcategoryId: '',

      async submitForm() {

        if (
          !this.title ||
          !this.description ||
          !this.hotelId ||
          !this.categoryId ||
          !this.subcategoryId
        ) {
          showToast('Preencha todos os campos obrigatórios.', 'error');
          return;
        }

        await createTicket(
          this.title,
          this.description,
          this.priority,
          this.hotelId,
          this.categoryId,
          this.subcategoryId
        );

        // reset
        this.title = '';
        this.description = '';
        this.priority = 'low';
        this.hotelId = '';
        this.categoryId = '';
        this.subcategoryId = '';
      }
    }"
    class="relative mt-5 p-5
           bg-gray-900/40 backdrop-blur-xl backdrop-saturate-150
           border border-white/10 rounded-2xl shadow-xl
           text-gray-200 text-sm">
           
    <!-- Conteúdo -->
    <div class="relative z-10">

      <!-- Título -->
      <div class="mb-4">
        <label class="block text-xs mb-1">
          Título *
        </label>

        <input
          type="text"
          x-model="title"
          maxlength="100"
          placeholder="Digite o título do chamado"
          class="w-full p-2 rounded-md
                 bg-gray-800/50 border border-white/10
                 focus:ring-1 focus:ring-blue-500
                 focus:outline-none text-sm
                 placeholder-gray-400" />

        <div
          class="flex justify-end text-xs mt-1"
          :class="100 - title.length < 15 ? 'text-yellow-400' : 'text-gray-400'">

          <span class="font-mono"
            x-text="(100 - title.length) + ' caracteres restantes'">
          </span>
        </div>
      </div>

      <!-- Categoria + Subcategoria -->
      <div class="flex gap-3">

        <!-- Categoria -->
        <div class="flex-1 mb-4">
          <label class="block text-xs mb-1">
            Categoria *
          </label>

          <select
            x-model="categoryId"
            @change="subcategoryId = ''"
            class="w-full p-2 rounded-md
                   bg-gray-800/90 border border-white/10
                   focus:ring-1 focus:ring-blue-500
                   focus:outline-none text-sm">

            <option value="">
              Selecione uma categoria
            </option>

            <template x-for="cat in $store.app.categories" :key="cat.id">
              <option :value="cat.id" x-text="cat.name"></option>
            </template>

          </select>
        </div>

        <!-- Subcategoria -->
        <div class="flex-1 mb-4">
          <label class="block text-xs mb-1">
            Subcategoria *
          </label>

          <select
            x-model="subcategoryId"
            :disabled="!categoryId"
            class="w-full p-2 rounded-md
                   bg-gray-800/90 border border-white/10
                   focus:ring-1 focus:ring-blue-500
                   focus:outline-none text-sm
                   disabled:opacity-50 disabled:cursor-not-allowed">

            <option value="">
              Selecione uma subcategoria
            </option>

            <template
              x-for="sub in $store.app.subcategories"
              :key="sub.id">

              <option
                x-show="sub.category_id === Number(categoryId)"
                :value="sub.id"
                x-text="sub.name">
              </option>

            </template>
          </select>
        </div>
      </div>

      <!-- Descrição -->
      <div class="mb-4">
        <label class="block text-xs mb-1">
          Descrição *
        </label>

        <textarea
          x-model="description"
          rows="5"
          placeholder="Descreva o problema..."
          class="w-full p-2 rounded-md
                 bg-gray-800/50 border border-white/10
                 focus:ring-1 focus:ring-blue-500
                 focus:outline-none text-sm
                 placeholder-gray-400 resize-none">
        </textarea>
      </div>

      <!-- Prioridade + Hotel -->
      <div class="flex gap-3">

        <!-- Prioridade -->
        <div class="flex-1 mb-4">
          <label class="block text-xs mb-1">
            Prioridade *
          </label>

          <select
            x-model="priority"
            class="w-full p-2 rounded-md
                   bg-gray-800/90 border border-white/10
                   focus:ring-1 focus:ring-blue-500
                   focus:outline-none text-sm">

            <option value="low">Baixa</option>
            <option value="medium">Média</option>
            <option value="high">Alta</option>

          </select>
        </div>

        <!-- Hotel -->
        <div class="flex-1 mb-4">
          <label class="block text-xs mb-1">
            Hotel *
          </label>

          <select
            x-model="hotelId"
            class="w-full p-2 rounded-md
                   bg-gray-800/90 border border-white/10
                   focus:ring-1 focus:ring-blue-500
                   focus:outline-none text-sm">

            <option value="">
              Selecione um hotel
            </option>

            <template x-for="hotel in $store.app.hotels" :key="hotel.id">
              <option
                :value="hotel.id"
                x-text="hotel.code + ' - ' + hotel.name">
              </option>
            </template>

          </select>
        </div>
      </div>

      <!-- Botão -->
      <button
        @click.prevent="submitForm"
        class="mt-4 w-full
               bg-blue-600/90 hover:bg-blue-700
               transition-colors
               py-2 rounded-lg
               text-sm font-semibold
               shadow-md">

        Abrir Chamado

      </button>

    </div>
  </form>
</div>
