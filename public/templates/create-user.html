<div
  x-data="{
    name: '',
    email: '',
    password: '',
    confirmPassword: '',
    role: '',
    selectedHotels: [],
    hotelSearch: '',
    submitting: false,
    get filteredHotels() {
      const q = this.hotelSearch.toLowerCase();
      return ($store.app.hotels || []).filter(h =>
        !this.selectedHotels.find(s => s.id === h.id) &&
        (h.name.toLowerCase().includes(q) || h.code.toLowerCase().includes(q))
      );
    },
    async submitUser() {
      if (!this.name.trim() || !this.email.trim() || !this.password || !this.role) {
        showToast('Preencha todos os campos obrigatórios.', 'error');
        return;
      }
      if (this.password !== this.confirmPassword) {
        showToast('As senhas não coincidem.', 'error');
        return;
      }
      const hotel_ids = (this.role === 'admin' || this.role === 'agent')
        ? ($store.app.hotels || []).map(h => h.id)
        : this.selectedHotels.map(h => h.id);

      const token = localStorage.getItem('access_token');
      this.submitting = true;
      try {
        const res = await fetch('/api/users/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ name: this.name.trim(), email: this.email.trim(), password: this.password, role: this.role, hotel_ids })
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          showToast(err.detail || 'Erro ao criar usuário.', 'error');
          return;
        }
        showToast('Usuário criado com sucesso!', 'success');
        this.name = ''; this.email = ''; this.password = ''; this.confirmPassword = '';
        this.role = ''; this.selectedHotels = []; this.hotelSearch = '';
      } catch {
        showToast('Erro ao criar usuário.', 'error');
      } finally {
        this.submitting = false;
      }
    }
  }"
  class="flex flex-1 flex-col min-h-0 gap-4 p-4 text-gray-200 overflow-y-auto custom-scroll">

  <!-- HEADER -->
  <div class="shrink-0">
    <h1 class="text-xl font-bold">Criar Usuário</h1>
    <p class="text-xs text-gray-400 mt-0.5">Cadastre um novo usuário no sistema</p>
  </div>

  <!-- FORM -->
  <form autocomplete="off" @submit.prevent="submitUser" class="max-w-2xl space-y-4 pb-6">

    <!-- Dados pessoais -->
    <div class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl p-5">
      <h2 class="text-sm font-semibold text-gray-300 mb-4 pb-2 border-b border-white/5">Dados pessoais</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs text-gray-400 mb-1.5">Nome completo <span class="text-red-400">*</span></label>
          <input type="text" x-model="name" placeholder="Ex: João Silva"
            class="w-full p-2.5 rounded-xl bg-gray-800/50 border border-white/10
                   focus:ring-1 focus:ring-blue-500 focus:outline-none text-sm placeholder-gray-500" />
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1.5">E-mail <span class="text-red-400">*</span></label>
          <input type="email" x-model="email" autocomplete="new-email" placeholder="email@exemplo.com"
            class="w-full p-2.5 rounded-xl bg-gray-800/50 border border-white/10
                   focus:ring-1 focus:ring-blue-500 focus:outline-none text-sm placeholder-gray-500" />
        </div>
      </div>
    </div>

    <!-- Acesso e função -->
    <div class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl p-5">
      <h2 class="text-sm font-semibold text-gray-300 mb-4 pb-2 border-b border-white/5">Acesso e função</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
        <div>
          <label class="block text-xs text-gray-400 mb-1.5">Senha <span class="text-red-400">*</span></label>
          <input type="password" x-model="password" autocomplete="new-password" placeholder="••••••••"
            class="w-full p-2.5 rounded-xl bg-gray-800/50 border border-white/10
                   focus:ring-1 focus:ring-blue-500 focus:outline-none text-sm placeholder-gray-500" />
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1.5">Confirmar senha <span class="text-red-400">*</span></label>
          <input type="password" x-model="confirmPassword" autocomplete="off" placeholder="••••••••"
            class="w-full p-2.5 rounded-xl bg-gray-800/50 border border-white/10
                   focus:ring-1 focus:ring-blue-500 focus:outline-none text-sm placeholder-gray-500" />
        </div>
      </div>
      <div>
        <label class="block text-xs text-gray-400 mb-1.5">Função <span class="text-red-400">*</span></label>
        <select x-model="role"
          class="w-full p-2.5 rounded-xl bg-gray-800/90 border border-white/10
                 focus:ring-1 focus:ring-blue-500 focus:outline-none text-sm">
          <option value="" disabled>Selecionar função</option>
          <option x-show="$store.app.role === 'admin'" value="admin">Administrador</option>
          <option x-show="$store.app.role === 'admin'" value="agent">Atendente suporte</option>
          <option value="client_manager">Gerente do Cliente</option>
          <option value="client_receptionist">Recepcionista</option>
        </select>
      </div>
    </div>

    <!-- Hotéis (somente para clientes) -->
    <div x-show="!(role === 'admin' || role === 'agent')"
      class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-2xl p-5">
      <h2 class="text-sm font-semibold text-gray-300 mb-1 pb-2 border-b border-white/5">Hotéis vinculados</h2>
      <p class="text-xs text-gray-500 mb-4">Selecione os hotéis que este usuário poderá acessar.</p>

      <input type="text" placeholder="Buscar por nome ou código..." x-model="hotelSearch"
        class="w-full mb-3 p-2.5 rounded-xl bg-gray-800/50 border border-white/10
               focus:ring-1 focus:ring-blue-500 focus:outline-none text-sm placeholder-gray-500" />

      <div class="grid grid-cols-2 gap-3">
        <!-- Disponíveis -->
        <div class="bg-gray-900/50 border border-white/5 rounded-xl p-3">
          <h3 class="font-semibold text-xs mb-2 text-gray-400 uppercase tracking-wide">Disponíveis</h3>
          <div class="max-h-44 overflow-y-auto space-y-1 custom-scroll">
            <template x-for="hotel in filteredHotels" :key="hotel.id">
              <div class="flex items-center justify-between px-2.5 py-1.5 rounded-lg
                         bg-gray-800/50 hover:bg-gray-700/50 transition cursor-pointer">
                <span class="text-xs truncate" x-text="hotel.code + ' — ' + hotel.name"></span>
                <button type="button" @click="selectedHotels.push(hotel)"
                  class="text-emerald-400 hover:text-emerald-300 ml-2 shrink-0 p-0.5">
                  <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
                </button>
              </div>
            </template>
            <div x-show="filteredHotels.length === 0" class="text-xs text-gray-600 py-2 text-center">
              Nenhum hotel disponível
            </div>
          </div>
        </div>

        <!-- Selecionados -->
        <div class="bg-gray-900/50 border border-white/5 rounded-xl p-3">
          <h3 class="font-semibold text-xs mb-2 text-gray-400 uppercase tracking-wide">
            Selecionados
            <span class="ml-1 text-blue-400" x-text="'(' + selectedHotels.length + ')'"></span>
          </h3>
          <div class="max-h-44 overflow-y-auto space-y-1 custom-scroll">
            <template x-for="(hotel, index) in selectedHotels" :key="hotel.id">
              <div class="flex items-center justify-between px-2.5 py-1.5 rounded-lg
                         bg-blue-900/20 border border-blue-500/20 hover:bg-blue-900/30 transition">
                <span class="text-xs truncate text-blue-200" x-text="hotel.code + ' — ' + hotel.name"></span>
                <button type="button" @click="selectedHotels.splice(index, 1)"
                  class="text-red-400 hover:text-red-300 ml-2 shrink-0 p-0.5">
                  <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
              </div>
            </template>
            <div x-show="selectedHotels.length === 0" class="text-xs text-gray-600 py-2 text-center">
              Nenhum hotel selecionado
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Botão submit -->
    <button type="submit" :disabled="submitting"
      class="w-full py-3 rounded-xl text-sm font-semibold text-white
             bg-blue-600 hover:bg-blue-700 disabled:opacity-60 disabled:cursor-not-allowed
             transition-colors shadow-md flex items-center justify-center gap-2">
      <template x-if="submitting">
        <svg class="w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
        </svg>
      </template>
      <span x-text="submitting ? 'Criando...' : 'Criar Usuário'"></span>
    </button>

  </form>
</div>
